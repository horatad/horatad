<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>KB Reviewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}

/* TOP BAR */
#topbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1e293b;border-bottom:1px solid #334155;flex-wrap:wrap;flex-shrink:0}
#topbar h1{font-size:.85rem;font-weight:700;color:#f8fafc;white-space:nowrap}
.stat{font-size:.7rem;padding:2px 7px;border-radius:4px;white-space:nowrap;cursor:default}
.s-red{background:#7f1d1d;color:#fca5a5}.s-yellow{background:#713f12;color:#fde68a}
.s-green{background:#14532d;color:#86efac}.s-blue{background:#1e3a5f;color:#93c5fd}
#prog-wrap{flex:1;min-width:60px;background:#334155;border-radius:3px;height:5px}
#prog-bar{height:5px;background:#3b82f6;border-radius:3px;transition:width .3s}
#prog-txt{font-size:.7rem;color:#64748b;white-space:nowrap}

/* ACTION STRIP */
#action-strip{display:flex;gap:6px;padding:8px 12px;background:#1e293b;border-bottom:1px solid #334155;flex-wrap:wrap}
.strip-btn{padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600}
.s-load{background:#334155;color:#e2e8f0}.s-load:hover{background:#475569}
.s-patch{background:#1e3a5f;color:#93c5fd}.s-patch:hover{background:#1e4080}
.s-merge{background:#3b0764;color:#d8b4fe}.s-merge:hover{background:#4c0f82}
.s-save{background:#14532d;color:#86efac}.s-save:hover{background:#166534}
.s-full{background:#334155;color:#94a3b8;border:1px solid #475569}.s-full:hover{background:#475569}

/* FILTER ROW */
#filter-row{display:flex;gap:6px;padding:8px 12px;background:#0f172a;border-bottom:1px solid #1e293b;overflow-x:auto;flex-shrink:0}
.f-btn{padding:4px 12px;border-radius:16px;border:1px solid #334155;background:transparent;color:#64748b;font-size:.72rem;cursor:pointer;white-space:nowrap}
.f-btn.on{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd}
#search{padding:4px 8px;background:#1e293b;border:1px solid #334155;border-radius:16px;color:#e2e8f0;font-size:.72rem;min-width:0;flex:1}

/* MAIN AREA */
#main{flex:1;display:flex;overflow:hidden}

/* SIDEBAR — hidden on mobile by default */
#sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #1e293b;overflow:hidden}
#rule-list{flex:1;overflow-y:auto;padding:4px}
.ritem{padding:7px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;border-left:3px solid transparent}
.ritem:hover{background:#1e293b}
.ritem.sel{background:#1e2d4e;border-left-color:#3b82f6}
.ritem.ok{border-left-color:#22c55e}
.ritem.ref{border-left-color:#8b5cf6}
.ritem.conflict{border-left-color:#f97316}
.ri-badge{font-size:.62rem;padding:1px 5px;border-radius:3px;margin-bottom:2px;display:inline-block}
.b-mm{background:#7f1d1d;color:#fca5a5}.b-nc{background:#713f12;color:#fde68a}
.b-ok{background:#14532d;color:#86efac}.b-ref{background:#3b0764;color:#d8b4fe}
.b-cf{background:#7c2d12;color:#fdba74}
.ri-c{font-size:.72rem;color:#e2e8f0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* EDITOR */
#editor{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#ed-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#334155;gap:8px;font-size:.9rem}
#ed-body{flex:1;overflow-y:auto;padding:16px 14px;display:none}

.issue-banner{padding:8px 12px;border-radius:6px;font-size:.75rem;margin-bottom:12px;line-height:1.5}
.ib-mm{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5}
.ib-nc{background:#431407;border:1px solid #713f12;color:#fed7aa}
.ib-cf{background:#431400;border:1px solid #f97316;color:#fdba74}

.ed-c{font-size:.95rem;font-weight:700;color:#f8fafc;margin-bottom:10px;line-height:1.5}
.ed-p{font-size:.78rem;color:#64748b;margin-bottom:14px;padding:8px 10px;background:#1e293b;border-radius:6px;border-left:3px solid #334155;line-height:1.6}
.sec{font-size:.65rem;font-weight:700;letter-spacing:.08em;color:#475569;text-transform:uppercase;margin-bottom:6px;margin-top:14px}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:0}
.tag{font-size:.7rem;padding:2px 7px;border-radius:10px;background:#1e293b;color:#94a3b8}

/* CONDITIONS — card per condition */
#cond-list{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.cond-card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 12px;position:relative}
.cond-card.new-cond{border-style:dashed}
.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cond-field{display:flex;flex-direction:column;gap:3px}
.cond-label{font-size:.62rem;color:#475569;font-weight:600}
.cond-input{padding:5px 8px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:.78rem;-webkit-appearance:none;width:100%}
.cond-input:focus{outline:none;border-color:#3b82f6}
.del-cond-btn{position:absolute;top:8px;right:8px;background:#7f1d1d;border:none;color:#fca5a5;padding:2px 7px;border-radius:4px;cursor:pointer;font-size:.7rem}
#add-cond{width:100%;padding:8px;background:transparent;border:1px dashed #334155;border-radius:6px;color:#475569;cursor:pointer;font-size:.78rem;margin-bottom:14px}
#add-cond:hover{border-color:#3b82f6;color:#93c5fd}

/* META */
.meta-row{display:grid;grid-template-columns:1fr 1fr 80px;gap:8px;margin-bottom:12px}
.meta-f{display:flex;flex-direction:column;gap:3px}
.meta-f label{font-size:.62rem;color:#475569;font-weight:600}
.meta-f select,.meta-f input{padding:5px 8px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:.78rem;-webkit-appearance:none}

/* CONFLICT */
.conflict-box{background:#431400;border:1px solid #f97316;border-radius:8px;padding:10px;margin-bottom:12px;font-size:.75rem}
.conflict-opt{display:flex;gap:8px;margin-top:8px}
.pick-btn{flex:1;padding:6px;border:none;border-radius:6px;cursor:pointer;font-size:.75rem;font-weight:600}
.pick-a{background:#1e3a5f;color:#93c5fd}.pick-b{background:#3b0764;color:#d8b4fe}

/* BOTTOM ACTION BAR */
#action-bar{display:flex;gap:8px;padding:10px 14px;background:#1e293b;border-top:1px solid #334155;flex-shrink:0}
.act-btn{padding:10px;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:700;flex:1;min-height:44px}
.a-confirm{background:#22c55e;color:#fff}
.a-ref{background:#7c3aed;color:#fff}
.a-skip{background:#334155;color:#94a3b8}
.a-prev{background:transparent;border:1px solid #334155;color:#64748b;flex:0 0 44px}
#pos-label{font-size:.7rem;color:#475569;text-align:center;flex:0 0 auto;align-self:center;white-space:nowrap}

/* MOBILE: hide sidebar, show toggle */
#sidebar-toggle{display:none;padding:5px 10px;background:#334155;border:none;color:#e2e8f0;border-radius:6px;cursor:pointer;font-size:.75rem}

/* RESPONSIVE */
@media(max-width:600px){
  #sidebar{display:none;position:fixed;inset:0;z-index:100;width:100%;border-right:none;background:#0f172a}
  #sidebar.mobile-open{display:flex}
  #sidebar-toggle{display:block}
  .meta-row{grid-template-columns:1fr 1fr}
  #topbar{gap:5px}
}
</style>
</head>
<body>

<div id="topbar">
  <h1>🔍 KB Reviewer</h1>
  <span class="stat s-red" id="s-mm">🔴 0</span>
  <span class="stat s-yellow" id="s-nc">🟡 0</span>
  <span class="stat s-green" id="s-ok">✅ 0</span>
  <span class="stat s-blue" id="s-tot">📋 0</span>
  <div id="prog-wrap"><div id="prog-bar" style="width:0%"></div></div>
  <span id="prog-txt">0/0</span>
  <button id="sidebar-toggle" onclick="toggleSidebar()">☰ รายการ</button>
</div>

<div id="action-strip">
  <input type="file" id="kb-file" accept=".json" style="display:none" onchange="loadKb(event)">
  <input type="file" id="patch-file" accept=".json" style="display:none" onchange="loadPatch(event)">
  <input type="file" id="merge-file" accept=".json" style="display:none" onchange="loadMerge(event)">
  <button class="strip-btn s-load" onclick="document.getElementById('kb-file').click()">📂 โหลด kb.json</button>
  <button class="strip-btn s-patch" onclick="document.getElementById('patch-file').click()">📥 โหลด Patch</button>
  <button class="strip-btn s-merge" onclick="document.getElementById('merge-file').click()">🔀 Merge Patch</button>
  <button class="strip-btn s-save" onclick="downloadPatch()">💾 Save Patch</button>
  <button class="strip-btn s-full" onclick="downloadFull()">⬇ Full kb.json</button>
</div>

<div id="filter-row">
  <button class="f-btn on" onclick="setFilter('all')">ทั้งหมด</button>
  <button class="f-btn" onclick="setFilter('mismatch')">🔴 Mismatch</button>
  <button class="f-btn" onclick="setFilter('nocond')">🟡 No-cond</button>
  <button class="f-btn" onclick="setFilter('conflict')">🟠 Conflict</button>
  <button class="f-btn" onclick="setFilter('pending')">⏳ Pending</button>
  <button class="f-btn" onclick="setFilter('done')">✅ Done</button>
  <input id="search" type="text" placeholder="ค้นหา..." oninput="renderList()">
</div>

<div id="main">
  <div id="sidebar">
    <div id="rule-list"></div>
  </div>
  <div id="editor">
    <div id="ed-empty">
      <div style="font-size:2rem">🔍</div>
      <div>โหลด kb.json เพื่อเริ่มต้น</div>
      <div style="font-size:.75rem;color:#475569">โหลด Patch เพื่อต่อจากครั้งก่อน</div>
    </div>
    <div id="ed-body"></div>
    <div id="action-bar" style="display:none">
      <button class="act-btn a-prev" onclick="nav(-1)">←</button>
      <button class="act-btn a-confirm" onclick="confirm_()">✓ Approve</button>
      <button class="act-btn a-ref" onclick="markRef()">📋 REF</button>
      <button class="act-btn a-skip" onclick="nav(1)">Skip →</button>
      <span id="pos-label">0/0</span>
    </div>
  </div>
</div>

<script>
// ── State ──
let rules=[], kbRoot=null, cur=0, filter='all', filteredList=[];
const st={}; // idx → 'pending'|'confirmed'|'reference'|'conflict'
const patches={}; // idx → patch obj saved this session
const conflicts={}; // idx → {a, b} — two conflicting patches
const LS_KEY='kb_review_patches';

// ── Planet names ──
const PN={'0':'มฤตยู','1':'อาทิตย์','2':'จันทร์','3':'อังคาร','4':'พุธ','5':'พฤหัส','6':'ศุกร์','7':'เสาร์','8':'ราหู','9':'เกตุ'};
const HN={1:'ตนุ',2:'กฎุมพะ',3:'สหัช',4:'พันธุ',5:'บุตร',6:'อริ',7:'ปัตนิ',8:'มรณะ',9:'ศุภะ',10:'กัมมะ',11:'ลาภะ',12:'วินาศ'};

// ── Load kb.json ──
function loadKb(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      kbRoot=d;
      rules=Array.isArray(d)?d:(d.rules||[]);
      rules.forEach((_,i)=>{ st[i]='pending'; delete patches[i]; delete conflicts[i]; });
      classifyAll();
      // restore from localStorage
      try{ applyPatchData(JSON.parse(localStorage.getItem(LS_KEY)||'{}')); }catch(_){}
      refresh(); selectRule(0);
      document.getElementById('kb-file').value='';
    }catch(err){alert('JSON ไม่ถูกต้อง: '+err.message);}
  };
  r.readAsText(f);
}

// ── Load patch (continue previous session) ──
function loadPatch(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{ applyPatchData(JSON.parse(ev.target.result)); refresh(); alert('โหลด patch แล้ว'); }
    catch(err){alert('Patch ไม่ถูกต้อง: '+err.message);}
    document.getElementById('patch-file').value='';
  };
  r.readAsText(f);
}

function applyPatchData(data){
  const items=data.patches||data; // support both {patches:[...]} and raw array
  if(!Array.isArray(items))return;
  items.forEach(p=>{
    const i=findRuleIdx(p.c);
    if(i<0)return;
    applyOnePatch(i,p,'');
  });
}

function applyOnePatch(i,p,source){
  if(p.action==='confirmed'||p.action==='approved'){
    st[i]='confirmed';
    if(p.conditions!==undefined) rules[i].conditions=p.conditions;
    if(p.rule_type!==undefined) rules[i].rule_type=p.rule_type;
    if(p.rule_source!==undefined) rules[i].rule_source=p.rule_source;
    if(p.weight!==undefined) rules[i].weight=p.weight;
    patches[i]={...p, source};
  } else if(p.action==='reference'){
    st[i]='reference';
    rules[i].rule_type='REFERENCE';
    patches[i]={...p, source};
  }
}

// ── Merge patch (from another device) ──
function loadMerge(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      const items=data.patches||data;
      let merged=0, conflicted=0;
      items.forEach(p=>{
        const i=findRuleIdx(p.c);
        if(i<0)return;
        if(st[i]==='pending'){
          applyOnePatch(i,p,'B'); merged++;
        } else if(patches[i]){
          // already reviewed — check if same decision
          const existing=patches[i];
          if(existing.action!==p.action || JSON.stringify(existing.conditions)!==JSON.stringify(p.conditions)){
            // conflict!
            conflicts[i]={a:existing, b:p};
            st[i]='conflict';
            conflicted++;
          }
          // else: same → no conflict
        }
      });
      classifyAll(); refresh();
      alert(`Merge เสร็จ: ${merged} กฎใหม่, ${conflicted} conflict`);
    }catch(err){alert('Merge error: '+err.message);}
    document.getElementById('merge-file').value='';
  };
  r.readAsText(f);
}

function findRuleIdx(c){
  return rules.findIndex(r=>r.c===c);
}

// ── Classification ──
const issueType=[];
function classifyAll(){
  rules.forEach((r,i)=>{
    const conds=r.conditions||[];
    const tText=JSON.stringify(r.t||[]);
    if(!conds.length) issueType[i]='nocond';
    else{
      const mismatch=conds.some(c=>{
        if(!c.planet_id||c.planet_id==='ANY')return false;
        const name=PN[String(c.planet_id)];
        return name&&!tText.includes(name)&&!tText.includes('ดาว '+c.planet_id);
      });
      issueType[i]=mismatch?'mismatch':'ok';
    }
    if(r.rule_type==='REFERENCE'&&st[i]==='pending') st[i]='reference';
  });
}

// ── Filter ──
function setFilter(f){
  filter=f;
  document.querySelectorAll('.f-btn').forEach(b=>{
    b.classList.toggle('on',b.textContent.includes({all:'ทั้งหมด',mismatch:'Mismatch',nocond:'No-cond',conflict:'Conflict',pending:'Pending',done:'Done'}[f]||'__'));
  });
  renderList();
}

function matchFilter(i){
  const s=st[i],it=issueType[i];
  if(filter==='all')return true;
  if(filter==='mismatch')return it==='mismatch'&&s==='pending';
  if(filter==='nocond')return it==='nocond'&&s==='pending';
  if(filter==='conflict')return s==='conflict';
  if(filter==='pending')return s==='pending';
  if(filter==='done')return s==='confirmed'||s==='reference';
  return true;
}

// ── Render list ──
function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  // sort: conflict > mismatch > nocond > ok; within group pending first
  const order={conflict:-1,mismatch:0,nocond:1,ok:2};
  filteredList=rules.map((_,i)=>i)
    .filter(i=>{
      if(!matchFilter(i))return false;
      if(q&&!(rules[i].c||'').toLowerCase().includes(q)&&!JSON.stringify(rules[i].t||[]).toLowerCase().includes(q))return false;
      return true;
    })
    .sort((a,b)=>{
      const oa=(order[issueType[a]]??2)+(st[a]==='pending'?0:10);
      const ob=(order[issueType[b]]??2)+(st[b]==='pending'?0:10);
      return oa-ob;
    });
  const list=document.getElementById('rule-list');
  list.innerHTML='';
  filteredList.forEach((i,pos)=>{
    const r=rules[i],s=st[i],it=issueType[i];
    const div=document.createElement('div');
    div.className='ritem'+(i===cur?' sel':'')+(s==='confirmed'?' ok':s==='reference'?' ref':s==='conflict'?' conflict':'');
    const badge=s==='conflict'?'b-cf':s==='confirmed'?'b-ok':s==='reference'?'b-ref':it==='mismatch'?'b-mm':it==='nocond'?'b-nc':'b-ok';
    const label=s==='conflict'?'⚠conflict':s==='confirmed'?'✓':s==='reference'?'REF':it==='mismatch'?'mismatch':it==='nocond'?'no-cond':'ok';
    div.innerHTML=`<div><span class="ri-badge ${badge}">${label}</span></div><div class="ri-c">${esc(r.c||'')}</div>`;
    div.onclick=()=>{ closeSidebar(); selectRule(i); };
    list.appendChild(div);
  });
}

// ── Editor ──
function selectRule(i){
  if(rules.length===0)return;
  i=Math.max(0,Math.min(i,rules.length-1));
  cur=i;
  renderList();
  // scroll list item into view
  const pos=filteredList.indexOf(i);
  if(pos>=0){
    const items=document.querySelectorAll('.ritem');
    if(items[pos]) items[pos].scrollIntoView({block:'nearest'});
  }
  renderEditor(i);
}

function renderEditor(i){
  const r=rules[i],s=st[i],it=issueType[i];
  document.getElementById('ed-empty').style.display='none';
  const body=document.getElementById('ed-body');
  body.style.display='block';
  document.getElementById('action-bar').style.display='flex';

  const pos=filteredList.indexOf(i);
  document.getElementById('pos-label').textContent=`${pos+1}/${filteredList.length}`;

  let html='';

  // issue banner
  if(s==='conflict'){
    const cf=conflicts[i]||{};
    html+=`<div class="issue-banner ib-cf">⚠️ <b>Conflict</b>: 2 อุปกรณ์ตัดสินต่างกัน — เลือกอันที่ถูกต้อง
      <div class="conflict-opt">
        <button class="pick-btn pick-a" onclick="resolveConflict(${i},'a')">A: ${esc(cf.a?.action||'?')} (อุปกรณ์เดิม)</button>
        <button class="pick-btn pick-b" onclick="resolveConflict(${i},'b')">B: ${esc(cf.b?.action||'?')} (merge ใหม่)</button>
      </div>
    </div>`;
  } else if(it==='mismatch'&&s==='pending'){
    html+=`<div class="issue-banner ib-mm">⚠️ <b>Mismatch</b>: planet ใน conditions[] ไม่ตรงกับ tags</div>`;
  } else if(it==='nocond'&&s==='pending'){
    html+=`<div class="issue-banner ib-nc">🟡 <b>No conditions</b>: ยังไม่มี conditions[] — เพิ่มหรือ mark REFERENCE</div>`;
  }

  html+=`<div class="ed-c">${esc(r.c||'(ไม่มีชื่อ)')}</div>`;
  html+=`<div class="sec">Tags</div><div class="tags" id="ed-tags"></div>`;
  html+=`<div class="sec">Conditions</div><div id="cond-list"></div>`;
  html+=`<button id="add-cond" onclick="addCond(${i})">+ เพิ่ม condition</button>`;
  html+=`<div class="sec">Meta</div>
    <div class="meta-row">
      <div class="meta-f"><label>rule_type</label>
        <select id="f-rt" onchange="updateMeta(${i})">
          <option value="">— ปกติ —</option>
          <option value="REFERENCE" ${r.rule_type==='REFERENCE'?'selected':''}>REFERENCE</option>
          <option value="TRANSIT_RULE" ${r.rule_type==='TRANSIT_RULE'?'selected':''}>TRANSIT_RULE</option>
        </select></div>
      <div class="meta-f"><label>rule_source</label>
        <select id="f-rs" onchange="updateMeta(${i})">
          ${['major','minor','empirical','case_study'].map(v=>`<option value="${v}" ${(r.rule_source||'major')===v?'selected':''}>${v}</option>`).join('')}
        </select></div>
      <div class="meta-f"><label>weight</label>
        <input id="f-wt" type="number" step="0.1" min="0" max="2" value="${r.weight??1}" onchange="updateMeta(${i})"></div>
    </div>`;
  html+=`<div class="sec">Prediction (p)</div><div class="ed-p">${esc(r.p||'')}</div>`;

  body.innerHTML=html;

  // render tags
  const tagsEl=document.getElementById('ed-tags');
  (r.t||[]).forEach(tag=>{
    const sp=document.createElement('span');
    sp.className='tag'; sp.textContent=tag; tagsEl.appendChild(sp);
  });

  // render conditions
  renderCondList(i);
}

function renderCondList(i){
  const r=rules[i];
  const list=document.getElementById('cond-list');
  if(!list)return;
  list.innerHTML='';
  const conds=r.conditions||[];
  if(!conds.length){
    list.innerHTML='<div style="color:#475569;font-size:.75rem;padding:6px 0">ไม่มี conditions</div>';
    return;
  }
  conds.forEach((c,ci)=>{
    const div=document.createElement('div');
    div.className='cond-card';
    div.innerHTML=`
      <button class="del-cond-btn" onclick="delCond(${i},${ci})">✕</button>
      <div class="cond-grid">
        <div class="cond-field">
          <label class="cond-label">house_lord_of (H1-12)</label>
          <input class="cond-input" type="number" min="1" max="12" placeholder="${HN[c.house_lord_of]||'—'}" value="${c.house_lord_of||''}" onchange="updCond(${i},${ci},'house_lord_of',this.value)">
        </div>
        <div class="cond-field">
          <label class="cond-label">planet_id</label>
          <select class="cond-input" onchange="updCond(${i},${ci},'planet_id',this.value)">
            <option value="">—</option><option value="ANY">ANY</option>
            ${Object.entries(PN).map(([k,v])=>`<option value="${k}" ${c.planet_id==k?'selected':''}>${k}=${v}</option>`).join('')}
          </select>
        </div>
        <div class="cond-field">
          <label class="cond-label">quality_required</label>
          <input class="cond-input" value="${esc(c.quality_required||'')}" placeholder="ดี/เสีย/อุจ/..." onchange="updCond(${i},${ci},'quality_required',this.value)">
        </div>
        <div class="cond-field">
          <label class="cond-label">lagna_aspect_req</label>
          <input class="cond-input" value="${esc(c.lagna_aspect_req||'')}" placeholder="กุมลัคนา/เล็ง/..." onchange="updCond(${i},${ci},'lagna_aspect_req',this.value)">
        </div>
      </div>`;
    list.appendChild(div);
  });
}

function updCond(i,ci,field,val){
  const r=rules[i];
  if(!r.conditions)r.conditions=[];
  if(field==='house_lord_of'){
    const n=parseInt(val);
    if(n>=1&&n<=12) r.conditions[ci].house_lord_of=n;
    else delete r.conditions[ci].house_lord_of;
  } else r.conditions[ci][field]=val;
  classifyAll(); updateStats();
}

function delCond(i,ci){
  rules[i].conditions.splice(ci,1);
  renderCondList(i);
  classifyAll(); updateStats();
}

function addCond(i){
  if(!rules[i].conditions)rules[i].conditions=[];
  rules[i].conditions.push({planet_id:'',quality_required:'',lagna_aspect_req:'',required:true});
  renderCondList(i);
}

function updateMeta(i){
  const rt=document.getElementById('f-rt')?.value;
  const rs=document.getElementById('f-rs')?.value;
  const wt=parseFloat(document.getElementById('f-wt')?.value)||1;
  if(rt!==undefined) rules[i].rule_type=rt||undefined;
  if(!rules[i].rule_type)delete rules[i].rule_type;
  if(rs) rules[i].rule_source=rs;
  rules[i].weight=wt;
}

// ── Actions ──
function savePatchEntry(i,action){
  const r=rules[i];
  const p={c:r.c,action,conditions:r.conditions,rule_type:r.rule_type,rule_source:r.rule_source,weight:r.weight,ts:Date.now()};
  patches[i]=p;
  // persist to localStorage
  try{
    const existing=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    existing[r.c]=p;
    localStorage.setItem(LS_KEY,JSON.stringify(existing));
  }catch(_){}
}

function confirm_(){
  updateMeta(cur);
  st[cur]='confirmed';
  savePatchEntry(cur,'confirmed');
  refresh(); nav(1);
}

function markRef(){
  rules[cur].rule_type='REFERENCE';
  st[cur]='reference';
  savePatchEntry(cur,'reference');
  refresh(); nav(1);
}

function resolveConflict(i,pick){
  const cf=conflicts[i];
  if(!cf)return;
  const chosen=pick==='a'?cf.a:cf.b;
  applyOnePatch(i,chosen,'resolved');
  st[i]=chosen.action==='reference'?'reference':'confirmed';
  delete conflicts[i];
  refresh(); renderEditor(i);
}

function nav(dir){
  const pos=filteredList.indexOf(cur);
  const next=pos+dir;
  if(next>=0&&next<filteredList.length) selectRule(filteredList[next]);
}

// ── Download ──
function buildPatchArray(){
  return Object.values(patches).sort((a,b)=>(a.ts||0)-(b.ts||0));
}

function downloadPatch(){
  if(!Object.keys(patches).length){alert('ยังไม่มีการเปลี่ยนแปลง');return;}
  const out={
    _meta:{created:new Date().toISOString(),reviewed:Object.keys(patches).length,total:rules.length},
    patches:buildPatchArray()
  };
  dl(JSON.stringify(out,null,2),'kb_patch_'+ts()+'.json','application/json');
}

function downloadFull(){
  if(!kbRoot){alert('โหลด kb.json ก่อน');return;}
  const out=Array.isArray(kbRoot)?rules:{...kbRoot,rules};
  dl(JSON.stringify(out,null,2),'kb_reviewed_'+ts()+'.json','application/json');
}

function dl(content,filename,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=filename; a.click();
}

function ts(){
  return new Date().toISOString().replace(/[:.]/g,'-').slice(0,16);
}

// ── UI helpers ──
function refresh(){ renderList(); updateStats(); }

function updateStats(){
  const total=rules.length;
  const mm=rules.filter((_,i)=>issueType[i]==='mismatch'&&st[i]==='pending').length;
  const nc=rules.filter((_,i)=>issueType[i]==='nocond'&&st[i]==='pending').length;
  const ok=Object.values(st).filter(s=>s==='confirmed'||s==='reference').length;
  document.getElementById('s-mm').textContent='🔴 '+mm;
  document.getElementById('s-nc').textContent='🟡 '+nc;
  document.getElementById('s-ok').textContent='✅ '+ok;
  document.getElementById('s-tot').textContent='📋 '+total;
  document.getElementById('prog-bar').style.width=(total?ok/total*100:0)+'%';
  document.getElementById('prog-txt').textContent=ok+'/'+total;
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('mobile-open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('mobile-open');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// keyboard shortcuts (desktop)
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  if(e.key==='Enter')confirm_();
  else if(e.key==='r'||e.key==='R')markRef();
  else if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();nav(1);}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();nav(-1);}
});

// auto-load kb.json from relative path (when served via HTTP)
fetch('../v3/kb.json').then(r=>r.ok?r.json():null).then(data=>{
  if(!data)return;
  kbRoot=data;
  rules=Array.isArray(data)?data:(data.rules||[]);
  rules.forEach((_,i)=>{st[i]='pending';});
  classifyAll();
  // restore localStorage
  try{ applyPatchData(JSON.parse(localStorage.getItem(LS_KEY)||'{}')); }catch(_){}
  refresh(); selectRule(0);
  document.querySelector('.strip-btn.s-load').textContent='✓ โหลดแล้ว';
}).catch(()=>{});
</script>
</body>
