<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KB Rule Reviewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOP BAR ── */
#topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:#1e293b;border-bottom:1px solid #334155;flex-shrink:0}
#topbar h1{font-size:.9rem;font-weight:700;color:#f8fafc;white-space:nowrap}
.stat{font-size:.75rem;padding:2px 8px;border-radius:4px;white-space:nowrap}
.stat-red{background:#7f1d1d;color:#fca5a5}
.stat-yellow{background:#713f12;color:#fde68a}
.stat-green{background:#14532d;color:#86efac}
.stat-blue{background:#1e3a5f;color:#93c5fd}
#progress-wrap{flex:1;background:#334155;border-radius:4px;height:6px;min-width:60px}
#progress-bar{height:6px;border-radius:4px;background:#3b82f6;transition:width .3s}
#progress-text{font-size:.75rem;color:#94a3b8;white-space:nowrap}
#load-btn{margin-left:auto;padding:4px 12px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.8rem}
#download-btn{padding:4px 12px;background:#22c55e;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.8rem}
#download-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}

/* ── MAIN LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── LEFT LIST ── */
#sidebar{width:280px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #334155;background:#1e293b}
#filter-bar{display:flex;gap:4px;padding:8px;flex-wrap:wrap;border-bottom:1px solid #334155}
.filter-btn{font-size:.7rem;padding:2px 8px;border-radius:4px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer}
.filter-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
#search-box{width:100%;padding:4px 8px;background:#0f172a;border:1px solid #334155;border-radius:4px;color:#e2e8f0;font-size:.75rem;margin:0 8px 8px;width:calc(100% - 16px)}
#rule-list{flex:1;overflow-y:auto;padding:4px}
.rule-item{padding:6px 8px;border-radius:6px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:background .1s}
.rule-item:hover{background:#334155}
.rule-item.active{background:#1e3a5f;border-color:#3b82f6}
.rule-item.confirmed{border-left:3px solid #22c55e}
.rule-item.reference{border-left:3px solid #8b5cf6}
.rule-item.skipped{opacity:.5}
.rule-title{font-size:.72rem;color:#e2e8f0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rule-badge{font-size:.6rem;padding:1px 5px;border-radius:3px;margin-bottom:3px;display:inline-block}
.badge-mismatch{background:#7f1d1d;color:#fca5a5}
.badge-nocond{background:#713f12;color:#fde68a}
.badge-ok{background:#14532d;color:#86efac}
.badge-ref{background:#3b0764;color:#d8b4fe}
.badge-confirmed{background:#14532d;color:#86efac}

/* ── RIGHT EDITOR ── */
#editor{flex:1;display:flex;flex-direction:column;overflow:hidden}
#editor-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#475569;font-size:.9rem}
#editor-content{flex:1;overflow-y:auto;padding:20px;display:none}

.rule-c{font-size:1rem;font-weight:600;color:#f8fafc;margin-bottom:12px;line-height:1.5}
.rule-p{font-size:.82rem;color:#94a3b8;margin-bottom:16px;padding:10px;background:#1e293b;border-radius:6px;line-height:1.6;border-left:3px solid #475569}

.section-label{font-size:.7rem;font-weight:700;letter-spacing:.08em;color:#64748b;text-transform:uppercase;margin-bottom:6px}

.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tag{font-size:.72rem;padding:2px 8px;border-radius:12px;background:#334155;color:#e2e8f0}
.tag.hl{background:#1e3a5f;color:#93c5fd}

/* CONDITIONS TABLE */
#cond-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:.78rem}
#cond-table th{text-align:left;padding:4px 6px;color:#64748b;font-weight:600;border-bottom:1px solid #334155;font-size:.7rem}
#cond-table td{padding:4px 4px}
#cond-table input,#cond-table select{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:3px 6px;border-radius:4px;font-size:.75rem;width:100%}
#cond-table input:focus,#cond-table select:focus{outline:none;border-color:#3b82f6}
.del-cond{background:#7f1d1d;border:none;color:#fca5a5;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:.75rem}
.del-cond:hover{background:#991b1b}

#add-cond-btn{font-size:.75rem;padding:3px 10px;background:#1e293b;border:1px dashed #475569;color:#94a3b8;border-radius:4px;cursor:pointer;margin-bottom:16px}
#add-cond-btn:hover{border-color:#3b82f6;color:#93c5fd}

/* meta fields */
.meta-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.meta-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.meta-field label{font-size:.7rem;color:#64748b}
.meta-field select,.meta-field input{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:4px 8px;border-radius:4px;font-size:.78rem}

/* ACTION BAR */
#action-bar{display:flex;gap:8px;padding:12px 20px;background:#1e293b;border-top:1px solid #334155;flex-shrink:0}
.action-btn{padding:7px 20px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:6px}
#btn-confirm{background:#22c55e;color:#fff}
#btn-confirm:hover{background:#16a34a}
#btn-ref{background:#7c3aed;color:#fff}
#btn-ref:hover{background:#6d28d9}
#btn-skip{background:#334155;color:#94a3b8}
#btn-skip:hover{background:#475569;color:#e2e8f0}
#btn-prev{background:#1e293b;border:1px solid #475569;color:#94a3b8;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:.85rem}
#btn-prev:hover{background:#334155}
.kbd{display:inline-block;background:#334155;color:#94a3b8;padding:1px 5px;border-radius:3px;font-size:.65rem;font-family:monospace}
#rule-idx{margin-left:auto;font-size:.75rem;color:#64748b;align-self:center}

/* issue legend */
#issue-desc{font-size:.75rem;padding:8px 12px;border-radius:6px;margin-bottom:16px}
.issue-mismatch{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5}
.issue-nocond{background:#431407;border:1px solid #713f12;color:#fed7aa}
.issue-ok{background:#052e16;border:1px solid #14532d;color:#bbf7d0}
</style>
</head>
<body>

<div id="topbar">
  <h1>🔍 KB Rule Reviewer</h1>
  <span class="stat stat-red" id="s-mismatch">🔴 0 mismatch</span>
  <span class="stat stat-yellow" id="s-nocond">🟡 0 no-cond</span>
  <span class="stat stat-green" id="s-confirmed">✅ 0 confirmed</span>
  <span class="stat stat-blue" id="s-total">📋 0 total</span>
  <div id="progress-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <span id="progress-text">0 / 0</span>
  <input type="file" id="file-input" accept=".json" style="display:none">
  <button id="load-btn" onclick="document.getElementById('file-input').click()">📂 โหลด kb.json</button>
  <button id="download-btn" disabled onclick="downloadKb()">⬇ Download kb.json</button>
</div>

<div id="main">
  <div id="sidebar">
    <div id="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all')">ทั้งหมด</button>
      <button class="filter-btn" onclick="setFilter('mismatch')">🔴 Mismatch</button>
      <button class="filter-btn" onclick="setFilter('nocond')">🟡 No-cond</button>
      <button class="filter-btn" onclick="setFilter('pending')">⏳ Pending</button>
      <button class="filter-btn" onclick="setFilter('confirmed')">✅ Done</button>
    </div>
    <input id="search-box" type="text" placeholder="ค้นหา..." oninput="renderList()">
    <div id="rule-list"></div>
  </div>

  <div id="editor">
    <div id="editor-empty">← โหลด kb.json แล้วเลือกกฎ</div>
    <div id="editor-content">
      <div id="issue-banner"></div>
      <div class="rule-c" id="rule-c"></div>

      <div class="section-label">Tags</div>
      <div class="tags-wrap" id="rule-tags"></div>

      <div class="section-label">Conditions <small style="color:#475569;font-weight:400;font-size:.7rem">(แก้ได้ตรงนี้)</small></div>
      <table id="cond-table">
        <thead>
          <tr>
            <th>house_lord_of</th>
            <th>planet_id</th>
            <th>quality_required</th>
            <th>lagna_aspect_req</th>
            <th>required</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cond-body"></tbody>
      </table>
      <button id="add-cond-btn" onclick="addCondRow()">+ เพิ่ม condition</button>

      <div class="meta-row">
        <div class="meta-field">
          <label>rule_type</label>
          <select id="field-rule_type">
            <option value="">— ปกติ —</option>
            <option value="REFERENCE">REFERENCE</option>
            <option value="TRANSIT_RULE">TRANSIT_RULE</option>
          </select>
        </div>
        <div class="meta-field">
          <label>rule_source</label>
          <select id="field-rule_source">
            <option value="major">major</option>
            <option value="minor">minor</option>
            <option value="empirical">empirical</option>
            <option value="case_study">case_study</option>
          </select>
        </div>
        <div class="meta-field">
          <label>weight</label>
          <input id="field-weight" type="number" step="0.1" min="0" max="2">
        </div>
      </div>

      <div class="section-label">Prediction text (p)</div>
      <div class="rule-p" id="rule-p"></div>
    </div>

    <div id="action-bar" style="display:none">
      <button id="btn-prev" onclick="navigate(-1)">← ก่อนหน้า</button>
      <button class="action-btn" id="btn-confirm" onclick="confirmRule()">✓ Approve <span class="kbd">Enter</span></button>
      <button class="action-btn" id="btn-ref" onclick="markReference()">📋 REFERENCE <span class="kbd">R</span></button>
      <button class="action-btn" id="btn-skip" onclick="navigate(1)">Skip → <span class="kbd">→</span></button>
      <span id="rule-idx"></span>
    </div>
  </div>
</div>

<script>
let rules = [];
let kbRoot = null;
let currentIdx = 0;
let filter = 'all';
let filteredList = [];
const status = {}; // ruleIndex → 'confirmed'|'reference'|'skipped'|'pending'

const PLANET_NAMES = {'0':'มฤตยู','1':'อาทิตย์','2':'จันทร์','3':'อังคาร','4':'พุธ','5':'พฤหัส','6':'ศุกร์','7':'เสาร์','8':'ราหู','9':'เกตุ','10':'ลัคนา'};
const HOUSE_NAMES = {1:'ตนุ',2:'กฎุมพะ',3:'สหัช',4:'พันธุ',5:'บุตร',6:'อริ',7:'ปัตนิ',8:'มรณะ',9:'ศุภะ',10:'กัมมะ',11:'ลาภะ',12:'วินาศ'};

document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      kbRoot = data;
      rules = Array.isArray(data) ? data : (data.rules || []);
      rules.forEach((r,i) => { status[i] = r.rule_type === 'REFERENCE' ? 'reference' : 'pending'; });
      classifyRules();
      renderStats();
      renderList();
      selectRule(0);
      document.getElementById('download-btn').disabled = false;
    } catch(err) { alert('JSON ไม่ถูกต้อง: '+err.message); }
  };
  r.readAsText(f);
});

// ── Classification ──
const issueType = []; // 'mismatch'|'nocond'|'ok'
function classifyRules(){
  rules.forEach((r,i) => {
    const conds = r.conditions || [];
    const tText = JSON.stringify(r.t || []);
    if(!conds.length){
      issueType[i] = 'nocond';
    } else {
      const hasMismatch = conds.some(c => {
        if(!c.planet_id || c.planet_id === 'ANY') return false;
        const pid = String(c.planet_id);
        const name = PLANET_NAMES[pid];
        return name && !tText.includes(name) && !tText.includes('ดาว '+pid);
      });
      issueType[i] = hasMismatch ? 'mismatch' : 'ok';
    }
  });
}

function getDisplayFilter(i){
  const r = rules[i];
  const st = status[i];
  if(filter === 'all') return true;
  if(filter === 'mismatch') return issueType[i] === 'mismatch' && st === 'pending';
  if(filter === 'nocond') return issueType[i] === 'nocond' && st === 'pending';
  if(filter === 'pending') return st === 'pending';
  if(filter === 'confirmed') return st === 'confirmed' || st === 'reference';
  return true;
}

function setFilter(f){
  filter = f;
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', ['all','mismatch','nocond','pending','confirmed'][i] === f));
  renderList();
}

// ── List render ──
function renderList(){
  const q = document.getElementById('search-box').value.toLowerCase();
  filteredList = [];
  // sort: mismatch first, then nocond, then ok
  const order = {mismatch:0, nocond:1, ok:2};
  const sorted = rules.map((_,i)=>i).sort((a,b) => (order[issueType[a]]||2)-(order[issueType[b]]||2));
  sorted.forEach(i => {
    if(!getDisplayFilter(i)) return;
    const r = rules[i];
    if(q && !(r.c||'').toLowerCase().includes(q) && !JSON.stringify(r.t||[]).toLowerCase().includes(q)) return;
    filteredList.push(i);
  });
  const list = document.getElementById('rule-list');
  list.innerHTML = '';
  filteredList.forEach((i,pos) => {
    const r = rules[i];
    const st = status[i];
    const it = issueType[i];
    const div = document.createElement('div');
    div.className = 'rule-item' + (i===currentIdx?' active':'') + (st==='confirmed'||st==='reference'?' confirmed':'') + (st==='skipped'?' skipped':'') + (st==='reference'?' reference':'');
    const badgeClass = st==='confirmed'?'badge-confirmed': st==='reference'?'badge-ref': it==='mismatch'?'badge-mismatch': it==='nocond'?'badge-nocond':'badge-ok';
    const badgeText = st==='confirmed'?'✓': st==='reference'?'REF': it==='mismatch'?'mismatch': it==='nocond'?'no-cond':'ok';
    div.innerHTML = `<span class="rule-badge ${badgeClass}">${badgeText}</span><div class="rule-title">${esc(r.c||'')}</div>`;
    div.onclick = () => selectRule(i);
    list.appendChild(div);
  });
}

// ── Select rule ──
function selectRule(i){
  if(i < 0 || i >= rules.length) return;
  currentIdx = i;
  renderList();
  renderEditor(i);
  // scroll to item
  const list = document.getElementById('rule-list');
  const items = list.querySelectorAll('.rule-item');
  const pos = filteredList.indexOf(i);
  if(pos >= 0 && items[pos]) items[pos].scrollIntoView({block:'nearest'});
}

// ── Editor render ──
function renderEditor(i){
  const r = rules[i];
  document.getElementById('editor-empty').style.display = 'none';
  document.getElementById('editor-content').style.display = 'block';
  document.getElementById('action-bar').style.display = 'flex';

  // issue banner
  const it = issueType[i];
  const banner = document.getElementById('issue-banner');
  if(it === 'mismatch') banner.innerHTML = `<div class="issue-desc issue-mismatch" style="margin-bottom:12px;padding:8px 12px;border-radius:6px;background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;font-size:.78rem">⚠️ <b>Mismatch</b>: planet ใน conditions[] ไม่ปรากฏใน tags — อาจเป็น hardcoded ผิดลัคนา</div>`;
  else if(it === 'nocond') banner.innerHTML = `<div style="margin-bottom:12px;padding:8px 12px;border-radius:6px;background:#431407;border:1px solid #713f12;color:#fed7aa;font-size:.78rem">🟡 <b>No conditions</b>: กฎนี้ไม่มี conditions[] — fire จาก tag matching เท่านั้น อาจต้องเพิ่ม conditions หรือ mark REFERENCE</div>`;
  else banner.innerHTML = '';

  document.getElementById('rule-c').textContent = r.c || '(ไม่มีชื่อ)';
  document.getElementById('rule-p').textContent = r.p || '(ไม่มีข้อความ)';

  // tags
  const tagsWrap = document.getElementById('rule-tags');
  tagsWrap.innerHTML = '';
  const conds = r.conditions || [];
  const condPlanetIds = new Set(conds.map(c => c.planet_id).filter(Boolean));
  (r.t || []).forEach(tag => {
    const span = document.createElement('span');
    span.className = 'tag';
    // highlight if planet name matches a condition planet
    const matchesCond = Object.entries(PLANET_NAMES).some(([pid, name]) => condPlanetIds.has(pid) && tag.includes(name));
    if(matchesCond) span.classList.add('hl');
    span.textContent = tag;
    tagsWrap.appendChild(span);
  });

  // conditions table
  renderCondTable(conds);

  // meta fields
  document.getElementById('field-rule_type').value = r.rule_type || '';
  document.getElementById('field-rule_source').value = r.rule_source || 'major';
  document.getElementById('field-weight').value = r.weight !== undefined ? r.weight : 1;

  // rule index
  const pos = filteredList.indexOf(i);
  document.getElementById('rule-idx').textContent = `${pos+1} / ${filteredList.length} (กฎ #${i+1})`;
}

function renderCondTable(conds){
  const tbody = document.getElementById('cond-body');
  tbody.innerHTML = '';
  if(!conds.length){
    tbody.innerHTML = '<tr><td colspan="6" style="color:#475569;text-align:center;padding:8px">ไม่มี conditions</td></tr>';
    return;
  }
  conds.forEach((c,ci) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="number" min="1" max="12" value="${c.house_lord_of||''}" placeholder="H1-12" onchange="updateCond(${ci},'house_lord_of',this.value)"></td>
      <td><select onchange="updateCond(${ci},'planet_id',this.value)">
        <option value="">—</option>
        <option value="ANY">ANY</option>
        ${Object.entries(PLANET_NAMES).map(([k,v])=>`<option value="${k}" ${c.planet_id===k?'selected':''}>${k}=${v}</option>`).join('')}
      </select></td>
      <td><input value="${esc(c.quality_required||'')}" placeholder="ดี/เสีย/อุจ/..." onchange="updateCond(${ci},'quality_required',this.value)"></td>
      <td><input value="${esc(c.lagna_aspect_req||'')}" placeholder="กุมลัคนา/เล็ง/..." onchange="updateCond(${ci},'lagna_aspect_req',this.value)"></td>
      <td><select onchange="updateCond(${ci},'required',this.value==='true')">
        <option value="true" ${c.required!==false?'selected':''}>true</option>
        <option value="false" ${c.required===false?'selected':''}>false</option>
      </select></td>
      <td><button class="del-cond" onclick="deleteCond(${ci})">✕</button></td>`;
    tbody.appendChild(tr);
  });
}

function updateCond(ci, field, val){
  const r = rules[currentIdx];
  if(!r.conditions) r.conditions = [];
  if(field === 'house_lord_of'){
    const n = parseInt(val);
    if(n >= 1 && n <= 12) r.conditions[ci].house_lord_of = n;
    else delete r.conditions[ci].house_lord_of;
  } else {
    r.conditions[ci][field] = val;
  }
  // re-classify
  classifyRules();
  renderStats();
}

function deleteCond(ci){
  const r = rules[currentIdx];
  r.conditions.splice(ci,1);
  renderCondTable(r.conditions);
  classifyRules(); renderStats();
}

function addCondRow(){
  const r = rules[currentIdx];
  if(!r.conditions) r.conditions = [];
  r.conditions.push({planet_id:'',quality_required:'',lagna_aspect_req:'',required:true});
  renderCondTable(r.conditions);
}

// ── Actions ──
function saveMetaFields(){
  const r = rules[currentIdx];
  const rt = document.getElementById('field-rule_type').value;
  r.rule_type = rt || undefined;
  if(!r.rule_type) delete r.rule_type;
  r.rule_source = document.getElementById('field-rule_source').value;
  r.weight = parseFloat(document.getElementById('field-weight').value) || 1;
}

function confirmRule(){
  saveMetaFields();
  status[currentIdx] = 'confirmed';
  renderStats();
  renderList();
  navigate(1);
}

function markReference(){
  rules[currentIdx].rule_type = 'REFERENCE';
  document.getElementById('field-rule_type').value = 'REFERENCE';
  status[currentIdx] = 'reference';
  renderStats();
  renderList();
  navigate(1);
}

function navigate(dir){
  const pos = filteredList.indexOf(currentIdx);
  const nextPos = pos + dir;
  if(nextPos >= 0 && nextPos < filteredList.length){
    selectRule(filteredList[nextPos]);
  }
}

// ── Stats ──
function renderStats(){
  const total = rules.length;
  const mismatch = rules.filter((_,i)=>issueType[i]==='mismatch'&&status[i]==='pending').length;
  const nocond = rules.filter((_,i)=>issueType[i]==='nocond'&&status[i]==='pending').length;
  const confirmed = Object.values(status).filter(s=>s==='confirmed'||s==='reference').length;
  document.getElementById('s-mismatch').textContent = `🔴 ${mismatch} mismatch`;
  document.getElementById('s-nocond').textContent = `🟡 ${nocond} no-cond`;
  document.getElementById('s-confirmed').textContent = `✅ ${confirmed} done`;
  document.getElementById('s-total').textContent = `📋 ${total} total`;
  document.getElementById('progress-bar').style.width = (confirmed/total*100)+'%';
  document.getElementById('progress-text').textContent = `${confirmed} / ${total}`;
}

// ── Download ──
function downloadKb(){
  saveMetaFields();
  const out = Array.isArray(kbRoot) ? rules : {...kbRoot, rules};
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kb_reviewed.json';
  a.click();
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if(e.key === 'Enter') confirmRule();
  else if(e.key === 'r' || e.key === 'R') markReference();
  else if(e.key === 'ArrowRight') navigate(1);
  else if(e.key === 'ArrowLeft') navigate(-1);
  else if(e.key === 'ArrowDown'){e.preventDefault(); navigate(1);}
  else if(e.key === 'ArrowUp'){e.preventDefault(); navigate(-1);}
});

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// auto-load from relative path if on HTTP server
fetch('../v3/kb.json').then(r=>r.ok?r.json():null).then(data=>{
  if(!data) return;
  kbRoot = data;
  rules = Array.isArray(data) ? data : (data.rules || []);
  rules.forEach((r,i) => { status[i] = r.rule_type === 'REFERENCE' ? 'reference' : 'pending'; });
  classifyRules(); renderStats(); renderList(); selectRule(0);
  document.getElementById('download-btn').disabled = false;
  document.getElementById('load-btn').textContent = '✓ โหลดแล้ว';
}).catch(()=>{});
</script>
