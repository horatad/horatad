<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horatad — Extract Conditions</title>
<style>
:root {
  --gold:#b8860b; --purple:#5b3fa0; --green:#1a6b3c; --red:#f85149;
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --border:#30363d;
  --text:#c9d1d9; --muted:#8b949e;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Sarabun',sans-serif; font-size:14px; }
header {
  background:linear-gradient(135deg,#0d1117,#1a0f2e);
  border-bottom:1px solid var(--gold); padding:12px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
header h1 { color:var(--gold); font-size:18px; letter-spacing:2px; }
header .sub { color:var(--muted); font-size:12px; }
.toolbar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:10px 20px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
button {
  padding:6px 14px; border:none; border-radius:6px; cursor:pointer;
  font-family:'Sarabun',sans-serif; font-size:13px; font-weight:600;
}
.btn-run { background:#1a6b3c; color:#fff; }
.btn-run:disabled { background:#333; color:#666; cursor:not-allowed; }
.btn-dl { background:var(--purple); color:#fff; }
.btn-dl:disabled { background:#333; color:#666; cursor:not-allowed; }
.btn-stop { background:var(--red); color:#fff; }
.progress-wrap {
  padding:16px 20px; background:var(--bg2); border-bottom:1px solid var(--border);
}
.progress-bar-outer {
  background:var(--bg3); border-radius:4px; height:8px; margin:8px 0; overflow:hidden;
}
.progress-bar-inner {
  background:var(--green); height:8px; border-radius:4px; width:0%;
  transition:width .3s ease;
}
.status-text { color:var(--muted); font-size:13px; }
.log-wrap { padding:16px 20px; max-height:300px; overflow-y:auto; }
.log-item {
  padding:4px 8px; margin-bottom:4px; border-radius:4px;
  font-size:12px; font-family:monospace; border-left:3px solid transparent;
}
.log-ok { border-color:var(--green); background:rgba(26,107,60,.1); color:#7ee787; }
.log-err { border-color:var(--red); background:rgba(248,81,73,.1); color:#f85149; }
.log-info { border-color:var(--gold); background:rgba(184,134,11,.1); color:#d4a017; }
.result-wrap { padding:20px; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { background:var(--bg3); padding:8px; text-align:left; border:1px solid var(--border); color:var(--gold); }
td { padding:6px 8px; border:1px solid var(--border); vertical-align:top; }
tr:hover td { background:var(--bg2); }
.tag-ok { background:rgba(26,107,60,.3); color:#7ee787; padding:2px 6px; border-radius:3px; font-size:11px; }
.tag-err { background:rgba(248,81,73,.3); color:#f85149; padding:2px 6px; border-radius:3px; font-size:11px; }
.cond-row { background:var(--bg3); padding:3px 6px; border-radius:3px; margin:2px 0; font-size:11px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Extract Conditions</h1>
    <div class="sub">Reverse-engineer tb_prediction_conditions จาก tb_predictions โดย Typhoon</div>
  </div>
  <div style="color:var(--muted);font-size:12px;">
    <span id="stat-total">342</span> กฎ &nbsp;|&nbsp; batch ละ <span id="stat-batch">10</span>
  </div>
</header>

<div class="toolbar">
  <button class="btn-run" id="btn-run" onclick="runExtract()">▶ เริ่ม Extract</button>
  <button class="btn-stop" id="btn-stop" onclick="stopExtract()" style="display:none">⏹ หยุด</button>
  <button class="btn-dl" id="btn-dl" onclick="downloadJSON()" disabled>⬇ Download JSON</button>
  <button class="btn-dl" id="btn-dl-csv" onclick="downloadCSV()" disabled style="background:#7d4e00;">⬇ Download CSV</button>
  <label style="color:var(--muted);font-size:12px;margin-left:8px;">
    Batch size:
    <select id="sel-batch" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 6px;">
      <option value="8">8</option>
      <option value="10" selected>10</option>
      <option value="15">15</option>
    </select>
  </label>
  <label style="color:var(--muted);font-size:12px;">
    หยุดที่ batch:
    <input id="inp-stop" type="number" min="1" value="" placeholder="ทั้งหมด"
      style="width:80px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 6px;">
  </label>
</div>

<div class="progress-wrap">
  <div class="status-text" id="status">พร้อมทำงาน — กด "เริ่ม Extract"</div>
  <div class="progress-bar-outer"><div class="progress-bar-inner" id="pbar"></div></div>
  <div style="display:flex;gap:20px;margin-top:4px;font-size:12px;color:var(--muted);">
    <span>สำเร็จ: <b id="cnt-ok" style="color:#7ee787;">0</b></span>
    <span>ข้าม: <b id="cnt-skip" style="color:var(--gold);">0</b></span>
    <span>Error: <b id="cnt-err" style="color:var(--red);">0</b></span>
    <span>รวม conditions: <b id="cnt-cond" style="color:var(--text);">0</b></span>
  </div>
</div>

<div class="log-wrap" id="log"></div>

<div class="result-wrap" id="result-wrap" style="display:none">
  <h3 style="color:var(--gold);margin-bottom:12px;">ผลลัพธ์</h3>
  <table id="result-table">
    <thead>
      <tr>
        <th>predict_id</th>
        <th>chapter</th>
        <th>condition_text</th>
        <th>conditions</th>
      </tr>
    </thead>
    <tbody id="result-body"></tbody>
  </table>
</div>

<script>
const WORKER_URL = 'https://horatad-ai.uchujaro5.workers.dev';
const MODEL = 'typhoon-v2.5-30b-a3b-instruct';

const RULES = [{"id":1000,"ch":"chapter_01","c":"ต้องการทราบราศีในแผ่นดวงชาตา","p":"ราศีเป็นตำแหน่งคงที่ 12 ราศีในจักรราศี นับทวนเข็มนาฬิกาจากเมษ(0)ถึงมีน(11) เกษตรเรือนในสำคัญกว่าความหมายนักษัตรของราศี","t":"ราศี, จักรราศี, พื้นฐาน"},{"id":1001,"ch":"chapter_02","c":"ดาวโคจรเร็วกว่าปกติ","p":"เรียกว่า เสริด","t":"เสริด, การโคจร, ดาวเคราะห์"},{"id":1002,"ch":"chapter_02","c":"ดาวโคจรช้าหรือถอยหลัง","p":"เรียกว่า พักร","t":"พักร, การโคจร, ถอยหลัง"},{"id":1003,"ch":"chapter_02","c":"ดาวเริ่มช้าแล้วโคจรย้อนวิถีหรืออยู่นานกว่าปกติ","p":"เรียกว่า มนท์","t":"มนท์, การโคจร"},{"id":1004,"ch":"chapter_02","c":"ดาวราหู(๘) และเกตุ(๙) โคจร","p":"โคจรทวนดาวอื่น คือตามเข็มนาฬิกา — ราหู เกตุ มฤตยู เป็นดาวสมมุติ ไม่มีจริง สร้างขึ้นเพื่อเพิ่มความแม่นยำ","t":"ราหู, เกตุ, โคจรย้อน, ดาวสมมุติ"},{"id":1005,"ch":"chapter_02","c":"ดาวเกตุ(๙) ราหู(๘) มฤตยู(0)","p":"ไม่มีตำแหน่งเกษตร ไม่เป็นดาวเจ้าเรือนในราศีใด","t":"เกตุ, ราหู, มฤตยู, ไม่มีเกษตร"},{"id":1006,"ch":"chapter_03","c":"ภพอริ มรณะ วินาศ เปรียบเทียบความร้ายแรง","p":"มรณะร้ายแรงที่สุด — สูญเสียโดยไม่ได้สิ่งตอบแทน ยกเว้นเจ้าเรือนมรณะมาอยู่กฎุมพะ = ได้ทรัพย์จากการสูญเสียหรือมรดก","t":"มรณะ, อริ, วินาศ, ภพร้าย"},{"id":1007,"ch":"chapter_03","c":"ดาวตกภพวินาศ","p":"หมดไปหรือจากไป แต่อาจยังมีสิ่งตอบแทน ไม่เสียเปล่า","t":"วินาศ, จากไป"},{"id":1008,"ch":"chapter_03","c":"ดาวตกภพอริ","p":"ไม่ชอบ หรือมีอุปสรรค","t":"อริ, อุปสรรค"},{"id":1009,"ch":"chapter_04","c":"ดาวอาทิตย์(๑) กุมลัคนาหรือสัมพันธ์ลัคนา","p":"หยิ่งในศักดิ์ศรี รักหน้า ไม่ยอมเสียหน้า ชอบให้คนยกย่อง อีโก้สูง","t":"อาทิตย์, หยิ่ง, ศักดิ์ศรี, ลัคนา"},{"id":1010,"ch":"chapter_04","c":"ดาวจันทร์(๒) กุมลัคนาหรือสัมพันธ์ลัคนา","p":"กริยามารยาทนุ่มนวล มีเสน่ห์ อ่อนหวาน มีจริตแบบผู้หญิง","t":"จันทร์, เสน่ห์, อ่อนหวาน, ลัคนา"},{"id":1011,"ch":"chapter_04","c":"ดาวอังคาร(๓) กุมลัคนาหรือสัมพันธ์ลัคนา","p":"ขยัน แข็งกร้าว ไม่ยอมคน โผงผาง ใจร้อน กล้าหาญ มีตรรกะ ทักษะช่าง","t":"อังคาร, ขยัน, กล้า, ลัคนา"},{"id":1012,"ch":"chapter_04","c":"ดาวพุธ(๔) กุมลัคนาหรือสัมพันธ์ลัคนา","p":"ละเอียด ประณีต คิดลึกซึ้ง ช่างเจรจา ชอบงานหนังสือ การสื่อสาร","t":"พุธ, ละเอียด, เจรจา, ลัคนา"},{"id":1013,"ch":"chapter_04","c":"ดาวพฤหัส(๕) กุมลัคนาหรือสัมพันธ์ลัคนา","p":"มีคุณธรรม ใจอ่อน เมตตา ขี้สงสาร มองโลกในแง่ดี มีสติยั้งคิดเสมอ","t":"พฤหัส, คุณธรรม, เมตตา, ลัคนา"},{"id":1014,"ch":"chapter_04","c":"ดาวศุกร์(๖) กุมลัคนาหรือสัมพันธ์ลัคนา","p":"มีทักษะศิลปะ จินตนาการ เพ้อฝัน ชอบรื่นเริง ของสวยงาม และกำหนัดความใคร่","t":"ศุกร์, ศิลปะ, กำหนัด, ลัคนา"},{"id":1015,"ch":"chapter_04","c":"ดาวเสาร์(๗) กุมลัคนาหรือสัมพันธ์ลัคนา","p":"คิดมาก ไตร่ตรองรอบคอบ ทำงานเชื่องช้า อดทนสูง ทำงานหนัก เกษตรกรรม","t":"เสาร์, คิดมาก, อดทน, ลัคนา"},{"id":1016,"ch":"chapter_04","c":"ดาวราหู(๘) กุมลัคนาหรือสัมพันธ์ลัคนา","p":"ลุ่มหลงมัวเมา เล่ห์เหลี่ยม หลอกลวง กล้าเสี่ยง ชอบหุ้นหวย อบายมุข","t":"ราหู, ลุ่มหลง, เล่ห์, ลัคนา"},{"id":1017,"ch":"chapter_04","c":"ดาวเกตุ(๙) สัมพันธ์กับดาวดี","p":"ทวีคูณให้ดียิ่งขึ้น ถ้าร่วมกับดาวดีและสัมพันธ์ถึงลัคนา = อายุยืน","t":"เกตุ, ทวีคูณ, อายุยืน"},{"id":1018,"ch":"chapter_04","c":"ดาวเกตุ(๙) สัมพันธ์กับดาวเสีย","p":"ทวีคูณให้เสียมากยิ่งขึ้น","t":"เกตุ, ทวีคูณ, ดาวเสีย"},{"id":1019,"ch":"chapter_04","c":"ดาวมฤตยู(0) อยู่ในเรือนใด","p":"มีการเปลี่ยนแปลงในเรือนนั้น — ปัตนิ=เปลี่ยนคู่ กัมมะ=เปลี่ยนงาน กฎุมพะ=การเงินรั่วไหล ถ้าสัมพันธ์ลัคนา=เจ้าอารมณ์แปรปรวน","t":"มฤตยู, แปรปรวน, เปลี่ยนแปลง"},{"id":1020,"ch":"chapter_05","c":"จำแนกดาวบาปเคราะห์และศุภเคราะห์","p":"บาปเคราะห์(ให้โทษ อำนาจ): ๑ ๓ ๗ ๘ — ศุภเคราะห์(ให้คุณ บารมี): ๒ ๔ ๕ ๖ — การแบ่งนี้เป็นพื้นฐานกว้างๆ ไม่ได้ผลในทางพยากรณ์มากนัก","t":"บาปเคราะห์, ศุภเคราะห์, พื้นฐาน"},{"id":1021,"ch":"chapter_06","c":"ดาวอยู่ในราศีเกษตรของตน","p":"มั่นคง แน่นอน อุดมสมบูรณ์ ให้ผลอย่างค่อยเป็นค่อยไปแต่มั่นคง ให้ผลเต็มที่ในบั้นปลาย — กราฟเส้นตรงเอียงขึ้น 45 องศา","t":"เกษตร, มั่นคง, ให้ผลช้า"},{"id":1022,"ch":"chapter_06","c":"ดาวอยู่ในราศีประเกษตร (ตรงข้ามเกษตร)","p":"ไม่มั่นคง ขาดแคลน เสื่อมถอยช้าๆ ตกต่ำที่สุดในบั้นปลาย — กราฟเส้นตรงเอียงลาดลง","t":"ประเกษตร, ไม่มั่นคง, เสื่อมถอย"},{"id":1023,"ch":"chapter_06","c":"ดาวอยู่ในราศีอุจ","p":"รุ่งโรจน์ อุดมสมบูรณ์ ได้มาด้วยความนิยม ให้คุณแรงและสม่ำเสมอ — กราฟเส้นตรงแนวนอนระดับสูง","t":"อุจ, รุ่งโรจน์, สม่ำเสมอ"},{"id":1024,"ch":"chapter_06","c":"ดาวอยู่ในราศีนิจ (ตรงข้ามอุจ)","p":"ด้อยต่ำ เสื่อมถอย ไม่ได้รับการยอมรับ ให้โทษไม่แรงแต่สม่ำเสมอ — กราฟเส้นตรงแนวนอนระดับต่ำ","t":"นิจ, ด้อย, ไม่ได้รับยอมรับ"},{"id":1025,"ch":"chapter_06","c":"ดาวอยู่ในราศีก่อนถึงอุจ (อุจจาวิลาส)","p":"ให้คุณประมาณ 60% ของอุจ","t":"อุจจาวิลาส, ให้คุณ60"},{"id":1026,"ch":"chapter_06","c":"ดาวอยู่ในราศีถัดจากอุจ (อุจจาภิมุข)","p":"ให้คุณประมาณ 60% ของอุจ","t":"อุจจาภิมุข, ให้คุณ60"},{"id":1027,"ch":"chapter_06","c":"ดาวอยู่ในราศีมหาจักร","p":"ให้คุณสูงมาก ผาดโผน รวดเร็ว ข้ามขั้นตอน แต่ไม่สม่ำเสมอ — ได้ทรัพย์เป็นก้อนใหญ่หรือโดยไม่คาดหมาย","t":"มหาจักร, ผาดโผน, ได้เป็นก้อน, ไม่สม่ำเสมอ"},{"id":1028,"ch":"chapter_06","c":"ดาวอยู่ในราศีจุลจักร (ตรงข้ามมหาจักร)","p":"ให้คุณแบบเดียวกับมหาจักรแต่ 60%","t":"จุลจักร, ให้คุณ60"},{"id":1029,"ch":"chapter_06","c":"ดาวอยู่ในราศีราชาโชค","p":"ได้มาโดยง่าย เรื่อยๆ สบายๆ ไม่ต้องลงทุนลงแรง ให้คุณสม่ำเสมอแต่ไม่แรงมาก","t":"ราชาโชค, ได้มาง่าย, สบาย, สม่ำเสมอ"},{"id":1030,"ch":"chapter_06","c":"ดาวอยู่ในราศีเทวีโชค (ตรงข้ามราชาโชค)","p":"ให้คุณแบบราชาโชคแต่ 60% — ถ้ากุมลัคนาจะให้คุณเกือบเท่าราชาโชค","t":"เทวีโชค, ให้คุณ60, กุมลัคนา"},{"id":1031,"ch":"chapter_07","c":"ดาวธาตุไฟอยู่ในราศีธาตุน้ำ","p":"อ่อนกำลังลงมาก","t":"ธาตุ, ไฟ, น้ำ, อ่อนกำลัง"},{"id":1032,"ch":"chapter_07","c":"ดาวธาตุไฟอยู่ในราศีธาตุลม","p":"ทวีกำลังแรงขึ้น","t":"ธาตุ, ไฟ, ลม, ทวีกำลัง"},{"id":1033,"ch":"chapter_07","c":"ดาวธาตุเดียวกันสัมพันธ์กัน","p":"เข้ากันได้สนิท เสริมกัน","t":"ธาตุ, คู่ธาตุ, เสริมกัน"},{"id":1034,"ch":"chapter_08","c":"ดาวคู่มิตรร่วมราศีหรือสัมพันธ์กัน (๑๕, ๒๔, ๓๖, ๗๘)","p":"ส่งเสริมกัน มีกำลังมากยิ่งขึ้น — แม้เสาร์กับราหูก็ให้โชคใหญ่","t":"คู่มิตร, เสริมกัน, โชค"},{"id":1035,"ch":"chapter_08","c":"ดาวคู่ศัตรูสัมพันธ์กัน (๑๓, ๒๕, ๔๘, ๖๗)","p":"บ่อนทำลายกัน อ่อนกำลังทั้งคู่ เกิดความขัดแย้ง","t":"คู่ศัตรู, บ่อนทำลาย, ขัดแย้ง"},{"id":1036,"ch":"chapter_08","c":"ดาวคู่สมพลร่วมราศีหรือสัมพันธ์กัน (๑๖, ๒๘, ๓๕, ๔๗)","p":"ส่งเสริมกัน มีกำลังมากขึ้นทั้งคู่ คล้ายคู่มิตร","t":"คู่สมพล, เสริมกัน"},{"id":1037,"ch":"chapter_08","c":"ดาวจันทร์(๒) กับพฤหัส(๕) ร่วมราศี — คู่ธาตุดินแต่เป็นคู่ศัตรูด้วย","p":"ดีกันไม่จริง ร้ายกันก็ไม่มาก — แต่ร่วมราศีให้คุณด้านกริยามารยาทอ่อนหวานสงบน่านับถือ","t":"จันทร์, พฤหัส, คู่ธาตุ, คู่ศัตรูเล็ก"},{"id":1038,"ch":"chapter_09","c":"ดาวกุมกัน (อยู่ราศีเดียวกัน)","p":"ส่งกำลังถึงกัน 100%","t":"กุม, 100เปอร์เซ็นต์, ร่วมราศี"},{"id":1039,"ch":"chapter_09","c":"ดาวเล็งกัน (ตรงข้ามราศี = เป็น 7 แก่กัน)","p":"ส่งกำลังถึงกัน 80%","t":"เล็ง, 80เปอร์เซ็นต์"},{"id":1040,"ch":"chapter_09","c":"ดาวโยคกัน (นับได้ 3 หรือ 11 ราศี)","p":"ส่งกำลังถึงกัน 60%","t":"โยค, 60เปอร์เซ็นต์"},{"id":1041,"ch":"chapter_09","c":"ดาวตรีโกณกัน (นับได้ 5 หรือ 9 ราศี)","p":"ส่งกำลังถึงกัน 50%","t":"ตรีโกณ, 50เปอร์เซ็นต์"},{"id":1042,"ch":"chapter_09","c":"ดาวไม่กุม-เล็ง-โยค-ตรีโกณกับลัคนา","p":"ไม่ให้ผลในทางปัจจัยภายนอก แต่มีผลด้านอัจฉริยภาพภายในของเจ้าชาตา","t":"ไม่สัมพันธ์ลัคนา, ภายใน, ไม่แสดงออก"},{"id":1043,"ch":"chapter_10","c":"ดาวเกษตร 2 ดวงอยู่ราศีตรงข้ามกัน (เล็งกัน)","p":"กลายเป็นประเกษตรทั้งคู่ — ดีก่อน ภายหลังเสื่อมถอย (กฎลบ-ลบ=บวก)","t":"เกษตร, เล็ง, ประเกษตร, ดีก่อนเสียทีหลัง"},{"id":1044,"ch":"chapter_10","c":"ดาวประเกษตร 2 ดวงเล็งกัน","p":"กลายเป็นเกษตรทั้งคู่ — ไม่ดีก่อน ภายหลังจึงดี","t":"ประเกษตร, เล็ง, กลายเป็นเกษตร"},{"id":1045,"ch":"chapter_10","c":"ดาวอุจ 2 ดวงเล็งกัน","p":"กลายเป็นนิจทั้งคู่ อาจล้มทั้งยืนหรือหักโค่นครั้งใหญ่ เพราะอุจให้ผลเร็ว","t":"อุจ, เล็ง, นิจ, ล้มทั้งยืน"},{"id":1046,"ch":"chapter_10","c":"ดาว 2 ดวงอยู่ในเรือนเกษตรของกันและกัน (สลับเรือน)","p":"กลายเป็นอนุเกษตรทั้งคู่ ให้คุณรองจากเกษตร ให้คุณทันทีตั้งแต่เกิดแต่อาจช้ากว่าเกษตร","t":"สลับเรือน, อนุเกษตร, ให้คุณทันที"},{"id":1047,"ch":"chapter_10","c":"กฎลบ-ลบ ใช้กับดวงใดบ้าง","p":"ใช้เฉพาะเกษตร ประเกษตร อุจ นิจ เท่านั้น — ไม่ใช้กับมหาจักร อุจจาวิลาส อุจจาภิมุข ราชาโชค เทวีโชค","t":"กฎลบลบ, ข้อจำกัด"},{"id":1048,"ch":"chapter_11","c":"ต้องการทราบความหมายของดาวเรือนนอกและเรือนใน","p":"เรือนนอก = ดาวที่เขียนในแผ่นดวง เห็นด้วยตาเปล่า — เรือนใน = ดาวเกษตรเจ้าเรือนประจำราศี ไม่เขียนแต่มีตัวตนหลังฉาก ต้องคิดไว้ในใจเสมอ","t":"เรือนนอก, เรือนใน, เกษตรเจ้าเรือน"},{"id":1049,"ch":"chapter_12","c":"ดาวลัคนาเสวยฤกษ์ใด — ใช้พยากรณ์อาชีพ","p":"ฤกษ์ 9 กลุ่ม: ทลิทโท=ยากจนทำงานหนัก, มหัทธโน=มั่งคั่ง, โจโร=เสี่ยงอันตราย, ภูมิปาโล=ราชการ, เทศาตรี=เดินทางค้าขาย, เทวี=ได้คู่ดี, เพชฌฆาต=ปราบปราม, ราชา=บุญญาธิการ, สมโณ=นักบวช/ศาสนาดี","t":"ฤกษ์, อาชีพ, ลัคนา"},{"id":1050,"ch":"chapter_12","c":"ฤกษ์สำคัญเพียงใดในการพยากรณ์","p":"เป็นแนวทางกว้างๆเท่านั้น — ต้องดูดาวเด่นสัมพันธ์ลัคนาและภพกัมมะเป็นสำคัญกว่า","t":"ฤกษ์, ไม่สำคัญมาก, กัมมะ"},{"id":1051,"ch":"chapter_13","c":"ลัคนาไม่ถูกต้องหรือสงสัย","p":"ลองย้ายลัคนาเดินหน้าหรือถอยหลัง 1 ราศีโดยเปลี่ยนเวลาเกิด — ราศีใดพยากรณ์ตรงกับข้อเท็จจริง ให้ถือราศีนั้น ไม่ต้องดูดวงซ้อนดวง","t":"ลัคนา, สอบลัคนา, ย้ายลัคนา"},{"id":1052,"ch":"chapter_13","c":"เจ้าชาตาไม่รู้เวลาเกิด","p":"ยังสามารถคาดคะเนลัคนาได้จากนิสัยเด่นๆ ประสบการณ์สำคัญในชีวิต — ไม่เป็นความจริงที่ว่าไม่รู้เวลาเกิดผูกดวงไม่ได้","t":"ไม่รู้เวลาเกิด, สอบลัคนา, นิสัย"},{"id":1053,"ch":"chapter_13","c":"ดาวอะไรเป็นตนุเศษ","p":"บอกนิสัยโดยรวมโดยไม่ต้องดูคุณภาพหรือภพ — ๑=หยิ่งรักหน้า ๒=อ่อนหวานมารยาทดี ๓=ขยัน ๔=ละเอียด ๕=ใจอ่อนเมตตาไม่โกง ๖=จินตนาการรื่นเริง ๗=คิดมากรอบคอบ","t":"ตนุเศษ, นิสัย, ไม่ดูภพ, ไม่ดูคุณภาพ"},{"id":1054,"ch":"chapter_13","c":"ตนุลัคน์คือดาวอะไร","p":"สันดานแท้จริงภายในของเจ้าชาตา — ดาวดีหรือเสีย จะไปภพอะไร ก็ยังเป็นสันดานนั้น ถ้าสัมพันธ์ลัคนา=แสดงออก ถ้าไม่สัมพันธ์=ไม่ค่อยแสดงออก","t":"ตนุลัคน์, สันดานแท้, สัมพันธ์ลัคนา"},{"id":1055,"ch":"chapter_13","c":"ตนุลัคน์ไปอยู่ภพใด","p":"เจ้าชาตาให้ความสำคัญและมีชีวิตยุ่งเกี่ยวกับภพนั้นมาก — ตนุ=ถือตัวเองเป็นใหญ่ กฎุมพะ=หาเงิน อริ=ชอบหาความยุ่งยากใส่ตัว มรณะ=ดวงเปราะ วินาศ=ปลีกวิเวก","t":"ตนุลัคน์, ภพ, ชีวิตยุ่งเกี่ยว"},{"id":1056,"ch":"chapter_13","c":"ตนุลัคน์ไปร่วมราศีกับดาวใด","p":"ทำให้มีคุณสมบัติและเกี่ยวข้องกับดาวนั้นด้วย แม้ดาวนั้นไม่สัมพันธ์ลัคนาโดยตรง — ดาวที่เล็งตนุลัคน์ก็ส่งผลเช่นกันแต่ % น้อยกว่า","t":"ตนุลัคน์, ร่วมราศี, คุณสมบัติดาวอื่น"},{"id":1057,"ch":"chapter_13","c":"ตนุลัคน์คือ ๓ (อังคาร) ตกภพมรณะ และมีมฤตยู(0) สัมพันธ์","p":"น่าเป็นห่วงมากกว่าดวงเปราะทั่วไป — มีปัญหาสุขภาพตลอดชีวิต อาจเป็นปัญหาใหญ่ได้ตลอดเวลา","t":"อังคาร, ตนุลัคน์, มรณะ, มฤตยู, สุขภาพ"},{"id":1058,"ch":"chapter_32","c":"ดาวราหู(๘) เสีย (ประเกษตร/นิจ) สัมพันธ์ถึงลัคนา","p":"งมงาย เชื่ออะไรง่ายไม่มีเหตุผล ไม่ทันคน ถูกหลอกลวงง่าย — ถ้ากุมลัคนาชัดเจนที่สุด เล็ง/โยค/ตรีโกณน้อยลงตามส่วน","t":"ราหู, เสีย, สัมพันธ์ลัคนา, งมงาย, ถูกหลอก"},{"id":1059,"ch":"chapter_32","c":"ดาวราหู(๘) เสีย ไม่สัมพันธ์ถึงลัคนา","p":"เบาบางลง ไม่ถึงตัว แต่ยังเชื่อคนง่าย ถูกหลอกได้ในฐานะอัจฉริยภาพภายใน — ทำหุ้น หวย สิ่งมึนเมา ก็มีแต่เจ๊ง ไม่ถูกโฉลก","t":"ราหู, เสีย, ไม่สัมพันธ์ลัคนา, เชื่อง่าย"},{"id":1060,"ch":"chapter_32","c":"ดาวราหู(๘) ดี (อุจจาวิลาส/อุจจาภิมุข/อุจ/มหาจักร) กุมลัคนา","p":"เจ้าเล่ห์และโกงโดยแท้ ดาวพฤหัส(๕) อาทิตย์(๑) อังคาร(๓) แรงขนาดไหนก็ทานไม่อยู่ — ลุ่มหลงอย่างมาก ฉลาดทันโลก แต่ไม่ติดเหล้า/พนัน เพราะรู้ทัน","t":"ราหู, ดีมาก, กุมลัคนา, โกง, เจ้าเล่ห์"},{"id":1061,"ch":"chapter_32","c":"ดาวราหู(๘) คุณภาพปกติ กุมลัคนา","p":"ลุ่มหลงอะไรสักอย่าง เกเรช่วงต้น ไม่เรียน ติดอบายมุขได้ทุกอย่าง ฉลาดทันคน — มักไม่โกง ดาวพฤหัส(๕) แรงขนาดไหนก็ทานไม่อยู่","t":"ราหู, ปกติ, กุมลัคนา, ลุ่มหลง, เกเร"},{"id":1062,"ch":"chapter_32","c":"ดาวราหู(๘) เกษตร/ราชาโชค กุมลัคนา","p":"เหมือนคุณภาพปกติแต่ออกทางเจ้าเล่ห์ — ยิ่งอายุมากยิ่งโกง ช่วงต้นเกเรแต่กลับตัวได้เร็วถ้าดาวพฤหัส(๕)แรง","t":"ราหู, เกษตร, ราชาโชค, กุมลัคนา, โกงอายุมาก"},{"id":1063,"ch":"chapter_32","c":"ดาวราหู(๘) เล็ง/โยค/ตรีโกณลัคนา","p":"มีทั้งดีและร้าย ดี-ร้ายธรรมดาถึงมากตามส่วน — % ความสัมพันธ์ถึงตนุลดลงทำให้ไม่รุนแรงเท่ากุมลัคนา","t":"ราหู, เล็ง, โยค, ตรีโกณ, ลัคนา"},{"id":1064,"ch":"chapter_32","c":"ดาวราหู(๘) ดี ไม่สัมพันธ์ถึงลัคนา","p":"ฉลาดทันเล่ห์เหลี่ยมในฐานะอัจฉริยภาพภายใน โกงเป็นแต่มักไม่โกง — ถ้าโกงก็ไม่ถูกโฉลก อาจถูกจับได้ ตกภพมรณะ=กำลังรุ่งก็ล้มทั้งยืน","t":"ราหู, ดี, ไม่สัมพันธ์ลัคนา, ไม่ถูกโฉลก"},{"id":1065,"ch":"chapter_32","c":"ดาวราหู(๘) มหาจักร/จุลจักร ไม่สัมพันธ์ลัคนา","p":"คาดการณ์ยาก — บางคนลุ่มหลงและโกงได้มากทั้งที่ไม่สัมพันธ์ลัคนา บางคนกลับไม่มีเรื่องเลย ถือเป็นข้อสังเกตกรณีพิเศษ","t":"ราหู, มหาจักร, จุลจักร, ไม่สัมพันธ์ลัคนา, คาดการณ์ยาก"},{"id":1066,"ch":"chapter_32","c":"ดูดาวราหู(๘) ทุกครั้ง","p":"ต้องดูดาวพฤหัส(๕)=สติยั้งคิด, อังคาร(๓)=ตรรกะเหตุผล, อาทิตย์(๑)=รักหน้าไม่โกง ประกอบเสมอ — ดูคุณภาพ %สัมพันธ์ ความแรง หนักเบาเปรียบกัน ไม่มีสูตรสำเร็จ","t":"ราหู, ดูประกอบ, พฤหัส, อังคาร, อาทิตย์"},{"id":1067,"ch":"chapter_32","c":"ราหู(๘) เล็งลัคนา + มีดาวคู่ธาตุ/คู่สมพลกุมลัคนารับ","p":"ฉลาดเล่ห์เหลี่ยมแต่ไม่โกง ถ้าได้พฤหัส(๕)สัมพันธ์ด้วยยิ่งดี — ยังรับดาวเสาร์(๗)จรได้ดี แทนที่จะโทษก็กลับให้คุณหรือโชคใหญ่ทุกครั้ง","t":"ราหู, เล็งลัคนา, คู่ธาตุ, คู่สมพล, รับเสาร์จร"},{"id":1068,"ch":"chapter_32","c":"ราหู(๘) เป็นตนุลัคน์ (เกษตรเรือนในภพตนุ) ไม่สัมพันธ์ถึงลัคนา","p":"เป็นตัวตนภายในจริงๆ ทำให้เจ้าเล่ห์ ลุ่มหลง แม้ไม่แสดงออกตลอดเวลา — ถ้าสัมพันธ์ถึงลัคนาด้วย = 2 ชั้น ทั้งตัวตนภายในและภายนอก","t":"ราหู, ตนุลัคน์, เกษตรเรือนใน, ตัวตนภายใน"},{"id":1069,"ch":"chapter_32","c":"ราหู(๘) ดี + พฤหัส(๕) แรงกว่า สัมพันธ์ลัคนา","p":"ฉลาดเล่ห์เหลี่ยมมากๆแต่ไม่โกง ถูกโฉลกทั้งทางธรรมทางโลก เล่นหุ้น ปล่อยกู้ สิ่งมึนเมาดีเยี่ยม — ต้องระวังช่วงราหู(๘)จรมาซ้ำเติม จะทวีกำลังแรงกว่าดาวอื่นได้","t":"ราหู, ดี, พฤหัสแรงกว่า, ไม่โกง, ถูกโฉลก"},{"id":1070,"ch":"chapter_32","c":"ดาวราหู(๘) แรง + ดาวพฤหัส(๕) กุมลัคนาด้วยกัน (ทั้งโจรทั้งพระ)","p":"มีสองขั้วในคนเดียว — ดาวใดแรงกว่าก็ออกทางนั้น พฤหัส(๕)เกษตรให้ผลช้าจึงอายุมากขึ้นถึงจะดี ช่วงต้นมักลุ่มหลงก่อนแล้วค่อยปรับตัว","t":"ราหู, พฤหัส, ทั้งโจรทั้งพระ, สองขั้ว"},{"id":1071,"ch":"chapter_32","c":"โปรแกรมโหราศาสตร์ต่างกัน ให้ผลตำแหน่งดาวต่างกัน","p":"ต้องสอบลัคนาทุกครั้ง โดยพยากรณ์ตรวจสอบกับข้อเท็จจริง — แค่เริ่มต้นลัคนาผิด ตามด้วยความหมายดาวที่เพี้ยน วิธีอ่านต่างกัน ผลลัพธ์ต่างกันมากมาย","t":"โปรแกรมโหราศาสตร์, สอบลัคนา, ความถูกต้อง"},{"id":1072,"ch":"chapter_32","c":"ดาวความหมายต่างดวงสัมพันธ์กัน เช่น ราหู(๘)+ศุกร์(๖)","p":"รวมความหมายเข้าด้วยกันแบบไม่หักล้างกัน — ราหู(๘)+ศุกร์(๖)=ศิลปะในการหลอกลวง โกหกได้แนบเนียน หรือนักแสดงมืออาชีพ","t":"ราหู, ศุกร์, ผสมความหมาย, ไม่หักล้าง"},{"id":1073,"ch":"chapter_38","c":"ดาว 0 สัมพันธ์ลัคนา หรือสัมพันธ์ตนุลัคน์ หรือสัมพันธ์ดาว 3","p":"วิถีชีวิตแปรปรวน ปัญหาสุขภาพและอุบัติเหตุตลอดชีวิต — ห้ามวางในตำแหน่งนี้","t":"มฤตยู, ลัคนา, สุขภาพ, ห้ามวาง"},{"id":1074,"ch":"chapter_38","c":"ดาว 0 อยู่ในภพกฎุมพะ","p":"ทรัพย์สินเสียหายง่าย ใช้เงินเก่ง","t":"มฤตยู, กฎุมพะ, การเงิน"},{"id":1075,"ch":"chapter_38","c":"ดาว 0 อยู่ในภพมรณะ","p":"เล็งภพการเงิน มีปัญหาเรื่องทรัพย์สินเงินทอง","t":"มฤตยู, มรณะ, การเงิน"},{"id":1076,"ch":"chapter_38","c":"ดาว 0 อยู่ในภพวินาศ หรือภพอริ","p":"ตำแหน่งที่ดีที่สุดสำหรับดาว 0 — ให้โทษน้อยที่สุด","t":"มฤตยู, วินาศ, อริ, ตำแหน่งดี"},{"id":1077,"ch":"chapter_38","c":"ดาว 8 กุมลัคนา แม้คุณภาพปกติ","p":"ร้ายแรงที่สุด ลุ่มหลง คดโกง — ควรหลีกเลี่ยงเด็ดขาด","t":"ราหู, ลัคนา, ห้ามวาง"},{"id":1078,"ch":"chapter_38","c":"ดาว 8 คุณภาพมหาจักร ไม่ว่าจะสัมพันธ์ลัคนาหรือไม่","p":"คาดเดาได้ยากที่สุด อาจส่งผลร้ายได้แม้ไม่สัมพันธ์ลัคนา — ไม่ควรวางสัมพันธ์ลัคนา","t":"ราหู, มหาจักร, ห้ามวาง"},{"id":1079,"ch":"chapter_38","c":"ดาว 8 คุณภาพอุจ/อุจจาวิลาส/อุจจาภิมุข สัมพันธ์ลัคนา","p":"เป็นคนโกงหรือลุ่มหลง ชีวิตเสียหายมาก — วางในภพกฎุมพะกลับดี","t":"ราหู, อุจ, ลัคนา, กฎุมพะ"},{"id":1080,"ch":"chapter_38","c":"ดาว 8 คุณภาพปกติหรือเกษตร เล็ง/โยค/ตรีโกณลัคนา และดาว 5 สัมพันธ์ลัคนาหรือเป็นตนุเศษ","p":"ฉลาดทางโลก มีคุณธรรมลดทอนราหู ถูกโฉลกเรื่องหุ้น-การเงิน-สื่อสาร","t":"ราหู, พฤหัส, ลัคนา, ผลดี"},{"id":1081,"ch":"chapter_38","c":"ดาว 5 คุณภาพใดก็ได้ สัมพันธ์ลัคนา","p":"คนดี มีเมตตา สติยั้งคิด ผู้ใหญ่ช่วยเหลือ ชีวิตไม่อับจน — วางสัมพันธ์ลัคนาทุกกรณี","t":"พฤหัส, ลัคนา, ควรวาง"},{"id":1082,"ch":"chapter_38","c":"ดาว 7 คุณภาพดี กุมหรือเล็งลัคนา","p":"เชื่องช้า คิดมากเกินไป — ไม่ควรวางในตำแหน่งนี้","t":"เสาร์, ลัคนา, ห้ามวาง"},{"id":1083,"ch":"chapter_38","c":"ดาว 7 คุณภาพดี สัมพันธ์ลัคนา (ไม่กุม/เล็ง) วางในภพลาภะ","p":"ไตร่ตรองรอบคอบ อดทน ถูกโฉลกทำงานหนัก รู้จักใช้จ่ายเงิน — ตำแหน่งดีที่สุดสำหรับดาว 7","t":"เสาร์, ลาภะ, ตำแหน่งดี"},{"id":1084,"ch":"chapter_38","c":"ดาว 6 ดีมาก + ดาว 1 หรือ 3 ดีสัมพันธ์ลัคนาพร้อมกัน","p":"กำหนัดสูงมาก เจ้าชู้หรือสำส่อนได้ — ระวัง","t":"ศุกร์, อาทิตย์, อังคาร, ลัคนา, เจ้าชู้"},{"id":1085,"ch":"chapter_38","c":"เจ้าเรือนภพกฎุมพะหรือปัตนิ ตกภพมรณะ อริ หรือวินาศ","p":"ปัญหาทรัพย์สินหรือคู่ครองตลอดชีวิต — ห้ามวาง","t":"กฎุมพะ, ปัตนิ, มรณะ, อริ, วินาศ, ห้ามวาง"},{"id":1086,"ch":"chapter_38","c":"ดาว 3+ ดวง กระจุกในราศีเดียว","p":"ดวงชาตาไม่สมดุล — ควรกระจายดาวหลายราศี","t":"การกระจุกตัว, ห้ามวาง"},{"id":1087,"ch":"chapter_38","c":"ทารกเพศหญิง และดาว 2 ไม่สัมพันธ์ลัคนา","p":"ขาดเสน่ห์ อาจเป็นทอมบอย — ควรวางลัคนาให้ดาว 2 สัมพันธ์ลัคนาก่อนเสมอ","t":"จันทร์, เพศหญิง, ลัคนา"},{"id":1088,"ch":"chapter_38","c":"ทารกเพศหญิง และเจ้าเรือนปัตนิตกภพมรณะ/อริ/วินาศ หรือมีดาว 0 ในภพปัตนิ","p":"มีคู่ยาก คู่ตายจาก ขัดแย้ง หรือต้องเปลี่ยนคู่ — ห้ามวาง เสียหายรุนแรงกว่าเพศชาย","t":"เพศหญิง, ปัตนิ, มรณะ, มฤตยู, ห้ามวาง"},{"id":1089,"ch":"chapter_38","c":"ดาว 9 ร่วมราศีกับดาวกุมลัคนา","p":"อาจพิการแต่กำเนิดหรือเป็นออทิสติก — ระวังเป็นพิเศษ","t":"เกตุ, ลัคนา, พิการ, ห้ามวาง"},{"id":1090,"ch":"chapter_38","c":"ช่วงดาวส่วนใหญ่คุณภาพเสีย (นิจ/ประเกษตร)","p":"วางฤกษ์ได้ยากมาก อาจหาราศีดีได้แค่ 1 ราศีหรือไม่มีเลย — ต้องเลือกเสียหายน้อยที่สุด","t":"คุณภาพดาว, ข้อจำกัด"},{"id":1091,"ch":"chapter_39","c":"ดาว 1-8 ทุกดวง ไม่ว่าสัมพันธ์ลัคนาหรือไม่","p":"อัจฉริยภาพภายในมีอยู่เสมอ 100% — แต่แสดงออกให้เห็นตลอดเวลาเฉพาะเมื่อสัมพันธ์ลัคนา","t":"อัจฉริยภาพภายใน, หลักการ"},{"id":1092,"ch":"chapter_39","c":"ดาว 6 (ศุกร์) ดีสัมพันธ์ลัคนา","p":"ทำงานศิลปะได้ดี ถูกโฉลก ตลอดเวลา แข่งขันในสายอาชีพได้","t":"ศุกร์, ลัคนา, ศิลปะ, ถูกโฉลก"},{"id":1093,"ch":"chapter_39","c":"ดาว 6 ดี แต่ไม่สัมพันธ์ลัคนา","p":"มีอัจฉริยภาพด้านศิลปะ แต่ทำได้ไม่ตลอดเวลา ไม่ถูกโฉลก ระยะยาวสู้คนอื่นไม่ได้","t":"ศุกร์, ไม่สัมพันธ์ลัคนา, ไม่ถูกโฉลก"},{"id":1094,"ch":"chapter_39","c":"ดาว 8 ดี แต่ไม่สัมพันธ์ลัคนา","p":"มีความรู้เรื่องเล่ห์เหลี่ยม แต ","c":"ดาว 6 (ศุกร์) + ดาว 8 (ราหู) ปกติหรือดี สัมพันธ์ลัคนา","p":"มีศิลปะในการหลอกลวง เหมาะดารา/นักแสดง หรือนักต้มตุ๋น","t":"ศุกร์, ราหู, ลัคนา, หลอกลวง"},{"id":1119,"ch":"chapter_39","c":"ดาว 6 เสีย สัมพันธ์ลัคนา","p":"ศิลปะแปลกๆ เข้าใจยาก เพ้อฝันเกินจริง แต่ยังมีส่วนดี — ไม่ถูกโฉลก กว่าจะยอมรับต้องใช้เวลานาน","t":"ศุกร์, เสีย, ลัคนา, ไม่ถูกโฉลก"},{"id":1120,"ch":"chapter_39","c":"ดาว 7 (เสาร์) สัมพันธ์ลัคนา + ดาว 8 (ราหู) สัมพันธ์กัน","p":"ส่วนใหญ่ร่ำรวย สร้างฐานะได้ด้วยตนเอง แม้ดาวการเงินคุณภาพปกติ","t":"เสาร์, ราหู, ลัคนา, รวย"},{"id":1121,"ch":"chapter_39","c":"ดาว 7 สัมพันธ์ลัคนา + ดาว 3 สัมพันธ์ลัคนา","p":"คิดรอบคอบแต่ลงมือว่องไว หรือทำงานเหนื่อยยากได้ดีพร้อมกับขยัน (ไม่หักล้างกัน)","t":"เสาร์, อังคาร, ลัคนา"},{"id":1122,"ch":"chapter_39","c":"ดาว 7 จร เข้าภพปัตนิ","p":"มีปัญหาเรื่องคู่ครอง/หุ้นส่วน 100% ส่งผลถึงเจ้าชาตา 80%","t":"เสาร์, จร, ปัตนิ"},{"id":1123,"ch":"chapter_39","c":"ดาว 7 จร สัมพันธ์ลัคนาหรือตนุลัคน์","p":"ให้โทษถึงเจ้าชาตา — ยกเว้นถ้าสัมพันธ์ดาว 8 เดิมและสัมพันธ์ลัคนา กลับให้คุณมาก","t":"เสาร์, จร, ลัคนา, ตนุลัคน์"},{"id":1124,"ch":"chapter_39","c":"ดาว 8 (ราหู) กุมลัคนา คุณภาพปกติ","p":"ร้ายแรงสุด ลุ่มหลง คดโกง ดาวอื่นลดทอนได้ยาก ถ้าไม่ได้รับการอบรมสั่งสอนดี กลับตัวยากมาก","t":"ราหู, ลัคนา, กุม, ร้ายแรง"},{"id":1125,"ch":"chapter_39","c":"ดาว 8 เล็ง/โยค/ตรีโกณลัคนา + ดาว 1, 3, 5 อย่างน้อย 1 ดวงสัมพันธ์ลัคนา","p":"ราหูเบาบาง ฉลาดทางโลก ลดทอนความโกง-ลุ่มหลงลงได้มาก","t":"ราหู, ลัคนา, เล็ง, ดาวช่วย"},{"id":1126,"ch":"chapter_39","c":"ดาว 8 ดี ไม่สัมพันธ์ลัคนา","p":"ฉลาดทันคนทันโลก แต่ตัวเองไม่โกง ลุ่มหลงอะไรก็ไม่นาน","t":"ราหู, ดี, ไม่สัมพันธ์ลัคนา, ผลดี"},{"id":1127,"ch":"chapter_39","c":"ดาว 8 เสีย สัมพันธ์ลัคนา","p":"งมงาย เชื่อไสยศาสตร์ หลอกลวงแต่ถูกจับได้ง่าย (ไม่ถูกโฉลก)","t":"ราหู, เสีย, ลัคนา, งมงาย"},{"id":1128,"ch":"chapter_39","c":"ดาว 8 จร ทุกกรณี","p":"ให้โทษอย่างเดียว แม้จรมาหาดาว 7 คู่มิตร ก็ยังไม่ให้คุณ","t":"ราหู, จร, โทษ"},{"id":1129,"ch":"chapter_39","c":"ดาว 9 (เกตุ) ร่วมราศีกับดาวดี","p":"ทวีคูณผลดีของดาวนั้น — ดวงชาตา/ภพ },{"id":1140,"ch":"chapter_41","c":"เจ้าเรือนปัตนิ (ดาว 1 จุลจักร) ลอยอยู่ในภพวินาศ","p":"ได้คู่ดีพอประมาณ แต่มักต้องเลิกรากันหรือแยกกันอยู่","t":"ปัตนิ, วินาศ, เลิกรา"},{"id":1141,"ch":"chapter_41","c":"เจ้าเรือนกฎุมพะ (ดาว 5) กุมลัคนา คุณภาพดี","p":"เก็บเงินเก่ง รักษาทรัพย์ไว้ได้ดี ไม่รั่วไหล (อาจถึงขั้นขี้เหนียว)","t":"กฎุมพะ, พฤหัส, ลัคนา, เก็บเงินเก่ง"},{"id":1142,"ch":"chapter_41","c":"ดาว 7 ดีมาก (อุจจาวิลาส) ตกภพมรณะ ไม่สัมพันธ์ลัคนา","p":"วางแผนดี รอบคอบ แต่ไม่ทำตามแผน — ที่ดิน งานเหนื่อยยากทำแล้วเสียหายแบบไม่ได้คืน ห้ามทำอาชีพนี้","t":"เสาร์, มรณะ, ไม่สัมพันธ์ลัคนา, ที่ดิน, ห้ามทำ"},{"id":1143,"ch":"chapter_41","c":"ดาว 1 หรือ 6 ดี แต่ตกภพวินาศ ไม่สัมพันธ์ลัคนา","p":"ทำได้ดีแต่ไม่ยั่งยืน ไม่ถูกโฉลก ไม่ควรทำเป็นอาชีพหลัก","t":"วินาศ, ไม่สัมพันธ์ลัคนา, ไม่ยั่งยืน"},{"id":1144,"ch":"chapter_42","c":"ไม่มีดาวกุมลัคนา","p":"ไม่มีลักษณะภายนอกที่เด่นชัด ดูเป็นคนธรรมดาทั่วไป","t":"ลัคนา, ไม่มีดาวกุม, ลักษณะภายนอก"},{"id":1145,"ch":"chapter_42","c":"ดาว 8 อุจจาภิมุข โยคหลังลัคนา + ดาว 5 (อุจ) ตกภพอริ ไม่สัมพันธ์ลัคนา","p":"ลุ่มหลงหนัก ถอนตัวไม่ขึ้น เพราะขาดสติยั้งคิด ชีวิตเสียหายได้ง่ายที่สุด","t":"ราหู, พฤหัส, อริ, ลุ่มหลง, ขาดสติ"},{"id":1146,"ch":"chapter_42","c":"ดาว 5 (อุจ) ตกภพอริ ไม่สัมพันธ์ลัคนา + ดาว 0 ร่วมราศี + ดาว 9 ตรีโกณ","p":"สติแปรปรวนทวีคูณ จิตอ่อนไหว อาจขาดสติได้ง่าย (แต่ยังไม่ถึงขั้นผีเข้าเพราะไม่สัมพันธ์ลัคนา)","t":"พฤหัส, มฤตยู, เกตุ, สติแปรปรวน"},{"id":1147,"ch":"chapter_42","c":"เจ้าเรือนกฎุมพะ (ดาว 5 อุจ) ตกภพอริ + ดาว 0 ร่วมราศี + ดาว 9 ตรีโกณ","p":"การเงินมั่นคงระดับสูง แต่เจ้าชาตาไม่สนใจเก็บรักษา ใช้จ่ายแปรปรวนไม่เห็นคุณค่า","t":"กฎุมพะ, อริ, มฤตยู, เกตุ, ใช้เงินเก่ง"},{"id":1148,"ch":"chapter_42","c":"ตนุลัคน์ (ดาว 8) ลอยอยู่ในภพลาภะ","p":"ให้ความสำคัญกับผลประโยชน์ที่ได้มาง่ายๆ มักเห็นแก่ได้","t":"ตนุลัคน์, ราหู, ลาภะ, เห็นแก่ได้"},{"id":1149,"ch":"chapter_42","c":"ดาว 0 ไม่สัมพันธ์ลัคนา หรือตนุลัคน์ หรือดาว 3","p":"สุขภาพดีโดยรวม ไม่มีอุบัติเหตุร้ายแรง","t":"มฤตยู, ไม่สัมพันธ์ลัคนา, สุขภาพดี"},{"id":1150,"ch":"chapter_42a","c":"ดาว 3 (มหาจักร) กุมลัคนา","p":"ประสบความสำเร็จแบบก้าวกระโดด ผาดโผน ไม่ปกติธรรมดา เปลี่ยนอาชีพหลายครั้ง แต่แต่ละครั้งก้าวหน้าเร็ว","t":"อังคาร, มหาจักร, ลัคนา, ก้าวกระโดด"},{"id":1151,"ch":"chapter_42a","c":"ดาว 3 (อุจ) สัมพันธ์ลัคนา — เปรียบกับมหาจักร","p":"อุจ = เจ้าเหตุผลตลอดเวลา น่าเบื่อ / มหาจักร = ตรรกะสูงสุดบางเวลา แต่ไม่น่าเบื่อ","t":"อังคาร, อุจ, มหาจักร, เปรียบเทียบ"},{"id":1152,"ch":"chapter_42a","c":"ดาว 0 ไม่สัมพันธ์ลัคนา ตนุลัคน์ หรือดาว 3 + พันธุกรรมดี","p":"ไม่เคยเจ็บป่วยต้องนอนโรงพยาบาล ไม่เคยประสบอุบัติเหตุ","t":"มฤตยู, ไม่สัมพันธ์ลัคนา, สุขภาพดี, อุบัติเหตุ"},{"id":1153,"ch":"chapter_42a","c":"ดาว 0 ไม่สัมพันธ์ลัคนา","p":"ไม่มีเซนส์ในสิ่งลึกลับ — คนที่ดาว 0 ไม่สัมพันธ์ลัคนา แทบไม่เคยพบว่ามีเซนส์เลย","t":"มฤตยู, ไม่สัมพันธ์ลัคนา, เซนส์, ลึกลับ"},{"id":1154,"ch":"chapter_42a","c":"ดาว 0 สัมพันธ์ลัคนา","p":"มีเซนส์สิ่งลึกลับประมาณ 10-20% เท่านั้น ไม่ใช่ทุกราย","t":"มฤตยู, สัมพันธ์ลัคนา, เซนส์, สถิติ"},{"id":1155,"ch":"chapter_42a","c":"ดาว 7 จรทับลัคนา + ดาว 8 เดิมสัมพันธ์ลัคนา (คู่มิตรใหญ่)","p":"ดาว 7 จรกลับให้คุณมากแทนที่จะให้โทษ — ถือเป็นข้อยกเว้นสำคัญ","t":"เสาร์, จร, ราหู, คู่มิตร, ให้คุณ"},{"id":1156,"ch":"chapter_42a","c":"ดาว 7 จรทับลัคนา + ดาว 8 เดิมในลัคนา + ดาว 0 จร + ดาว 3 จร สัมพันธ์ลัคนา ครบ 4 ดวง + ดาว 5 ไม่สัมพันธ์ลัคนา","p":"ตำราเดิมถือว่าถึงฆาต แต่ถ้าดวงชาตาเข้มแข็งมากและดาว 7 จรได้คู่มิตร (ดาว 8) อาจไม่เป็นอะไรเลย","t":"เสาร์, มฤตยู, อังคาร, จร, ดวงถึงฆาต, ข้อยกเว้น"},{"id":1157,"ch":"chapter_42a","c":"ดาวการเงิน (เทวีโชค) + ดาวคู่ธาตุ + ดาว 9 ร่วมราศี","p":"คุณภาพทวีคูณจนใกล้เทียบราชาโชค — ไม่เคยขัดสนเงิน ได้มาแบบง่ายๆ ไม่ต้องออกแรง","t":"การเงิน, เทวีโชค, เกตุ, ทวีคูณ, ราชาโชค"},{"id":1158,"ch":"chapter_42a","c":"ดาว 8 (ปกติ) เล็งลัคนา + ดาว 3 คู่ธาตุ + ดาว 5 ตรีโกณลัคนา","p":"ทันเล่ห์เหลี่ยม ไม่โกง ไม่ลุ่มหลง มีสมาธิในวิชาที่สนใจ — ผลดีมากกว่าผลเสีย","t":"ราหู, ปกติ, เล็ง, ลัคนา, ผลดี"},{"id":1159,"ch":"chapter_42a","c":"เจ้าเรือนกฎุมพะไปอยู่ภพปุตตะ","p":"เงินทองมักหมดหรือใช้จ่ายไปกับลูกหลานหรือบริวารเป็นหลัก","t":"กฎุมพะ, ปุตตะ, ลูกหลาน"},{"id":1160,"ch":"chapter_42a","c":"โชคใหญ่กรณีที่ 1: ดาว 7 จรเล็งดาว 8 เดิม + ดาว 1 จรทับดาว 5 เดิม (2 คู่) + มีดาว 5 จรทับดาว 1 และดาว 3 จรเล็งดาว 6 เพิ่มอีก","p":"โชคใหญ่มากที่สุด — เป็นกรณีที่พิสูจน์ได้ชัดเจน สามารถยกราคาขายเพิ่มได้อีก 1-2 ล้าน","t":"โชคใหญ่, กรณีที่1, เสาร์, จร, พิสูจน์แล้ว"},{"id":1161,"ch":"chapter_43","c":"เจ้าเรือนกฎุมพะ (ดาว 5 อุจ) ลอยในภพศุภะ","p":"การเงินดีมาก สม่ำเสมอระดับสูง มักใช้เงินในทางหาความสุขหรือการเดินทาง","t":"กฎุมพะ, พฤหัส, อุจ, ศุภะ, ใช้เงินหาความสุข"},{"id":1162,"ch":"chapter_43","c":"ดาว 8 ลอยในภพลาภะ","p":"มีโชคลาภเรื่องหวย หุ้น อบายมุข","t":"ราหู, ลาภะ, โชคลาภ"},{"id":1163,"ch":"chapter_43","c":"เจ้าเรือนลาภะ (ดาว 4 อุจจาภิมุข) ลอยในภพวินาศ","p":"โชคลาภที่ได้มา มักหมดไปอย่างรวดเร็ว","t":"ลาภะ, วินาศ, โชคลาภ, หมดเร็ว"},{"id":1164,"ch":"chapter_43","c":"เจ้าเรือนกัมมะ (ดาว 1 นิจ) ลอยในภพวินาศ","p":"การงานต่างๆไม่คงทน ทำแล้วก็ต้องเลิกรา","t":"กัมมะ, นิจ, วินาศ, เปลี่ยนงาน"},{"id":1165,"ch":"chapter_43","c":"ดาวการเงินดีมาก (อุจ) + พื้นเพตระกูลมีที่ดินมาก","p":"ได้รับมรดกและรายได้จากผู้ให้กำเนิดอย่างต่อเนื่อง ไม่ต้องดิ้นรนเองมาก — พื้นเพของตนขยายผลดวง","t":"การเงิน, พื้นเพ, มรดก, อุจ"},{"id":1166,"ch":"chapter_43","c":"ดาวการเงินดี แต่งงานกับคนดาวการเงินเสีย (ประเกษตร)","p":"ฝ่ายการเงินดีควบคุมเรื่องเงินเอง ส่วนคู่ครองดาวการเงินเสียจะขยันทำงานทดแทน — เติมเต็มกัน","t":"การเงิน, คู่ครอง, เติมเต็ม"},{"id":1167,"ch":"chapter_43","c":"ดาวจร: เสาร์(7) จรทับดาว 8 เดิม (คู่มิตร) + ดาว 5 จรเล็งดาว 1 (คู่มิตร) + ดาว 3 จรทับดาว 5 (คู่สมพล) + ดาว 6 จรทับดาว 4 (คู่ธาตุ)","p":"เข้าลักษณะโชคใหญ่ — ได้รับเงินก้อนใหญ่หลายสิบล้าน","t":"โชคใหญ่, จร, คู่มิตร, คู่สมพล, คู่ธาตุ"},{"id":1168,"ch":"chapter_44","c":"เจ้าเรือนกฎุมพะ (ดาว 6 ประเกษตร) + ดาว 0 อยู่ในภพกฎุมพะ","p":"ทรัพย์สินไม่มั่นคง ใช้เงินสุรุ่ยสุร่าย หมดได้เร็ว — ต้องให้คนอื่นควบคุมเรื่องเงิน","t":"กฎุมพะ, ประเกษตร, มฤตยู, ใช้เงินเก่ง"},{"id":1169,"ch":"chapter_44","c":"เจ้าเรือนปัตนิ (ดาว 5 ประเกษตร) กุมลัคนา","p":"คู่ครองมาเป็นภาระ ต้องดูแล — แต่ถ้าเป็นดาวคู่มิตรกับดาวกุมลัคนา ก็เข้ากันได้ดี","t":"ปัตนิ, ประเกษตร, ลัคนา, ภาระ"},{"id":1170,"ch":"chapter_44","c":"ลัคนาสองคน สัมพันธ์กันโดยโยคแก่กัน","p":"ถูกโฉลกกัน ดวงชาตาสมพงศ์กัน — เป็นเกณฑ์หนึ่งในการเลือกคู่","t":"คู่ครอง, ลัคนา, โยค, สมพงศ์"},{"id":1171,"ch":"chapter_44","c":"ดาวกุมลัคนาของทั้งสองฝ่ายเป็นคู่สมพลกัน","p":"ทำให้มีกำลังเพิ่มขึ้นทั้งคู่ — เสริมซึ่งกันและกัน","t":"คู่ครอง, คู่สมพล, ดาวกุมลัคนา, เสริมกัน"},{"id":1172,"ch":"chapter_44","c":"เจ้าเรือนปัตนิของทั้งสองฝ่าย ต่างเป็นประเกษตรกุมลัคนาของอีกฝ่าย","p":"ต่างเป็นภาระในการดูแลซึ่งกันและกัน แต่ก็ช่วยเหลือดูแลกันเป็นอย่างดี","t":"คู่ครอง, ปัตนิ, ประเกษตร, ดูแลกัน"},{"id":1173,"ch":"chapter_44","c":"ดาวการเงินเสีย (ประเกษตร) + ดวงชาตาเข้มแข็ง + คู่ครองดาวการเงินดี + พื้นเพตระกูลดี","p":"สามารถสร้างฐานะได้ เพราะคู่ครองเติมเต็ม — ถ้าอยู่คนเดียวและพื้นเพไม่ดีจะยากมาก","t":"การเงิน, คู่ครอง, เติมเต็ม, พื้นเพ"},{"id":1174,"ch":"chapter_45","c":"ดาวตนุลัคน์ (อุจ) เล็งดาวเจ้าเรือนการเงิน (อุจ)","p":"อุจเล็งอุจ กลายเป็นนิจทั้งคู่ — รุ่งโรจน์ดีแล้ว เมื่อเสื่อมก็เสื่อมกะทันหัน ล้มทั้งยืนทั้งตัวเองและทรัพย์สิน","t":"อุจ, เล็ง, นิจ, ล้มทั้งยืน, ตนุลัคน์, การเงิน"},{"id":1175,"ch":"chapter_45","c":"ดาวจร: พฤหัส(5)จรทับพฤหัส(5)+มฤตยู(0)เดิม + อังคาร(3)จรทับอังคาร(3)เดิม + ราหู(8)จรเล็งลัคนา + เสาร์(7)จรตกภพมรณะ + ดาว 5 จรอุจเล็ง 3 จรอุจ","p":"ดาวจรทับดาวเดิมที่อุจเล็งอุจ ซ้ำเติมให้เป็นนิจซ้ำอีกรอบ — เกิดเหตุการณ์ร้ายแรง แม้ดวงเข้มแข็งก็หนีไม่พ้น","t":"จร, อุจเล็งอุจ, นิจ, ดาวร้ายซ้ำ, ร้ายแรง"},{"id":1176,"ch":"chapter_45","c":"ดาว 0 จร ทับลัคนา รอให้โทษหลายปี + มีดาวร้ายจรสมทบ 2-3 คู่","p":"โทษระเบิดออกมารุนแรง — ดวงเข้มแข็งขนาดไหนก็ตายหรือล้มทั้งยืนได้","t":"มฤตยู, จร, ลัคนา, ดาวร้ายสมทบ, ล้มทั้งยืน"},{"id":1177,"ch":"chapter_46","c":"ดาว 7 จรทับลัคนา + ดาว 0 จรเล็งลัคนา + ตนุลัคน์จรตกภพมรณะ + ดาว 3 จรนิจทับดาว 0 เดิม","p":"ดวงถึงฆาต — หลายอย่างประกอบกัน แม้ดาว 5 จรเล็งลัคนาช่วย ก็ยังช่วยไม่ได้ (อาจแปลว่าเสียชีวิตอย่างสงบไม่ทรมาน)","t":"เสาร์, มฤตยู, อังคาร, จร, ถึงฆาต, ตนุลัคน์, มรณะ"},{"id":1178,"ch":"chapter_46","c":"วันเสียชีวิต: ดาว 0, 3, 7, 1 สัมพันธ์ลัคนาทุกดวง + ตนุลัคน์จรตกภพมรณะ + ดาว 3 จรทับดาว 0 เดิม","p":"ร้ายแรงสุดขีด — pattern นี้บ่งชี้ดวงถึงฆาตได้ชัดเจนที่สุด","t":"ถึงฆาต, pattern, มรณะ, ดาวร้ายครบ"},{"id":1179,"ch":"chapter_46","c":"ดาว 5 จรเล็งลัคนา ขณะดาวร้ายจรครบหลายดวง","p":"ดาว 5 จรช่วยได้เพียงทำให้เสียชีวิตอย่างสงบ ไม่ทรมาน — ไม่สามารถยับยั้งความตายได้เมื่อดาวร้ายครบมาก","t":"พฤหัส, จร, ช่วยชีวิต, ขีดจำกัด"},{"id":1180,"ch":"chapter_47","c":"ดาว 8 (อุจ) ตกภพมรณะ ไม่สัมพันธ์ลัคนา + ดาว 5 ดีกุมลัคนา","p":"ไม่ใช้เล่ห์เหลี่ยมโกง แต่ฉลาดทางเล่ห์เหลี่ยมมาก ไม่มีใครหลอกได้ง่าย — พระแรงกว่าโจรแม้ราหูมีกำลังมากกว่าพฤหัส","t":"ราหู, อุจ, มรณะ, พฤหัส, พระแรงกว่าโจร"},{"id":1181,"ch":"chapter_47","c":"ดาว 0 เล็งลัคนาในพื้นดวงชาตาเดิม","p":"ชีวิตแปรปรวนได้ทุกอย่างที่คาดไม่ถึง แม้ดวงชาตาเข้มแข็ง","t":"มฤตยู, เล็ง, ลัคนา, แปรปรวน"},{"id":1182,"ch":"chapter_47","c":"ดาว 7 จร + ดาว 8 จร เล็งลัคนา + ดาว 0 เดิมเล็งลัคนาอยู่แล้ว (3 ชั้น)","p":"เป็นมะเร็งร้ายแรง ชีวิตเปลี่ยนโดยสิ้นเชิง แม้ดาว 0 จรไม่ได้อยู่ในตำแหน่งร้าย","t":"เสาร์, ราหู, มฤตยู, จร, มะเร็ง, 3ชั้น"},{"id":1183,"ch":"chapter_47","c":"วันเสียชีวิต: ตนุลัคน์จรเล็งดาว 0 จร + ดาว 7 และ 8 จรเล็งลัคนา + ดาว 0 เดิมเล็งลัคนา + ดาว 5 จรโยคหน้า (อุจจาวิลาส)","p":"ดวงชาตาเข้มแข็งแท้ก็เสียชีวิตได้ — ดาว 5 จรช่วยไม่ทัน (หรือช่วยให้ตายสงบ)","t":"ถึงฆาต, ตนุลัคน์, จร, มฤตยู, พฤหัส, ขีดจำกัด"},{"id":1184,"ch":"chapter_48","c":"ดาว 8 (อุจจาภิมุข) เล็งลัคนา + ดาว 9 ร่วมราศีทวีคูณ + ดาว 5 ตกภพวินาศ","p":"มัวเมาอย่างหนักตลอดชีวิต ไม่มีสติยั้งคิด ติดยาทุกชนิด ถอนตัวไม่ขึ้น","t":"ราหู, เกตุ, พฤหัส, วินาศ, มัวเมา, ไม่มีสติ"},{"id":1185,"ch":"chapter_48","c":"ดาว 8 (อุจจาภิมุข) เล็งลัคนา + ดาว 5 ดีสัมพันธ์ลัคนา — เปรียบเทียบ","p":"ถ้ามีดาว 5 ดีสัมพันธ์ลัคนา จะแค่ลุ่มหลงหรือเจ้าเล่ห์ — ถ้าติดยาก็มีสติยั้งคิด อาจเลิกได้","t":"ราหู, พฤหัส, เปรียบเทียบ, สติ"},{"id":1186,"ch":"chapter_48","c":"ดาว 0 อยู่ในภพกฎุมพะ + ดาวการเงินคุณภาพธรรมดา","p":"ทรัพย์สินแปรปรวน รักษาไว้ไม่ได้ ใช้เงินเก่ง หาไม่ทันใช้","t":"มฤตยู, กฎุมพะ, ใช้เงินเก่ง"},{"id":1187,"ch":"chapter_48","c":"วันเสียชีวิต: ดาว 7 จรทับดาว 7 เดิม ตรีโกณถึงลัคนา + ดาว 5 จรทับดาว 5 เดิมในภพวินาศ + ดาว 6 จรทับดาว 7 เดิม (คู่ศัตรู) + ดาว 9 จรเล็งเสริม","p":"ดาวช่วยชีวิต (5) ทั้งเดิมและจรไม่ช่วยเลย — เสาร์จรทับเสาร์เดิมเพียงอย่างเดียวก็ถึงตายได้","t":"เสาร์, จร, ทับ, วินาศ, ถึงตาย, ดาว5ไม่ช่วย"},{"id":1188,"ch":"chapter_48","c":"ดาว 7 จรทับดาว 7 เดิม + ดวงชาตาแข็งแกร่ง (แต่ดาว 5 ไม่ช่วย)","p":"ถ้าดวงชาตาเข้มแข็งมาก อาจไม่ตายแต่เสียหายทางธุรกิจหลายล้านบาทต่อเดือน","t":"เสาร์, จร, ทับ, ดวงเข้มแข็ง, เสียหายธุรกิจ"},{"id":1189,"ch":"chapter_49","c":"ตนุลัคน์ (ดาว 4) ลอยในภพวินาศ","p":"ไม่พูด ไม่บอกปัญหาให้ใครฟัง แม้แต่คนใกล้ชิด — เก็บทุกอย่างไว้คนเดียว","t":"พุธ, ตนุลัคน์, วินาศ, ไม่พูด, อันตราย"},{"id":1190,"ch":"chapter_49","c":"ดาว 0 ร่วมราศีกับดาว 5 (สติยั้งคิด) + สัมพันธ์ดาว 3 นิจ + ดาว 9 เล็งทวีคูณ","p":"สติแปรปรวน จิตอ่อน ปัญหาสุขภาพและอุบัติเหตุ — ความเสี่ยงคิดสั้นสูงขึ้นมาก","t":"มฤตยู, พฤหัส, อังคาร, เกตุ, สติแปรปรวน, คิดสั้น"},{"id":1191,"ch":"chapter_49","c":"ดาว 8 จรทับลัคนา + ดาว 4 (ตนุลัคน์) จรเป็นคู่ศัตรูกับดาว 8 + ดาว 0 จรเล็งลัคนา + ดาว 3 จรทับดาว 0 เดิม","p":"ดวงชาตาอ่อนแอชั่วคราว สติแตกหักชั่ววูบ ตัดสินใจคิดสั้น","t":"ราหู, พุธ, มฤตยู, อังคาร, จร, คิดสั้น"},{"id":1192,"ch":"chapter_49","c":"ดาว 5 จร (อุจ) โยคหลังลัคนา ขณะดาวร้ายครบหลายชั้น","p":"ช่วยให้รอดชีวิตชั่วคราว แต่ไม่พอยับยั้งเมื่อดาวร้ายซ้ำหลายชั้น","t":"พฤหัส, จร, อุจ, ช่วยชีวิต, ขีดจำกัด"},{"id":1193,"ch":"chapter_49","c":"ดวงชาตาเดิมเข้มแข็ง + รอดชีวิต แต่สมองเสียหาย → พิการ","p":"ดวงชาตาเดิมที่เข้มแข็งและรวย ขัดแย้งกับการรอดแล้วพิการ — โอกาสรอดแบบพิการจึงต่ำมาก ทำนายล่วงหน้าได้ว่าจะไม่รอด","t":"ดวงเข้มแข็ง, พิการ, ขัดแย้ง, พยากรณ์"},{"id":1194,"ch":"chapter_49","c":"ตนุลัคน์ในภพวินาศ + มีปัญหาหนัก + ดาวจรร้ายหลายชั้น","p":"การไม่พูดไม่ปรึกษาใครเป็นปัจจัยเร่งวิกฤต — ถ้าพูดและรู้จังหวะชีวิต อาจรอดได้เพราะดาวร้ายผ่านไปในไม่กี่เดือน","t":"วินาศ, ไม่พูด, จังหวะชีวิต, ดาวจร"},{"id":1195,"ch":"chapter_50","c":"เลือกได้เพียงอย่างเดียวระหว่างดวงเข้มแข็ง / การเงินดี / คู่ดี / ฉลาดรอบรู้","p":"ดวงเข้มแข็งดีที่สุด — ครอบคลุมทุกด้าน แม้การเงินเสียก็ไม่อับจน ยังเอาตัวรอดได้","t":"ดวงเข้มแข็ง, เลือก, สำคัญที่สุด"},{"id":1196,"ch":"chapter_50","c":"ดวงเข้มแข็ง (ดาวในภพตนุดี + ดาว 0 ไม่สัมพันธ์ลัคนา/ตนุลัคน์)","p":"ประสบความสำเร็จง่าย สุขภาพแข็งแรง แม้การเงินเสียก็ได้คู่ดีหรือโชคลาภช่วย ไม่อับจน","t":"ดวงเข้มแข็ง, สุขภาพ, ไม่อับจน"},{"id":1197,"ch":"chapter_50","c":"ดวงชาตาไม่เข้มแข็ง แม้การเงินดีแค่ไหน","p":"มีอุปสรรคตลอด เจ็บป่วยง่าย ถูกหลอกง่าย มัวเมาถอนตัวไม่ขึ้น เงินมีก็แทบไม่มีประโยชน์","t":"ดวงอ่อน, อุปสรรค, เงินไม่ช่วย"},{"id":1198,"ch":"chapter_50","c":"คน 2 คน เกิดเวลาเดียวกัน ลัคนาเดียวกัน แต่พื้นเพต่างกัน","p":"นิสัย ทักษะ ความสามารถเหมือนกันทุกประการ แต่ฐานะและโอกาสต่างกันมาก — ต้องเปรียบในระดับพื้นเพเดียวกันเท่านั้น","t":"พื้นเพ, เปรียบเทียบ, โอกาส, ฐานะ"},{"id":1199,"ch":"chapter_50","c":"ดวงการเงินดีมาก + พื้นเพตระกูลดี","p":"ทวีคูณผลดี รวยมาก — ดวงดีอย่างเดียวโดยไม่มีพื้นเพ ก็รวยได้ในระดับตน แต่ไม่เท่ากัน","t":"การเงิน, พื้นเพ, ทวีคูณ"},{"id":1200,"ch":"chapter_50","c":"ดวงชาตาดีมาก แต่พื้นเพยากจน","p":"ยังประสบความสำเร็จได้ แต่ในระดับที่ต่ำกว่าคนพื้นเพดี ไม่ควรแปลกใจที่ดวงดีแต่ได้แค่นี้","t":"ดวงดี, พื้นเพยากจน, ขีดจำกัด"},{"id":1201,"ch":"chapter_50","c":"ดวงชาตาธรรมดาหรืออ่อน + พื้นเพตระกูลรวย","p":"ยังรวยหรือมีชื่อเสียงได้เพราะพื้นเพ — ไม่ควรแปลกใจที่ดวงไม่ดีแต่ดูรวย ต้องดูบั้นปลายสุดท้ายและอัตราการเจริญก้าวหน้า","t":"ดวงธรรมดา, พื้นเพรวย, บั้นปลาย"},{"id":1202,"ch":"chapter_51","c":"พ่อแม่สร้างกรรมชั่ว ลูกหลานดูเหมือนรับกรรม","p":"ในทางโหราศาสตร์ ดวงชาตาของใครก็ของคนนั้น ไม่ตกทอดถึงกัน — อธิบายได้ด้วยพื้นเพของตนและการอบรมสั่งสอนเท่านั้น","t":"กรรม, พื้นเพ, ดวงชาตา, หลักการ"},{"id":1203,"ch":"chapter_51","c":"ดวงชาตาเหมือนกันทุกประการ แต่พ่อแม่ต่างกัน","p":"อัตราการเจริญรุ่งเรืองต่างกัน เช่น คนหนึ่งรวย 100 ล้าน อีกคนรวย 10,000 ล้าน — ชีวิตเหมือนกัน แต่ระดับต่างกันตามพื้นเพ","t":"พื้นเพ, อัตราการเจริญ, ดวงเหมือนกัน"},{"id":1204,"ch":"chapter_52","c":"ดาวการเงินดี แต่ดาวอื่นเสีย + ได้คู่ที่ดาวการเงินเสียแต่ทำงานเก่ง","p":"เติมเต็มกันได้ดีที่สุด — ฝ่ายการเงินดีบริหารเงิน ฝ่ายทำงานเก่งเป็นคนทำ ห้ามให้ฝ่ายใช้เงินเก่งถือทรัพย์","t":"คู่ครอง, เติมเต็ม, การเงิน, ทำงาน"},{"id":1205,"ch":"chapter_52","c":"ดาวกุมและเล็งลัคนา เป็นคู่มิตร/คู่ธาตุ/คู่สมพลกัน","p":"ยิ่งสมควรมีคู่ครองหรือหุ้นส่วน — 1+1 มากกว่า 2 ทวีคูณขึ้น","t":"ลัคนา, คู่มิตร, คู่ธาตุ, คู่สมพล, หุ้นส่วน"},{"id":1206,"ch":"chapter_52","c":"ดาวกุมและเล็งลัคนา เป็นดาวคู่ศัตรูกัน","p":"ไม่ควรร่วมหุ้นหรือมีคู่ครองในลักษณะพึ่งพา — จะขัดแย้งตลอด ควรทำงานอาศัยความสามารถเฉพาะตัว ถ้าจำเป็นต้องหุ้นให้ใช้ชื่อคนอื่น","t":"คู่ศัตรู, ลัคนา, หุ้นส่วน, หลีกเลี่ยง"},{"id":1207,"ch":"chapter_53","c":"ดาว 8 ดีสัมพันธ์ลัคนา + ดาวจรให้โทษในช่วงนั้น","p":"ถูกโฉลกในเรื่องหุ้น แต่ไม่ใช่จะดีตลอด — จังหวะชีวิตดาวจรมีผลมาก อาจขาดทุนหนักได้ในช่วงดาวร้ายจร","t":"ราหู, หุ้น, จังหวะชีวิต, ดาวจร"},{"id":1208,"ch":"chapter_53","c":"ดาว 8 จรทับลัคนา + ดาว 4 (คู่ศัตรู) กุมลัคนาเดิม","p":"ราหูจรให้โทษมากเป็นพิเศษ — คู่ศัตรูทำให้โทษทวีคูณ เสียหายหนัก","t":"ราหู, พุธ, จร, คู่ศัตรู, โทษทวีคูณ"},{"id":1209,"ch":"chapter_53","c":"ดาว 8 เสีย สัมพันธ์หรือไม่สัมพันธ์ลัคนา","p":"ไม่ถูกโฉลกและยิ่งทำยิ่งเสื่อม — อย่าเล่นหุ้นหรือทำกิจการเกี่ยวกับราหู","t":"ราหู, เสีย, ไม่ถูกโฉลก, ห้ามทำ"},{"id":1210,"ch":"chapter_54","c":"ลัคนาทั้งสองฝ่ายราศีเดียวกัน","p":"ถูกโฉลกกันมากที่สุด นิสัยภายในเหมือนกัน — แต่ข้อเสียคือดาวจรให้โทษพร้อมกันทั้งคู่ อาจเกิดเหตุพร้อมกันไม่มีใครดูแลใคร","t":"คู่, ลัคนา, ราศีเดียวกัน, ข้อเสีย"},{"id":1211,"ch":"chapter_54","c":"ลัคนาทั้งสองฝ่ายโยคหรือตรีโกณกัน","p":"ดีที่สุดในทางปฏิบัติ — ถูกโฉลกกัน เวลามีเคราะห์ไม่ตรงกัน ประคองกันได้ ไม่เสียหายพร้อมกัน","t":"คู่, ลัคนา, โยค, ตรีโกณ, ดีที่สุด"},{"id":1212,"ch":"chapter_54","c":"ลัคนาทั้งสองฝ่ายไม่สัมพันธ์กัน + ดาวเป็นคู่ศัตรู","p":"อยู่ด้วยกันลำบาก ทะเลาะตลอด","t":"คู่, ลัคนา, ไม่สัมพันธ์, คู่ศัตรู, ทะเลาะ"},{"id":1213,"ch":"chapter_54","c":"เจ้าเรือนกฎุมพะของฝ่ายใดฝ่ายหนึ่ง ลอยอยู่ในภพปัตนิ","p":"ฝ่ายนั้นไม่สนใจเรื่องเงิน ให้คู่ถือทรัพย์ทั้งหมด โดยไม่ถาม — เจอคู่ดีก็แล้วไป เจอคู่ผลาญก็หมดจริงๆ","t":"กฎุมพะ, ปัตนิ, ให้คู่ถือเงิน, เสี่ยง"},{"id":1214,"ch":"chapter_55","c":"เจ้าเรือนภพปัตนิ ลอยอยู่ในภพมรณะ","p":"มีคู่ยาก — แปลได้ว่าคู่ตาย / หายจากไปโดยไม่มีเค้า / หรือมีคู่ยาก ไม่จำเป็นต้องตายทุกราย","t":"ปัตนิ, มรณะ, คู่ยาก, ตาย"},{"id":1215,"ch":"chapter_55","c":"เจ้าเรือนปัตนิตกภพมรณะ — แนะนำการแก้ไข","p":"ควรอยู่ด้วยกันแต่ไม่จดทะเบียน หรืออยู่ห่างกันหน่อย / ในด้านหุ้นส่วนควรหุ้นกับบริษัทมั่นคงถาวรระดับประเทศ ลดความเสี่ยงหุ้นส่วนเลิกกลางคัน","t":"ปัตนิ, มรณะ, แก้ไข, หุ้นส่วน"},{"id":1216,"ch":"chapter_56","c":"ดาวเสีย (นิจ/ประเกษตร) สัมพันธ์ลัคนา","p":"ยังให้คุณไม่น้อย — ความหมายออกไปในทางความไม่พอดี (มากเกิน/น้อยเกิน) แต่ยังใช้ประโยชน์ได้ในด้านนั้น","t":"ดาวเสีย, ลัคนา, ยังให้คุณ, ไม่พอดี"},{"id":1217,"ch":"chapter_56","c":"ดาวเสีย ไม่สัมพันธ์ลัคนา","p":"ไม่มีเลย — สูญสิ้นทักษะและอัจฉริยภาพในด้านนั้นโดยสิ้นเชิง","t":"ดาวเสีย, ไม่สัมพันธ์ลัคนา, สูญสิ้น"},{"id":1218,"ch":"chapter_56","c":"ดาว 4 เสีย สัมพันธ์ลัคนา","p":"พูดมากเกินหรือน้อยเกิน ละเอียดจุกจิก หรือไม่ละเอียดเลย — แต่หลายคนเรียนสำเร็จ เป็นแพทย์ ทนาย นักเขียนได้","t":"พุธ, เสีย, ลัคนา, ยังให้คุณ"},{"id":1219,"ch":"chapter_56","c":"ดาว 7 เสีย สัมพันธ์ลัคนา","p":"คิดมากฟุ้งซ่าน ย้ำคิดย้ำทำ วิตกจริต — ไม่ดีที่สัมพันธ์ลัคนา","t":"เสาร์, เสีย, ลัคนา, วิตกจริต, ไม่ดี"},{"id":1220,"ch":"chapter_56","c":"ดาว 8 เสีย สัมพันธ์ลัคนา","p":"งมงาย หลงเชื่อง่าย — แต่ถ้ามีดาว 5 หรือ 3 สัมพันธ์ลัคนาช่วย จะลดทอนได้บ้าง","t":"ราหู, เสีย, ลัคนา, งมงาย, ดาวช่วย"},{"id":1221,"ch":"chapter_56","c":"ดาว 6 เสีย สัมพันธ์ลัคนา","p":"ศิลปะแนวแปลกๆ เข้าใจยาก — ศิลปินชื่อดังระดับชาติ/โลกหลายคนมีดาวนี้ ยังให้คุณในแนวศิลปะที่ไม่ปกติ","t":"ศุกร์, เสีย, ลัคนา, ศิลปะแปลก, ยังให้คุณ"},{"id":1222,"ch":"chapter_56","c":"ดาว 6 เสีย ไม่สัมพันธ์ลัคนา","p":"ไร้จินตนาการและทักษะศิลปะโดยสิ้นเชิง สร้างงานศิลป์ไม่ได้เลย","t":"ศุกร์, เสีย, ไม่สัมพันธ์ลัคนา, ไร้ศิลปะ"},{"id":1223,"ch":"chapter_57","c":"ดาว 5 (อุจ) สัมพันธ์ลัคนา + ดาว 8 ไม่สัมพันธ์ลัคนา + ดาว 8 จร (อุจ) ทับลัคนา","p":"มองโลกแง่ดีเกินไป หลงเชื่อง่าย อาจทำบุญหรือลงทุนจนหมดตัวในช่วงดาว 8 จรให้โทษ","t":"พฤหัส, อุจ, ราหู, จร, หลงดี, หมดตัว"},{"id":1224,"ch":"chapter_58","c":"ดาว 5 ดีสัมพันธ์ลัคนา + ดาว 6 ไม่แรงหรือเสีย + ดาว 8 ไม่แรง","p":"เป็นพระดีได้ — มีคุณธรรม สติ เมตตา กำหนัดต่ำ ไม่เจ้าเล่ห์ ไม่สะสมทรัพย์","t":"พระสงฆ์, พฤหัส, ศุกร์, ราหู, อาชีพ"},{"id":1225,"ch":"chapter_58","c":"ดาว 6 ดีมาก + ดาว 3 หรือ 1 แรง สัมพันธ์ลัคนา — กรณีพระสงฆ์","p":"กำหนัดสูงมาก เจ้าชู้ — อยู่เป็นพระได้ไม่กี่พรรษา","t":"พระสงฆ์, ศุกร์, อังคาร, อาทิตย์, กำหนัด, สึก"},{"id":1226,"ch":"chapter_58","c":"ดาว 8 เสีย — กรณีพระสงฆ์","p":"ไม่ทันคน แต่อาจออกแนวงมงาย ทำเครื่องรางของขลัง — ไม่ร้ายแรง มีคนชอบบ้าง","t":"พระสงฆ์, ราหู, เสีย, งมงาย, เครื่องราง"},{"id":1227,"ch":"chapter_58","c":"ดาวการเงินดีมาก หรือเจ้าเรือนกฎุมพะอยู่ภพดี — กรณีพระสงฆ์","p":"มีแนวโน้มสะสมทรัพย์ — ไม่เหมาะเป็นพระดี","t":"พระสงฆ์, การเงิน, สะสมทรัพย์, ไม่เหมาะ"},{"id":1228,"ch":"chapter_59","c":"เจ้าเรือนกฎุมพะเสีย หรือตกภพอริ/มรณะ/วินาศ หรือมีดาว 0 ในภพกฎุมพะ","p":"ไม่ได้แปลว่าจน — แต่รักษาทรัพย์ไว้ไม่ได้ ใช้เงินเก่ง มีเท่าไรก็หมด","t":"การเงิน, เสีย, ไม่จน, รักษาทรัพย์ไม่ได้"},{"id":1229,"ch":"chapter_59","c":"ดาวการเงินเสีย + ดวงชาตาเข้มแข็ง","p":"ได้คู่ดีหรือมีโชคลาภช่วย ไม่อับจน แต่ถ้าดวงไม่เข้มแข็งก็จนจริงๆได้","t":"การเงิน, เสีย, ดวงเข้มแข็ง, คู่ดี"},{"id":1230,"ch":"chapter_59","c":"ดาวการเงินเสีย — คำแนะนำ","p":"ห้ามเก็บทรัพย์สินเองเด็ดขาด — ให้ใส่ชื่อคู่ครอง/บุตรหลาน หรือซื้ออสังหาริมทรัพย์เพื่อให้เปลี่ยนเป็นเงินสดได้ยากขึ้น","t":"การเงิน, เสีย, แนะนำ, อสังหาริมทรัพย์"},{"id":1231,"ch":"chapter_59","c":"ดาวการเงินดีมาก (อุจ/มหาจักร/เกษตร) แม้เจ้าเรือนตกภพอริ/มรณะ/วินาศ","p":"ไม่จนไม่หมดสิ้น — มีเหมือนตาน้ำใหญ่ หมดก็มีมาอีก แต่ฐานะไม่มั่นคงเท่าที่ควร","t":"การเงิน, ดีมาก, ภพเสีย, ตาน้ำ, ไม่จน"},{"id":1232,"ch":"chapter_60","c":"ดาวในภพกฎุมพะ (เจ้าเรือนหรือดาวลอย) คุณภาพดี (อุจ/มหาจักร/เกษตร)","p":"ยังไม่เคยเห็นใครยากจนขัดสน — แม้ทำงานไม่ถูกโฉลก ก็ยังประคองตัวได้ ล้มแล้วลุกได้","t":"การเงิน, ดี, ไม่จน, ล้มแล้วลุก"},{"id":1233,"ch":"chapter_60","c":"ดาวการเงินดี + ทำอาชีพถูกโฉลก ไม่เสี่ยงมาก","p":"ยังไม่เคยเห็นใครลำบาก — เติบโตมั่นคง","t":"การเงิน, ดี, ถูกโฉลก, มั่นคง"},{"id":1234,"ch":"chapter_60","c":"ดาวการเงินดี + ทำงานกินเงินเดือนอย่างเดียว","p":"ไม่รวยแต่ไม่ลำบาก — แนะนำให้มีอาชีพเสริมจะทวีคูณ","t":"การเงิน, ดี, เงินเดือน, อาชีพเสริม"},{"id":1235,"ch":"chapter_60","c":"ดาวการเงินเสีย + ได้คู่/หุ้นส่วนดีที่การเงินแข็งแกร่ง","p":"อาจร่ำรวยได้ แต่ห้ามให้ถือทรัพย์เอง — ถ้าถือเองจะเสื่อมเสียจริง","t":"การเงิน, เสีย, คู่ดี, ห้ามถือทรัพย์เอง"},{"id":1236,"ch":"chapter_61","c":"ดาวในภพกฎุมพะคุณภาพเป็นราชาโชค หรือเทวีโชค","p":"ได้ทรัพย์มาอย่างง่ายๆสบายๆ ไม่ต้องลงทุนลงแรงมาก — ไม่เคยขาดมือ บางทีถึงกับใช้ให้หมดเพื่อให้ได้มาใหม่","t":"ราชาโชค, เทวีโชค, การเงิน, ได้มาง่าย"},{"id":1237,"ch":"chapter_61","c":"ราศีตรงข้ามราชาโชค (ยาจกโชค) — ข้อโต้แย้ง","p":"ไม่เป็นความจริงที่ตรงข้ามราชาโชคต้องยากจนสาหัส — ต้องใช้ข้อมูลสถิติ ไม่ใช่ตีความแบบกฎหมาย","t":"ราชาโชค, ตรงข้าม, ข้อโต้แย้ง, สถิติ"},{"id":1238,"ch":"chapter_62","c":"ดาวเรือนนอกหรือเรือนในภพกฎุมพะ คุณภาพมหาจักร","p":"ได้ทรัพย์มาแบบแปลกๆ ไม่คาดหมาย เป็นก้อนใหญ่ — ไม่มาก็ไม่มีเลย แต่เมื่อมาก็มาเป็นกอบเป็นกำ","t":"มหาจักร, การเงิน, ผาดโผน, ก้อนใหญ่"},{"id":1239,"ch":"chapter_62","c":"ดาวการเงินมหาจักร — คำแนะนำ","p":"ลงทุนระยะยาวแบบปักเบ็ดหลายคัน เช่น หุ้น หวย พระเครื่อง ที่ดิน — ใช้ดาวดีที่ถูกโฉลกประกอบเลือกประเภทการลงทุน","t":"มหาจักร, การเงิน, ลงทุน, แนะนำ"},{"id":1240,"ch":"chapter_62","c":"ดาวการเงินเป็นจุลจักร (ราศีตรงข้ามมหาจักร)","p":"ให้คุณในลักษณะเดียวกับมหาจักร แต่ลดน้อยลงมาก — ไม่ได้แปลว่าจนลำบาก","t":"จุลจักร, การเงิน, น้อยกว่ามหาจักร"},{"id":1241,"ch":"chapter_63","c":"ดาวในภพกฎุมพะคุณภาพอุจ","p":"ไม่ยากจน ล้มแล้วลุกได้ตลอด — เหมือนตาน้ำใหญ่ให้น้ำสม่ำเสมอ แม้มีดาว 0 ในภพการเงินก็ยังมีมาใหม่เรื่อยๆ","t":"อุจ, การเงิน, ล้มแล้วลุก, ตาน้ำ"},{"id":1242,"ch":"chapter_63","c":"ดาวการเงินอุจจาวิลาส หรืออุจจาภิมุข","p":"ให้คุณเช่นเดียวกับอุจ แต่ประมาณ 60% ของอุจ","t":"อุจจาวิลาส, อุจจาภิมุข, การเงิน, 60เปอร์เซ็นต์"},{"id":1243,"ch":"chapter_63","c":"ดาวการเงินดีมาก (อุจ) + ทำงานกินเงินเดือนอย่างเดียว","p":"น่าเสียดาย — แนะนำให้มีอาชีพเสริมหรือลาออกมาทำเองเลย ไม่จนแน่","t":"อุจ, การเงิน, เงินเดือน, อาชีพเสริม"},{"id":1244,"ch":"chapter_64","c":"ดาวใดก็ตามเป็นเกษตรกุมลัคนา","p":"ตนุเศษจะเป็นดาว 1 (อาทิตย์) เสมอ — เป็นคนรักหน้า หยิ่งในศักดิ์ศรีทุกราย (ตามสูตร 1×1÷7 เศษ 1)","t":"เกษตร, ลัคนา, ตนุเศษ, อาทิตย์, หยิ่ง"},{"id":1245,"ch":"chapter_64","c":"ดาว 4 (พุธ) ดี กุมลัคนา + ดาว 6 (ศุกร์) ดีร่วมราศีหรือสัมพันธ์กัน","p":"มีศิลปะในการพูดและเขียนสูงมาก — ถูกโฉลกในอาชีพนักพูด นักเขียน นักร้อง นายหน้า จิตรกร","t":"พุธ, ศุกร์, ลัคนา, ศิลปะพูด, ถูกโฉลก"},{"id":1246,"ch":"chapter_64","c":"ดาว 4 เสีย กุมหรือสัมพันธ์ลัคนา","p":"ยังช่างพูดแต่ไม่ถูกโฉลก — พูดละเอียดเกินเหตุ เพ้อเจ้อ ไม่ถูกจังหวะ คนฟังไม่ชอบ","t":"พุธ, เสีย, ลัคนา, ช่างพูด, ไม่ถูกโฉลก"},{"id":1247,"ch":"chapter_64","c":"ดาว 4 กุมลัคนา แต่เจ้าชาตาพูดน้อยลงด้วยประสบการณ์หรืออาชีพ","p":"ลัคนายังถูก — การพูดน้อยเป็นเรื่องพื้นเพและสถานการณ์ ไม่ใช่ดวงชาตาผิด ต้องสอบถามเพิ่มเติม","t":"พุธ, ลัคนา, พูดน้อย, สอบลัคนา, พื้นเพ"},{"id":1248,"ch":"chapter_65","c":"ดาว 4 ไม่สัมพันธ์ลัคนา ไม่ว่าคุณภาพใด","p":"ไม่ช่างพูดโดยธรรมชาติ — แม้เป็นตนุลัคน์ แม้คุณภาพดีมาก ก็ยังพูดน้อยมาก ถ้าจำเป็นต้องพูดและดาวดีก็พูดได้ดี แต่พอวางไมโครโฟนก็หยุดทันที","t":"พุธ, ไม่สัมพันธ์ลัคนา, ไม่ช่างพูด, หลักการ"},{"id":1249,"ch":"chapter_65","c":"ดาว 4 ในภพมรณะ ไม่สัมพันธ์ลัคนา","p":"พูดไม่ถูกจังหวะ ไม่ถูกกาละ จับต้นชนปลายไม่ถูก สื่อสารยาก — เรียกว่า 'พุธมรณะ'","t":"พุธ, มรณะ, ไม่สัมพันธ์ลัคนา, พูดไม่ถูกจังหวะ"},{"id":1250,"ch":"chapter_65","c":"ดาว 4 เป็นตนุเศษ แต่ไม่สัมพันธ์ลัคนา","p":"ยังไม่ช่างพูด แต่ออกทางความละเอียด ชอบข้อมูล ข้อเท็จจริง — การพูดเป็นลักษณะภายนอก (แสดงออก) ไม่ใช่ภายใน (ความคิด)","t":"พุธ, ตนุเศษ, ไม่สัมพันธ์ลัคนา, ละเอียด"},{"id":1251,"ch":"chapter_65","c":"เกณฑ์วัดการช่างพูด","p":"พูดก่อนโดยไม่ต้องถาม = ช่างพูด / ถาม1ตอบ2-3 = ช่างพูด / ถาม1ตอบ1 = ปกติ / ถาม2-3ตอบ1 = ไม่ค่อยพูด","t":"พุธ, เกณฑ์, ช่างพูด, วัดผล"},{"id":1252,"ch":"chapter_66","c":"ดาว 7 จรเล็งดาว 8 เดิม + สัมพันธ์ถึงลัคนา","p":"ให้คุณมาก มีโชคแปลกๆ ไม่คาดฝัน — เป็นกรณีเดียวที่ดาว 7 จรให้คุณแทนโทษ เพราะดาว 7 และ 8 เป็นคู่มิตรใหญ่","t":"เสาร์, จร, ราหู, คู่มิตร, ให้คุณ, โชค"},{"id":1253,"ch":"chapter_67","c":"ดาวลอยในภพปัตนิ คุณภาพเกษตร + เป็นคู่มิตร/คู่ธาตุ/คู่สมพลกับดาวในภพตนุ","p":"คู่ดีที่สุด มั่นคงถาวร ยิ่งนานยิ่งมั่นคง ถูกโฉลกกันมาก","t":"ปัตนิ, เกษตร, คู่มิตร, คู่ดีที่สุด"},{"id":1254,"ch":"chapter_67","c":"ดาวลอยในภพปัตนิ เป็นคู่ศัตรูกับดาวในภพตนุ","p":"ทะเลาะกันตลอดชีวิต","t":"ปัตนิ, คู่ศัตรู, ทะเลาะ"},{"id":1255,"ch":"chapter_67","c":"เจ้าเรือนปัตนิ ลอยอยู่ในภพกฎุมพะ","p":"คู่มาเป็นทรัพย์ หาเงินให้ หรือมีคู่ง่าย มีคู่มาก — ที่เห็นถูกต้องทั้งสองความหมายพอๆกัน","t":"ปัตนิ, กฎุมพะ, คู่เป็นทรัพย์"},{"id":1256,"ch":"chapter_67","c":"เจ้าเรือนปัตนิ เป็นประเกษตรกุมลัคนา (มาที่ภพตนุ)","p":"คู่มาเป็นภาระให้ต้องดูแล — ไม่ได้แปลว่าได้คู่ด้อยกว่าในด้านยศศักดิ์หรือฐานะ","t":"ปัตนิ, ประเกษตร, ลัคนา, ภาระ"},{"id":1257,"ch":"chapter_68","c":"ดาว 8 จรทับลัคนา + ดาว 8 เดิมดีสัมพันธ์ลัคนา + ดาว 4 จร (คู่ศัตรู 8) + ดาว 0 จรเล็งลัคนา","p":"โทษหนักหลายชั้น — แม้ดาว 5 จรดีช่วย และดวงชาตาเข้มแข็ง ก็ยังไม่พ้นโทษได้","t":"ราหู, จร, พุธ, มฤตยู, โทษหลายชั้น, พฤหัสช่วยไม่ไหว"},{"id":1258,"ch":"chapter_68","c":"ดาว 5 จรดีสัมพันธ์ลัคนา + ดาวร้ายจรหลายชั้นพร้อมกัน","p":"ดาว 5 จรอาจช่วยบรรเทาหรือทำให้ผลร้ายออกมาเบากว่าที่ควร แต่ไม่อาจยับยั้งได้เมื่อดาวร้ายครบมาก","t":"พฤหัส, จร, ดาวร้าย, ขีดจำกัด"},{"id":1259,"ch":"chapter_68","c":"วันอ่านคำตัดสิน ตรงกับดาวจรดี — แต่การตัดสินใจเกิดก่อนหน้า","p":"ดาวจรดีในวันอ่านคำตัดสิน ไม่ได้แปลว่าผลดี — การตัดสินใจอาจสิ้นสุดไปก่อนแล้ว เพียงแต่วันอ่านบังเอิญตรง","t":"ดาวจร, คำตัดสิน, ข้อสังเกต"},{"id":1260,"ch":"chapter_69","c":"ดาว 1 (อาทิตย์) เสีย สัมพันธ์ลัคนา","p":"หยิ่งในสิ่งที่คนอื่นไม่เข้าใจ (หยิ่งโง่ๆ) — แต่ยังให้คุณสำคัญคือลดทอนความโกงและลุ่มหลงของดาว 8 ได้มาก เพราะกลัวเสียหน้า","t":"อาทิตย์, เสีย, ลัคนา, หยิ่งโง่, ทัดทานราหู"},{"id":1261,"ch":"chapter_69","c":"ดาว 1 + ดาว 3 สัมพันธ์ลัคนา (ร่วมกับดาว 8 แรง)","p":"ลดทอนความโกงและลุ่มหลงของดาว 8 ได้มากกว่าดาว 5 เพียงดวงเดียว — รักหน้า+แข็งตรงไปตรงมา ทำให้ไม่กล้าโกงและอายที่จะโกง","t":"อาทิตย์, อังคาร, ราหู, ลัคนา, ทัดทาน, ดีกว่าพฤหัสเดี่ยว"},{"id":1262,"ch":"chapter_70","c":"ช่วงดาวจรให้โทษ (เคราะห์ร้าย)","p":"หลบเลี่ยง ระมัดระวัง — ทำให้หนักกลายเป็นเบาได้ แต่ดวงชาตาเกิดมาแล้วแก้ไขไม่ได้ ทำได้แค่เพิ่มลด","t":"ดาวจร, เคราะห์ร้าย, หลบเลี่ยง, เพิ่มลด"},{"id":1263,"ch":"chapter_70","c":"ช่วงดาวจรดี (โชคลาภเล็กๆ)","p":"ทำงานเพิ่ม ขยันเพิ่ม ลงทุนเพิ่ม — โชคเล็กกลายเป็นโชคใหญ่ได้","t":"ดาวจร, โชคลาภ, ขยายผล, จังหวะชีวิต"},{"id":1264,"ch":"chapter_70","c":"การสะเดาะเคราะห์ ทำบุญ เพื่อแก้ดวง","p":"ช่วยให้จิตใจสบายคลายกังวลเท่านั้น — ไม่มีผลโดยตรงกับดวงชาตาในแนวเหตุผล (คนละประเด็นกับแนวศาสนา/ความเชื่อ)","t":"สะเดาะเคราะห์, ทำบุญ, จิตใจ, ไม่มีผลดวง"},{"id":1265,"ch":"chapter_71","c":"ตนุลัคน์ไปร่วมราศีกับดาวอื่น","p":"มีคุณสมบัติตามดาวนั้นเพิ่มขึ้น — แต่ไม่หักลบกัน เพียงลดทอนบดบังได้บางครั้ง อาจผลัดกันแสดงออกตามจังหวะชีวิต","t":"ตนุลัคน์, ร่วมราศี, คุณสมบัติ, ไม่หักลบ"},{"id":1266,"ch":"chapter_71","c":"ตนุลัคน์ (5) ร่วมราศีกับดาว 8 แรง","p":"เป็นทั้งคนดีมีคุณธรรม (5) และเจ้าเล่ห์/ลุ่มหลง (8) ในคนเดียวกัน — คนคนเดียวเป็นได้ทั้งพระและโจร","t":"ตนุลัคน์, พฤหัส, ราหู, พระและโจร"},{"id":1267,"ch":"chapter_71","c":"ตนุลัคน์ไปลอยอยู่ภพใดภพหนึ่ง","p":"บอกนิสัยตัวตนภายในและเรื่องที่ให้ความสำคัญในชีวิต — แต่ตัดสินว่าดวงดีขึ้นหรือไม่ไม่ได้ เป็นแค่ส่วนเสริม","t":"ตนุลัคน์, นิสัยภายใน, ความสำคัญ, ข้อจำกัด"},{"id":1268,"ch":"chapter_72","c":"ดาวสัมพันธ์ลัคนา","p":"ชัดเจนและสำคัญกว่า — ครอบคลุมเจ้าชาตาโดยรวมทั้งหมด รวมถึงปัจจัยภายนอก (ผู้ใหญ่เมตตา อาชีพถูกโฉลก)","t":"ลัคนา, สัมพันธ์, สำคัญกว่า, ปัจจัยภายนอก"},{"id":1269,"ch":"chapter_72","c":"ดาวสัมพันธ์ตนุลัคน์ (แต่ไม่สัมพันธ์ลัคนา)","p":"ส่งผลเฉพาะตัวตนของเจ้าชาตาเท่านั้น ความสำคัญน้อยกว่า — ถ้าเป็นเพียงดาวลอยสัมพันธ์กัน (ไม่ร่วมราศี) ยิ่งมีผลน้อยลงอีก","t":"ตนุลัคน์, สัมพันธ์, สำคัญน้อยกว่า, ตัวตน"},{"id":1270,"ch":"chapter_72","c":"ดาว 0 สัมพันธ์ลัคนา — เปรียบกับสัมพันธ์ตนุลัคน์","p":"สัมพันธ์ลัคนา = ทำให้วิถีชีวิตแปรปรวนทั้งหมด (ทุกดาวในภพตนุรวม) / สัมพันธ์ตนุลัคน์ = แปรปรวนแค่ตัวตนดาวนั้น — ลัคนากว้างกว่ามาก","t":"มฤตยู, ลัคนา, ตนุลัคน์, เปรียบเทียบ, กว้างกว่า"},{"id":1271,"ch":"chapter_73","c":"ดาวจรเข้าราศีใด","p":"คุณภาพตามราศีนั้น เหมือนพื้นดวงทุกประการ — แต่ใช้แค่ 'มีกำลังมากน้อย' ไม่ต้องใส่ความหมายคุณภาพ เช่น ไม่ต้องบอกว่า 'ให้คุณต่อเนื่องยาวนาน' หรือ 'ผาดโผน' เพราะเป็นช่วงสั้น","t":"ดาวจร, คุณภาพ, มาตรฐาน, กำลัง"},{"id":1272,"ch":"chapter_73","c":"ดาวจรคุณภาพอุจหรือมหาจักร","p":"มีกำลังมากที่สุด — แต่ไม่ต้องตีความว่าให้คุณต่อเนื่องหรือผาดโผน เพราะเป็นดาวจรช่วงสั้น","t":"ดาวจร, อุจ, มหาจักร, กำลังมาก, ไม่ใส่ความหมายคุณภาพ"},{"id":1273,"ch":"chapter_74","c":"ดาว 7 จรทับดาว 8 เดิม สัมพันธ์ลัคนา","p":"ให้คุณชัดเจน ราบรื่นดีในเรื่องงานหนักงานเบา อาจมีโชคลาภ","t":"เสาร์, จร, ราหู, ลัคนา, โชคลาภ"},{"id":1274,"ch":"chapter_74","c":"ดาว 7 จรทับดาว 8 เดิม ไม่สัมพันธ์ลัคนา","p":"ดีแค่ในความหมายของภพนั้น ไม่ถึงตัวเจ้าชาตา — ไม่มีผลเสีย แต่อาจให้คุณไม่ถึงตัวเอง","t":"เสาร์, จร, ราหู, ไม่สัมพันธ์ลัคนา, ไม่ถึงตัว"},{"id":1275,"ch":"chapter_74","c":"ดาว 5 จรสัมพันธ์ลัคนา","p":"ให้คุณดี ผู้ใหญ่เมตตา สิ่งศักดิ์สิทธิ์คุ้มครอง อะไรๆราบรื่น — ใช้ได้เสมอแม้ไม่ครบเกณฑ์โชคใหญ่","t":"พฤหัส, จร, ลัคนา, ราบรื่น, ผู้ใหญ่เมตตา"},{"id":1276,"ch":"chapter_74","c":"ดาว 7 จรทับดาว 6 (คู่ศัตรู) ที่เป็นเจ้าเรือนปัตนิ ในภพวินาศ","p":"คู่อาจต้องจาก — น่าจะจากเป็น (ไม่ใช่จากตาย เพราะไม่ใช่ภพมรณะ)","t":"เสาร์, จร, ศุกร์, คู่ศัตรู, ปัตนิ, วินาศ, จากกัน"},{"id":1277,"ch":"chapter_74","c":"โชคใหญ่กรณีมาตรฐาน: ดาว 7 ทับดาว 8 + ดาว 3 เล็งดาว 6 + ดาว 1 ทับดาว 5 ครบ 3 คู่","p":"อาจมีโชคใหญ่จริง ต้องครบ 3 คู่จึงนับ — ไม่จำเป็นต้องสัมพันธ์ลัคนาก็ได้ แต่ถ้าสัมพันธ์ลัคนายิ่งชัด","t":"โชคใหญ่, 3คู่, เสาร์, อังคาร, อาทิตย์"},{"id":1278,"ch":"chapter_75","c":"ดาวใดก็ตาม คุณภาพปกติ ตกภพมรณะ","p":"ถือว่าปกติ ไม่สัมพันธ์ลัคนา — ไม่ต้องนับว่าเสีย ภพมรณะทำให้ไม่แสดงออกและสูญสิ้นไปบ้าง แต่ยังมีอยู่ภายใน","t":"ปกติ, มรณะ, ไม่สัมพันธ์ลัคนา, ไม่แสดงออก"},{"id":1279,"ch":"chapter_75","c":"ดาว 1 ปกติ ตกภพมรณะ","p":"รักศักดิ์ศรีแบบมนุษย์ทั่วไป แต่ปกติไม่หยิ่งไม่แสดงออก — ไม่ต้องเน้นในการพยากรณ์","t":"อาทิตย์, ปกติ, มรณะ, ไม่แสดงออก, ไม่เน้น"},{"id":1280,"ch":"chapter_75","c":"ดาว 1 เสีย + ตกภพมรณะ","p":"อาจทำเรื่องขายหน้าโดยไม่อาย ไม่หยิ่งและไม่รักหน้าเลย — ซึ่งบางทีก็ไม่ดี เพราะขาดตัวทัดทานดาว 8","t":"อาทิตย์, เสีย, มรณะ, ขายหน้า, อันตราย"},{"id":1281,"ch":"chapter_76","c":"ดาวเสาร์จรเข้าภพปัตนิ และมีดาวในภพนั้นรอ แต่เจ้าชาตายังไม่มีคู่","p":"ไม่บังเกิดผลกับคู่ เพราะปัตนิคือคู่หรือหุ้นส่วน ถ้ายังไม่มีก็ไม่รู้จะให้โทษกับอะไร","t":"ดาวจร, เสาร์, ปัตนิ, ยังไม่มีคู่"},{"id":1282,"ch":"chapter_76","c":"ดาวเสาร์จรเข้าภพปัตนิ แม้ยังไม่มีคู่","p":"ดาว ๗ ยังให้โทษถึงตัวเอง 80% ต้องดูดาวรับว่ามีอะไรช่วยเบาหรือเร่งให้หนักด้วย ทั้งดาวกุม โยค ตรีโกณ","t":"ดาวจร, เสาร์, โทษตัวเอง, ดาวรับ"},{"id":1283,"ch":"chapter_76","c":"บุคคลที่ไวต่อดาวเสาร์มาก","p":"เข้าวันไหนอึดอัดทันที ออกวันไหนโล่งทันที — ต้องเก็บสถิติรายบุคคล แต่ละคนไวกับดาวไม่เท่ากัน","t":"ดาวจร, เสาร์, ความไวต่อดาว, สถิติ"},{"id":1284,"ch":"chapter_76","c":"ดาวจรทับตนุลัคน์ หรือทับลัคนา","p":"ร้ายพอกัน แต่ต่างกันในรายละเอียด","t":"ดาวจร, ทับตนุลัคน์, ทับลัคนา"},{"id":1285,"ch":"chapter_77","c":"ดาว ๕ ดี แต่ไม่สัมพันธ์ลัคนา เทียบกับ ดาว ๕ กลางๆ แต่สัมพันธ์ลัคนา","p":"ดาว ๕ ดีไม่สัมพันธ์ลัคนา มีคุณธรรมในใจมากกว่า แต่ขาดสติยั้งคิด ลืมตัวทำชั่วได้ง่ายกว่า","t":"พฤหัส, คุณธรรม, สัมพันธ์ลัคนา, สติยั้งคิด"},{"id":1286,"ch":"chapter_77","c":"ดาว ๕ สัมพันธ์ลัคนา","p":"มีสติยั้งคิดตลอดเวลา ต่อเนื่องกว่า โอกาสขาดสติทำชั่วจึงน้อยกว่า","t":"พฤหัส, สัมพันธ์ลัคนา, สติยั้งคิด"},{"id":1287,"ch":"chapter_77","c":"ดาว ๕ เป็นอุจ แต่ตกภพมรณะ","p":"ปกติเป็นคนธรรมะธรรมโมมาก แต่อาจเผลอเข้าวงการผิดแล้วออกไม่ได้ เสี่ยงถูกจับติดคุก","t":"พฤหัส, มหาอุจ, มรณะ, ขาดสติ"},{"id":1288,"ch":"chapter_78","c":"ตรวจสอบความสมพงศ์ของคู่","p":"ลัคนาต้องสัมพันธ์กัน ดาวกุมลัคนาและ/หรือตนุลัคน์ต้องไม่เป็นคู่ศัตรูกัน ถ้าเป็นคู่มิตร คู่ธาตุ คู่สมพล ยิ่งดี","t":"สมพงศ์, ลัคนา, ตนุลัคน์, คู่มิตร"},{"id":1289,"ch":"chapter_78","c":"ดาวเกษตรเจ้าเรือนภพปัตนิของแต่ละคน","p":"ต้องไม่ไปอยู่ภพอริ มรณะ วินาศ ถ้าได้ครบก็ไม่ขัดแย้งกันเลย ถึงไม่ครบก็พิจารณาหนักเบาได้","t":"สมพงศ์, ปัตนิ, เจ้าเรือน, ภพร้าย"},{"id":1290,"ch":"chapter_78","c":"ดวงไม่สัมพันธ์กัน แต่ยังไม่แน่ว่าขัดแย้ง","p":"ไม่ถูกโฉลกกัน แต่จะขัดแย้งหรือเปล่าต้องดูดาวและภพตามหลักการ","t":"สมพงศ์, ไม่ถูกโฉลก, ขัดแย้ง"},{"id":1291,"ch":"chapter_79","c":"พิจารณาดาวศุกร์ในเรื่องความรัก","p":"ดาวศุกร์ไม่ใช่ความรัก แต่เป็นกำหนัดความใคร่ — ไม่เกี่ยวกับการดูความสมพงศ์","t":"ศุกร์, ความรัก, กำหนัด, สมพงศ์"},{"id":1292,"ch":"chapter_79","c":"ดูความสมพงศ์ของคู่","p":"ดูดาวกุมลัคนาและตนุลัคน์เป็นหลัก แยกภพตนุหรือปัตนิ ดูทีละคู่","t":"สมพงศ์, ลัคนา, ตนุลัคน์, ปัตนิ"},{"id":1293,"ch":"chapter_79","c":"คู่ที่ดวงขัดแย้งกัน","p":"ยังอยู่ด้วยกันได้ ทะเลาะกันไป มีลูกหัวปีท้ายปี อย่าด่วนสรุปว่าจะอยู่ด้วยกันไม่ได้","t":"ขัดแย้ง, อยู่ด้วยกัน, ไม่ด่วนสรุป"},{"id":1294,"ch":"chapter_80","c":"ดาวเสาร์ลอยในภพปัตนิ (เป็นเกษตร) และดาว ๖ อยู่กุมลัคนา","p":"ขัดแย้งแน่นอน คู่ใหญ่กว่า ข่มด้วย เพราะร้ายกว่าดาว ๖","t":"ปัตนิ, เสาร์, เกษตร, ขัดแย้ง, ศุกร์"},{"id":1295,"ch":"chapter_80","c":"ดาว ๗ ไปอยู่ภพอื่น ไม่สัมพันธ์กับดาว ๖","p":"ไม่ขัดแย้งกัน","t":"ปัตนิ, เสาร์, ไม่สัมพันธ์, ไม่ขัดแย้ง"},{"id":1296,"ch":"chapter_80","c":"ดาว ๓ ลอยในภพปัตนิ","p":"มีคู่เป็นคู่มิตร ยิ่งกว่าคู่หูอีก","t":"ปัตนิ, อังคาร, คู่มิตร"},{"id":1297,"ch":"chapter_80","c":"ดาว ๗ เจ้าเรือนปัตนิ ไปอยู่ภพอริ","p":"ขัดแย้งกับคู่ หุ้นกับใครหรือคู่กับใครก็จะมีปัญหาขัดแย้งกันตลอด","t":"ปัตนิ, เจ้าเรือน, อริ, ขัดแย้งตลอด"},{"id":1298,"ch":"chapter_81","c":"ดาว ๗ ไปอยู่ภพปุตตะ","p":"จะได้คู่ที่ต้องดูแลเหมือนเป็นลูกหลานหรือบริวาร","t":"เสาร์, ปุตตะ, คู่, ดูแลเหมือนลูก"},{"id":1299,"ch":"chapter_81","c":"ดาว ๗ คู่กับมฤตยูในภพปุตตะ — การวิเคราะห์เพิ่มเติม","p":"ดูชั้นแรกเป็นหลัก ไม่ดูลึกกว่านั้น เพราะไม่แน่นอน ต้องดูดวงชาตาของคู่โดยตรงอีกที","t":"เสาร์, มฤตยู, ปุตตะ, ดูชั้นเดียว"},{"id":1300,"ch":"chapter_82","c":"ดาว ๐ และ ๗ ตรีโกณถึงตนุ","p":"พอแล้ว อย่าไปถึงปัตนิ ไกลไป ดูชั้นแรกเป็นหลัก ชั้นที่ 2 เป็นบางเรื่อง ชั้นที่ 3 ไม่แน่นอน","t":"มฤตยู, เสาร์, ตรีโกณ, ตนุ, ดูชั้นเดียว"},{"id":1301,"ch":"chapter_82","c":"ดาว ๗ ดี — ข้อสรุปเรื่องคู่","p":"จะได้คู่ดี อย่าเพิ่งเอาดาว ๐ มาคิดว่าคู่ไม่ดี แค่หมายความว่าคู่อาจแปรปรวน ไม่คงทน เปลี่ยนคู่ได้","t":"เสาร์, คู่ดี, มฤตยู, แปรปรวน"},{"id":1302,"ch":"chapter_82","c":"ดาว ๐ และ ๗ สัมพันธ์ถึงตนุ","p":"เจ้าชาตาเป็นคนคิดมาก อารมณ์แปรปรวน เข้าใจยาก","t":"มฤตยู, เสาร์, ตนุ, อารมณ์แปรปรวน"},{"id":1303,"ch":"chapter_83","c":"ดาว ๗ กับ ๐ อยู่ด้วยกันในภพปัตนิ","p":"ทุกดวงต้องถึงตนุเป็นหลัก เรื่องเจ้าเรือนคู่ดูชั้นเดียวว่าดีหรือไม่ดีไปไหนเท่านั้น","t":"เสาร์, มฤตยู, ปัตนิ, ตนุ, ดูชั้นเดียว"},{"id":1304,"ch":"chapter_83","c":"ดาว ๖ กุมลัคนา และ ๗ ลอยอยู่ปัตนิ","p":"ขัดแย้งกับคู่ตรงๆ","t":"ศุกร์, ลัคนา, เสาร์, ปัตนิ, ขัดแย้ง"},{"id":1305,"ch":"chapter_83","c":"มีดาว ๐ ในปัตนิด้วย","p":"ปัตนิแปรปรวน อาจเปลี่ยนคู่ ถ้าสัมพันธ์ถึงตนุด้วย เจ้าชาตาเป็นคนมีเซนส์หรือแปรปรวน","t":"มฤตยู, ปัตนิ, แปรปรวน, เปลี่ยนคู่"},{"id":1306,"ch":"chapter_83","c":"ราศีพิจิก ดาว ๐ และ ๗ กุมลัคนา","p":"แข็ง หนักแน่น จริงจัง อารมณ์แปรปรวน เข้าใจยาก","t":"พิจิก, มฤตยู, เสาร์, ลัคนา, นิสัย"},{"id":1307,"ch":"chapter_84","c":"นิยามคู่ดีโดยรวม","p":"นิสัยเข้ากันได้ดี ทุกอย่างไม่ด้อยกว่าเจ้าชาตา — เทียบกับเจ้าชาตา ไม่ใช่เทียบกับคนอื่น","t":"คู่ดี, นิสัย, เทียบเจ้าชาตา"},{"id":1308,"ch":"chapter_84","c":"คนรวยของคนอื่น แต่ยังจนกว่าเจ้าชาตา","p":"ถือเป็นคู่ไม่ดี ต่ำกว่า — แย่ของคนอื่นอาจดีเลิศสำหรับเรา เป็นนามธรรมเทียบกับเจ้าชาตาทั้งนั้น","t":"คู่ดี, ฐานะ, นามธรรม, เทียบเจ้าชาตา"},{"id":1309,"ch":"chapter_85","c":"เจ้าชาตารวยอยู่แล้ว และตั้งปณิธานอยากได้คู่ขยัน","p":"คู่ดีสำหรับเขาอาจมีฐานะเพียงปานกลาง แต่ขยันเอาการเอางานตามที่ต้องการ — ดีถูกใจก็พอแล้ว ไม่จำเป็นต้องรวยหรือเรียนสูง","t":"คู่ดี, ไม่ต้องรวย, ตามใจต้องการ, เทียบเจ้าชาตา"},{"id":1310,"ch":"chapter_86","c":"ลูกคนรวย ดาวลอยในภพกฎุมพะมาจากภพพันธุ","p":"ไม่เกี่ยวกัน — พี่น้อง 3 คนในบ้านเดียวกันดาวการเงินไม่จำเป็นต้องมาจากพันธุทุกคน ทั้งที่เงินพ่อแม่ทั้งนั้น","t":"กฎุมพะ, พันธุ, ดาวลอย, ความเข้าใจผิด"},{"id":1311,"ch":"chapter_86","c":"ไม่มีดาวลอยในภพกฎุมพะ","p":"ไม่ได้แปลว่าไม่มีเงินหรือหาเงินไม่ได้ — ดาวเจ้าเรือนกฎุมพะไปมีคุณภาพดีที่ภพอื่นก็เพียงพอแล้ว ดูว่าไปไหนชัดกว่าดูว่ามาจากไหน","t":"กฎุมพะ, เ const SYSTEM_PROMPT = `คุณคือระบบแปลงข้อมูลโหราศาสตร์ไทยเป็น structured JSON
ตอบเป็น JSON array เท่านั้น ห้ามมีคำอธิบายหรือ markdown ใดๆ — เริ่มด้วย [ จบด้วย ]

schema ของแต่ละ element:
{"predict_id":<number>,"conditions":[{"seq":"A","planet":"SU"|"MO"|"MA"|"ME"|"JU"|"VE"|"SA"|"RA"|"KE"|"MR"|null,"quality":"คุณ"|"โทษ"|"ANY","aspect":"KUM"|"LENG"|"YOK"|"TRI"|"NONE"|"ANY","required":true|false}]}

planet mapping: อาทิตย์=SU จันทร์=MO อังคาร=MA พุธ=ME พฤหัส/พฤหัสบดี=JU ศุกร์=VE เสาร์=SA ราหู=RA เกตุ=KE มฤตยู=MR
quality: ดี/เกษตร/อุจ/มหาจักร/ราชาโชค=คุณ  เสีย/นิจ/ประเกษตร=โทษ  ไม่ระบุ=ANY
aspect: กุม=KUM เล็ง=LENG โยค=YOK ตรีโกณ=TRI ไม่สัมพันธ์ลัคนา=NONE ไม่ระบุ=ANY
กฎที่ไม่เกี่ยวกับดาวใดโดยตรง: planet=null
กฎที่มีหลายดาว: ใส่หลาย conditions (seq A B C)
conditions ที่เป็นเงื่อนไขเสริม (optional): required=false`;

let results = [];
let errors = [];
let running = false;
let aborted = false;

function addLog(msg, type='info') {
  const div = document.createElement('div');
  div.className = 'log-item log-' + type;
  div.textContent = msg;
  document.getElementById('log').prepend(div);
}

function updateCounters() {
  document.getElementById('cnt-ok').textContent = results.length;
  document.getElementById('cnt-err').textContent = errors.length;
  const totalConds = results.reduce((s,r)=>s+(r.conditions?.length||0),0);
  document.getElementById('cnt-cond').textContent = totalConds;
}

async function sendBatch(batch) {
  const userPrompt = 'แปลงกฎต่อไปนี้เป็น conditions:\n\n' +
    batch.map(r =>
      `predict_id:${r.id}\ncondition:${r.c}\ntags:${r.t}\npredict:${r.p}`
    ).join('\n---\n');

  const resp = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 1800,
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user', content: userPrompt }
      ],
      stream: false,
    }),
  });

  if (!resp.ok) {
    const errText = await resp.text().catch(() => '');
    throw new Error(`HTTP ${resp.status}: ${errText.slice(0,100)}`);
  }

  const data = await resp.json();
  const text = data.choices?.[0]?.message?.content || data.content?.[0]?.text || '';

  const match = text.match(/\[\s*\{[\s\S]*\}\s*\]/);
  if (!match) throw new Error('ไม่พบ JSON array: ' + text.slice(0,150));

  return JSON.parse(match[0]);
}

function renderRow(item) {
  const tbody = document.getElementById('result-body');
  const rule = RULES.find(r => r.id === item.predict_id) || {};
  const tr = document.createElement('tr');
  const condHTML = (item.conditions || []).map(c =>
    `<div class="cond-row">${c.seq}: ${c.planet||'null'} | ${c.quality} | ${c.aspect} | ${c.required?'req':'opt'}</div>`
  ).join('');
  tr.innerHTML = `
    <td>${item.predict_id}</td>
    <td style="color:var(--muted)">${rule.ch||''}</td>
    <td>${(rule.c||'').slice(0,60)}</td>
    <td>${condHTML || '<span style="color:var(--muted)">—</span>'}</td>
  `;
  tbody.appendChild(tr);
}

async function runExtract() {
  running = true;
  aborted = false;
  results = [];
  errors = [];
  document.getElementById('result-body').innerHTML = '';
  document.getElementById('result-wrap').style.display = 'block';
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-stop').style.display = '';
  document.getElementById('btn-dl').disabled = true;
  document.getElementById('btn-dl-csv').disabled = true;
  document.getElementById('log').innerHTML = '';

  const batchSize = parseInt(document.getElementById('sel-batch').value);
  const stopAt = parseInt(document.getElementById('inp-stop').value) || 999;
  document.getElementById('stat-batch').textContent = batchSize;

  const total = RULES.length;
  const totalBatches = Math.ceil(total / batchSize);

  addLog(`เริ่ม extract ${total} กฎ จาก ${totalBatches} batches`, 'info');

  for (let i = 0; i < RULES.length && !aborted; i += batchSize) {
    const batchNum = Math.floor(i / batchSize) + 1;
    if (batchNum > stopAt) { addLog(`หยุดที่ batch ${stopAt}`, 'info'); break; }

    const batch = RULES.slice(i, i + batchSize);
    const pct = Math.round((i / total) * 100);
    document.getElementById('pbar').style.width = pct + '%';
    document.getElementById('status').textContent =
      `batch ${batchNum}/${totalBatches} — กฎ ${i+1}–${Math.min(i+batchSize,total)}/${total}`;

    try {
      const extracted = await sendBatch(batch);

      // validate: expect array of {predict_id, conditions}
      const valid = Array.isArray(extracted) ? extracted.filter(e => e.predict_id && Array.isArray(e.conditions)) : [];
      const skipped = batch.length - valid.length;

      results.push(...valid);
      valid.forEach(item => renderRow(item));

      if (skipped > 0) {
        document.getElementById('cnt-skip').textContent =
          parseInt(document.getElementById('cnt-skip').textContent) + skipped;
      }
      addLog(`✓ batch ${batchNum}: ${valid.length} rules (${skipped} ข้าม)`, 'ok');
    } catch (err) {
      errors.push({ batch: batchNum, start: i, error: err.message });
      addLog(`✗ batch ${batchNum}: ${err.message}`, 'err');
    }

    updateCounters();

    if (i + batchSize < RULES.length && !aborted) {
      await new Promise(r => setTimeout(r, 800));
    }
  }

  document.getElementById('pbar').style.width = '100%';
  document.getElementById('status').textContent =
    `เสร็จ — ${results.length} rules สำเร็จ, ${errors.length} batches error`;
  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('btn-dl').disabled = false;
  document.getElementById('btn-dl-csv').disabled = false;
  running = false;
  addLog(`เสร็จสิ้น: ${results.length} rules, ${errors.length} errors`, 'info');
}

function stopExtract() {
  aborted = true;
  document.getElementById('btn-stop').style.display = 'none';
  addLog('หยุดโดย user', 'info');
}

function downloadJSON() {
  const out = { results, errors, extracted_at: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'conditions_extracted.json';
  a.click();
}

function downloadCSV() {
  const rows = ['condition_id,predict_id,seq,planet,quality,aspect,required,notes'];
  let cid = 1;
  results.forEach(r => {
    (r.conditions || []).forEach(c => {
      rows.push([cid++, r.predict_id, c.seq, c.planet||'', c.quality, c.aspect, c.required?'TRUE':'FALSE', ''].join(','));
    });
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'conditions_extracted.csv';
