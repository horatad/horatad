<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โหราทาส — Tools</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1f2d5e 0%, #995467 50%, #272b5b 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 40px;
}

.logo-area {
  text-align: center;
  margin-bottom: 40px;
}
.logo-area img {
  width: 64px; height: 64px; border-radius: 16px;
  margin-bottom: 12px;
}
.logo-area h1 {
  color: #ba8345;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: .5px;
}
.logo-area p {
  color: rgba(255,255,255,.5);
  font-size: 13px;
  margin-top: 4px;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  width: 100%;
  max-width: 360px;
}

.tool-btn {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 18px;
  padding: 20px 12px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  text-decoration: none;
  transition: background .15s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.tool-btn:active {
  background: rgba(255,255,255,.2);
  transform: scale(.94);
}

.tool-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.icon-gold   { background: linear-gradient(135deg, #ba8345, #d4a35a); }
.icon-blue   { background: linear-gradient(135deg, #1565c0, #1877f2); }
.icon-teal   { background: linear-gradient(135deg, #00695c, #00897b); }
.icon-purple { background: linear-gradient(135deg, #6a1b9a, #8e24aa); }
.icon-dark   { background: linear-gradient(135deg, #263238, #37474f); }
.icon-green  { background: linear-gradient(135deg, #2e7d32, #43a047); }

.tool-name {
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  line-height: 1.4;
}
.tool-badge {
  font-size: 10px;
  background: rgba(186,131,69,.3);
  color: #ba8345;
  border-radius: 6px;
  padding: 2px 6px;
  font-weight: 600;
}

.section-label {
  color: rgba(255,255,255,.35);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  width: 100%;
  max-width: 360px;
  margin: 28px 0 10px;
}
</style>
</head>
<body>

<div class="logo-area">
  <img src="../horatad_512x512.png" alt="โหราทาส" onerror="this.style.display='none'">
  <h1>โหราทาส Tools</h1>
  <p>เครื่องมือภายในสำหรับทีม</p>
</div>

<div class="section-label">Content & Admin</div>

<div class="grid">

  <a class="tool-btn" href="admin/julian_approval.html">
    <div class="tool-icon icon-gold">🔭</div>
    <div class="tool-name">JULIAN<br>Admin</div>
  </a>

  <a class="tool-btn" href="fb_post_helper.html">
    <div class="tool-icon icon-blue">📱</div>
    <div class="tool-name">FB Post<br>Helper</div>
  </a>

  <a class="tool-btn" href="admin_dashboard.html">
    <div class="tool-icon icon-teal">📊</div>
    <div class="tool-name">Admin<br>Dashboard</div>
  </a>

</div>

<!-- เพิ่ม tool ใหม่ได้ที่นี่ -->

</body>
</html>
