<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JULIAN Keygen — Master Key Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
#topbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#1e293b;border-bottom:1px solid #334155;flex-wrap:wrap}
h1{font-size:.9rem;font-weight:700;color:#f8fafc;flex:1}
.chip{font-size:.7rem;padding:2px 8px;border-radius:12px;white-space:nowrap}
.chip-blue{background:#1e3a5f;color:#93c5fd}
.chip-green{background:#14532d;color:#86efac}
#cfg{padding:12px 14px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;background:#1e293b;border-bottom:1px solid #334155}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:.73rem;color:#94a3b8;font-weight:600}
input[type=number]{background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:5px 9px;border-radius:6px;width:90px;font-size:.83rem}
input[type=number]:focus{outline:none;border-color:#3b82f6}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600;transition:background .15s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-gen{background:#3b82f6;color:#fff}.btn-gen:hover:not(:disabled){background:#2563eb}
.btn-csv{background:#14532d;color:#86efac}.btn-csv:hover{background:#166534}
.btn-jsonl{background:#1e3a5f;color:#93c5fd}.btn-jsonl:hover{background:#1e40af}
#prog-wrap{padding:12px 14px;display:none}
.prog-bg{background:#334155;border-radius:4px;height:6px;margin-bottom:6px}
.prog-fill{height:6px;background:#3b82f6;border-radius:4px;transition:width .1s;width:0}
#prog-txt{font-size:.73rem;color:#64748b}
#status{padding:6px 14px;font-size:.78rem;color:#94a3b8;min-height:22px}
#dl-wrap{padding:0 14px 10px;display:none;gap:8px;flex-wrap:wrap}
#preview-wrap{padding:10px 14px;overflow-x:auto}
table{border-collapse:collapse;font-size:.73rem;white-space:nowrap;min-width:100%}
th{background:#1e293b;color:#64748b;padding:5px 8px;text-align:right;font-weight:600;border-bottom:1px solid #334155;position:sticky;top:0}
th:first-child,th:nth-child(2){text-align:left}
td{padding:3px 8px;border-bottom:1px solid #1a2236;text-align:right}
td:first-child,td:nth-child(2){text-align:left}
.jd{color:#fde68a}.date{color:#a3e635}
.note{font-size:.7rem;color:#475569;padding:6px 0}
</style>
</head>
<body>

<div id="topbar">
  <h1>JULIAN Keygen — Master Key Generator</h1>
  <span id="chip-rows" class="chip chip-blue">0 rows</span>
  <span class="chip chip-green">engine.js</span>
</div>

<div id="cfg">
  <div class="field">
    <label>ปีเริ่มต้น CE</label>
    <input type="number" id="y-start" value="1700" min="-3000" max="3000">
  </div>
  <div class="field">
    <label>ปีสิ้นสุด CE</label>
    <input type="number" id="y-end" value="2100" min="-3000" max="3000">
  </div>
  <div class="field">
    <label>ลองจิจูด (°E)</label>
    <input type="number" id="lng" value="100.5" step="0.1" min="-180" max="180">
  </div>
  <button class="btn btn-gen" id="btn-gen">▶ สร้าง</button>
</div>

<div id="prog-wrap">
  <div class="prog-bg"><div class="prog-fill" id="prog-fill"></div></div>
  <span id="prog-txt">กำลังคำนวณ...</span>
</div>

<div id="status"></div>

<div id="dl-wrap">
  <button class="btn btn-csv" id="btn-csv">⬇ CSV</button>
  <button class="btn btn-jsonl" id="btn-jsonl">⬇ JSONL</button>
</div>

<div id="preview-wrap"></div>

<script type="module">
import { get_j, get_data } from '../v3/engine.js';

const PLANETS = ['su','mo','ma','me','ju','ve','sa','ra','ke','mr'];
let rows = null;

function daysInMonth(m, y) { return new Date(y, m, 0).getDate(); }
function pad2(n) { return String(n).padStart(2,'0'); }

async function generate(yStart, yEnd, lng) {
  const all = [];
  let totalDays = 0;
  for (let y = yStart; y <= yEnd; y++) {
    totalDays += daysInMonth(2, y) === 29 ? 366 : 365;
  }

  const fill = document.getElementById('prog-fill');
  const txt = document.getElementById('prog-txt');
  let done = 0;

  for (let y = yStart; y <= yEnd; y++) {
    for (let m = 1; m <= 12; m++) {
      const dim = daysInMonth(m, y);
      for (let d = 1; d <= dim; d++) {
        const jd = get_j(d, m, y);
        const sp = get_data(d, m, y, 0, 0, lng);
        // sp[1..10] = SU MO MA ME JU VE SA RA KE MR (unit: 21600/circle → /60 = degrees)
        const planets = [];
        for (let i = 1; i <= 10; i++) planets.push(+(sp[i] / 60).toFixed(4));
        all.push({ jd, date_ce: `${y}-${pad2(m)}-${pad2(d)}`, planets });
        done++;
      }
    }
    const pct = done / totalDays * 100;
    fill.style.width = pct.toFixed(1) + '%';
    txt.textContent = `คำนวณ ${done.toLocaleString()} / ${totalDays.toLocaleString()} วัน (ปี CE ${y})`;
    await new Promise(r => setTimeout(r, 0));
  }
  return all;
}

function renderPreview(data) {
  let h = '<table><thead><tr><th>JD</th><th>Date CE</th>';
  PLANETS.forEach(p => h += `<th>${p.toUpperCase()}</th>`);
  h += '</tr></thead><tbody>';
  data.slice(0, 10).forEach(r => {
    h += `<tr><td class="jd">${r.jd}</td><td class="date">${r.date_ce}</td>`;
    r.planets.forEach(v => h += `<td>${v}</td>`);
    h += '</tr>';
  });
  h += `</tbody></table><p class="note">แสดง 10 แถวแรก — ทั้งหมด ${data.length.toLocaleString()} แถว | planets[0..9] = SU..MR degrees (0-360) | hr=0 lng=${document.getElementById('lng').value}</p>`;
  return h;
}

function dlBlob(content, filename, mime) {
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([content], {type: mime})),
    download: filename
  });
  a.click();
  URL.revokeObjectURL(a.href);
}

function toCSV(data) {
  const hdr = ['jd','date_ce',...PLANETS].join(',');
  return hdr + '\n' + data.map(r => [r.jd, r.date_ce, ...r.planets].join(',')).join('\n');
}

function toJSONL(data) {
  return data.map(r => {
    const obj = {jd: r.jd, date_ce: r.date_ce};
    PLANETS.forEach((k, i) => { obj[k] = r.planets[i]; });
    return JSON.stringify(obj);
  }).join('\n');
}

document.getElementById('btn-gen').addEventListener('click', async () => {
  const yStart = +document.getElementById('y-start').value;
  const yEnd = +document.getElementById('y-end').value;
  const lng = +document.getElementById('lng').value;

  if (!yStart || !yEnd || yStart > yEnd) {
    document.getElementById('status').textContent = '⚠ กรุณาระบุช่วงปีให้ถูกต้อง';
    return;
  }

  const btn = document.getElementById('btn-gen');
  btn.disabled = true;
  btn.textContent = 'กำลังสร้าง...';
  document.getElementById('prog-wrap').style.display = 'block';
  document.getElementById('dl-wrap').style.display = 'none';
  document.getElementById('preview-wrap').innerHTML = '';
  document.getElementById('status').textContent = '';

  const t0 = Date.now();
  rows = await generate(yStart, yEnd, lng);
  const sec = ((Date.now() - t0) / 1000).toFixed(1);

  document.getElementById('chip-rows').textContent = `${rows.length.toLocaleString()} rows`;
  document.getElementById('status').textContent = `✓ เสร็จแล้ว ${rows.length.toLocaleString()} rows — ใช้เวลา ${sec}s`;
  document.getElementById('dl-wrap').style.display = 'flex';
  document.getElementById('preview-wrap').innerHTML = renderPreview(rows);

  btn.disabled = false;
  btn.textContent = '▶ สร้าง';
});

document.getElementById('btn-csv').addEventListener('click', () => {
  if (!rows) return;
  const ys = document.getElementById('y-start').value;
  const ye = document.getElementById('y-end').value;
  dlBlob(toCSV(rows), `julian_mk_${ys}-${ye}.csv`, 'text/csv');
});

document.getElementById('btn-jsonl').addEventListener('click', () => {
  if (!rows) return;
  const ys = document.getElementById('y-start').value;
  const ye = document.getElementById('y-end').value;
  dlBlob(toJSONL(rows), `julian_mk_${ys}-${ye}.jsonl`, 'application/x-ndjson');
});
</script>
</body>
</html>
