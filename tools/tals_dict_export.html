<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TALS Master Dictionary</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: #f5f5f5; color: #222; }
header { background: #1a237e; color: #fff; padding: 16px 24px; }
header h1 { font-size: 1.2rem; }
header p { font-size: 0.8rem; opacity: .7; margin-top: 4px; }
.tabs { display: flex; gap: 4px; background: #283593; padding: 8px 24px 0; }
.tab { padding: 8px 18px; cursor: pointer; border-radius: 6px 6px 0 0;
       background: #3949ab; color: #fff; font-size: 0.85rem; border: none; }
.tab.active { background: #fff; color: #1a237e; font-weight: bold; }
.tab-content { display: none; padding: 20px 24px; }
.tab-content.active { display: block; }
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.toolbar button { padding: 6px 14px; border: none; border-radius: 4px;
  background: #3949ab; color: #fff; cursor: pointer; font-size: 0.8rem; }
.toolbar button:hover { background: #1a237e; }
.toolbar span { font-size: 0.75rem; color: #666; }
table { width: 100%; border-collapse: collapse; background: #fff;
        font-size: 0.78rem; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
th { background: #e8eaf6; color: #1a237e; padding: 8px 10px;
     text-align: left; border: 1px solid #c5cae9; white-space: nowrap; }
td { padding: 6px 10px; border: 1px solid #e0e0e0; vertical-align: top; }
tr:nth-child(even) td { background: #fafafa; }
tr:hover td { background: #e8eaf6; }
.pill { display: inline-block; background: #e8eaf6; color: #283593;
        border-radius: 10px; padding: 1px 7px; font-size: 0.7rem; margin: 1px; }
.pos { color: #2e7d32; font-weight: bold; }
.neg { color: #c62828; font-weight: bold; }
.na { color: #999; font-style: italic; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 3px;
         font-size: 0.7rem; font-weight: bold; }
.badge-plus { background: #c8e6c9; color: #2e7d32; }
.badge-minus { background: #ffcdd2; color: #c62828; }
.badge-neutral { background: #f0f0f0; color: #666; }
.kw-pos { background: #e8f5e9; border: 1px solid #a5d6a7; }
.kw-neg { background: #ffebee; border: 1px solid #ef9a9a; }
.kw-neu { background: #e8eaf6; border: 1px solid #c5cae9; }
</style>
</head>
<body>
<header>
  <h1>TALS Master Dictionary — โหราทาส</h1>
  <p id="meta-info">กำลังโหลด...</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="showTab('planets')">🪐 ดาว</button>
  <button class="tab" onclick="showTab('signs')">♈ ราศี</button>
  <button class="tab" onclick="showTab('houses')">🏠 ภพ</button>
  <button class="tab" onclick="showTab('qualities')">⭐ มาตรฐาน</button>
  <button class="tab" onclick="showTab('relations')">🔗 คู่ดาว</button>
  <button class="tab" onclick="showTab('lagna')">🪷 ลัคนา</button>
  <button class="tab" onclick="showTab('rules')">📋 Rules</button>
</div>

<div id="tab-planets" class="tab-content active">
  <div class="toolbar">
    <button onclick="copyTSV('planets-table')">📋 Copy TSV → Paste to Google Sheets</button>
    <span>คัดลอกแล้ว paste ใน Google Sheets (Tab 1: ดาว)</span>
  </div>
  <div id="planets-table"></div>
</div>

<div id="tab-signs" class="tab-content">
  <div class="toolbar">
    <button onclick="copyTSV('signs-table')">📋 Copy TSV → Paste to Google Sheets</button>
  </div>
  <div id="signs-table"></div>
</div>

<div id="tab-houses" class="tab-content">
  <div class="toolbar">
    <button onclick="copyTSV('houses-table')">📋 Copy TSV → Paste to Google Sheets</button>
  </div>
  <div id="houses-table"></div>
</div>

<div id="tab-qualities" class="tab-content">
  <div class="toolbar">
    <button onclick="copyTSV('qualities-table')">📋 Copy TSV → Paste to Google Sheets</button>
  </div>
  <div id="qualities-table"></div>
</div>

<div id="tab-relations" class="tab-content">
  <div class="toolbar">
    <button onclick="copyTSV('relations-table')">📋 Copy TSV → Paste to Google Sheets</button>
  </div>
  <div id="relations-table"></div>
</div>

<div id="tab-lagna" class="tab-content">
  <div class="toolbar">
    <button onclick="copyTSV('lagna-table')">📋 Copy TSV → Paste to Google Sheets</button>
  </div>
  <div id="lagna-table"></div>
</div>

<div id="tab-rules" class="tab-content">
  <div class="toolbar">
    <input id="rules-search" type="text" placeholder="ค้นหา id / domain / keyword..." style="width:300px;padding:4px 8px;border:1px solid #ccc;border-radius:4px" oninput="filterRules(this.value)">
    <select id="rules-type-filter" onchange="filterRules(document.getElementById('rules-search').value)" style="padding:4px 8px">
      <option value="">ทุก type</option>
      <option>NATAL_ATOMIC</option><option>NATAL_COMBINATION</option>
      <option>TRANSIT_NATAL</option><option>PRINCIPLE</option>
      <option>REFERENCE</option><option>DEFINITION</option>
    </select>
    <select id="rules-st-filter" onchange="filterRules(document.getElementById('rules-search').value)" style="padding:4px 8px">
      <option value="">ทุก source_type</option>
      <option>PRIMARY</option><option>INFERRED</option>
    </select>
    <button onclick="copyTSV('rules-table')">📋 Copy TSV</button>
    <span id="rules-count"></span>
  </div>
  <div id="rules-table"></div>
</div>

<script>
const BASE = '../v3/';
let data = {};

async function loadAll() {
  const metaEl = document.getElementById('meta-info');
  metaEl.textContent = 'กำลังโหลดข้อมูล...';
  try {
    const [planets, signs, houses, relations, lagna, qualities, kb] = await Promise.all([
      fetch(BASE + 'tals_planets.json').then(r => r.json()),
      fetch(BASE + 'tals_signs.json').then(r => r.json()),
      fetch(BASE + 'tals_houses.json').then(r => r.json()),
      fetch(BASE + 'tals_planet_relations.json').then(r => r.json()),
      fetch(BASE + 'tals_lagna.json').then(r => r.json()),
      fetch(BASE + 'tals_quality_rules.json').then(r => r.json()),
      fetch(BASE + 'kb_tals.json').then(r => r.json()),
    ]);
    data.tals_planets = planets;
    data.tals_signs = signs;
    data.tals_houses = houses;
    data.tals_planet_relations = relations;
    data.tals_lagna = lagna;
    data.tals_quality_rules = qualities;
    data.rules_summary = kb.rules || [];
    metaEl.textContent =
      'schema v' + data.tals_planets._meta.schema_version +
      ' · verified: ' + (data.tals_planets._meta.verified || '') +
      ' · TALS (ยืนยง นาวาสมุทร / แดง เมืองตราด)';
    renderAll();
  } catch (e) {
    metaEl.textContent = '❌ โหลดไม่ได้: ' + e.message + ' — ต้องเปิดบน GitHub Pages';
    console.error('loadAll failed:', e);
  }
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
}

function pills(arr) {
  if (!arr || !arr.length) return '<span class="na">—</span>';
  // Support both string array and keyword object array
  return arr.map(x => {
    if (typeof x === 'string') return `<span class="pill">${x}</span>`;
    const src = x.src||'?';
    const pol = x.pol;
    const cls = pol==='+' ? 'kw-pos' : pol==='-' ? 'kw-neg' : 'kw-neu';
    const srcBadge = src==='tals' ? '📖' : src==='llm' ? '🤖' : src==='ntals' ? '📚' : '?';
    return `<span class="pill ${cls}" title="${src}: ${x.ref||''}">${x.k}${srcBadge}</span>`;
  }).join('');
}
function pillsKwByPol(arr, pol) {
  if (!arr || !arr.length) return '<span class="na">—</span>';
  const filtered = arr.filter(x => typeof x==='object' ? x.pol===pol : true);
  if (!filtered.length) return '<span class="na">—</span>';
  return pills(filtered);
}
function signName(id) {
  const names = ['เมษ','พฤษภ','มิถุน','กรกฎ','สิงห์','กันย์','ตุลย์','พิจิก','ธนู','มกร','กุมภ์','มีน'];
  return id !== null && id !== undefined ? names[id] ?? id : '—';
}

function renderPlanets() {
  const planets = data.tals_planets.planets;
  const cols = ['id','ชื่อ','en','ธาตุ','อุจ','เกษตร','มหาจักร','ราชาโชค','ตนุเศษ','ตนุลัคน์','อาชีพ','keywords (+)','keywords (-)'];
  let h = `<small>📖=tals(100CH) 🤖=llm(bridge) 📚=ntals</small><br><br>`;
  h += `<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  for (const [id, p] of Object.entries(planets)) {
    const qp = p.has_quality_positions;
    h += `<tr>
      <td>${p.id}</td>
      <td><b>${p.name}</b><br><small>${p.abbrev}</small></td>
      <td>${p.name_en||'—'}</td>
      <td>${p.element||'—'}</td>
      <td>${qp ? `<b>${signName(p.uchcha)}</b>` : '<span class="na">ไม่มี</span>'}</td>
      <td>${qp ? pills(p.kaset?.map(signName)) : '<span class="na">ไม่มี</span>'}</td>
      <td>${qp ? `<b>${signName(p.mahachak)}</b>` : '<span class="na">ไม่มี</span>'}</td>
      <td>${qp ? `<b>${p.rajayok||'—'}</b>` : '<span class="na">ไม่มี</span>'}</td>
      <td>${p.tanusesh_trait ? p.tanusesh_trait.split(' ').slice(0,4).join(' ')+'…' : '<span class="na">—</span>'}</td>
      <td>${p.tanulagn_inner ? p.tanulagn_inner.split(' ').slice(0,4).join(' ')+'…' : '<span class="na">—</span>'}</td>
      <td>${pills(p.career_areas?.slice(0,2))}</td>
      <td>${pillsKwByPol(p.keywords,'+')||'—'}</td>
      <td>${pillsKwByPol(p.keywords,'-')||'—'}</td>
    </tr>`;
  }
  h += '</tbody></table>';
  document.getElementById('planets-table').innerHTML = h;
}

function renderSigns() {
  const signs = data.tals_signs.signs;
  let h = `<table><thead><tr><th>id</th><th>ราศี</th><th>EN</th><th>เจ้าเรือน</th><th>ธาตุ</th><th>phase</th><th>สภาพ</th><th>แทน</th><th>keywords</th></tr></thead><tbody>`;
  for (const [id, s] of Object.entries(signs)) {
    const pname = data.tals_planets?.planets?.[s.ruler]?.name || s.ruler;
    h += `<tr>
      <td>${s.id}</td><td><b>${s.name}</b></td><td>${s.name_en||'—'}</td>
      <td>${pname}</td><td>${s.element||'—'}</td><td>${s.element_phase||'—'}</td>
      <td>${s.nature||'—'}</td>
      <td>${pills(s.represents?.slice(0,3))}</td>
      <td>${pills(s.keywords?.slice(0,5))}</td>
    </tr>`;
  }
  h += '</tbody></table>';
  document.getElementById('signs-table').innerHTML = h;
}

function renderHouses() {
  const houses = data.tals_houses.houses;
  let h = `<table><thead><tr><th>ภพ</th><th>ชื่อ</th><th>domain</th><th>keywords</th></tr></thead><tbody>`;
  for (const [id, ho] of Object.entries(houses)) {
    h += `<tr><td>${ho.id}</td><td><b>${ho.name}</b></td><td>${ho.domain||'—'}</td><td>${pills(ho.keywords)}</td></tr>`;
  }
  h += '</tbody></table>';
  document.getElementById('houses-table').innerHTML = h;
}

function renderQualities() {
  const q = data.tals_quality_rules;
  let h = `<table><thead><tr><th>มาตรฐาน</th><th>polarity</th><th>strength%</th><th>lop</th><th>คำอธิบาย</th><th>pattern</th><th>time profile</th></tr></thead><tbody>`;
  for (const [k,v] of Object.entries(q.qualities)) {
    if (k.startsWith('_')) continue;
    const badge = v.polarity==='+' ? 'badge-plus' : v.polarity==='-' ? 'badge-minus' : 'badge-neutral';
    h += `<tr>
      <td><b>${k}</b></td>
      <td><span class="badge ${badge}">${v.polarity||'~'}</span></td>
      <td>${v.strength_pct !== undefined ? v.strength_pct+'%' : '—'}</td>
      <td>${v.lop_applicable ? '✓' : '—'}</td>
      <td>${v.description||'—'}</td>
      <td>${v.pattern||'—'}</td>
      <td>${v.time_profile||'—'}</td>
    </tr>`;
  }
  h += '</tbody></table>';
  // Aspect weights table
  h += '<br><hr><b>มุมสัมพันธ์ทั้ง 4 (ch009 + ch025)</b><br>';
  h += `<table><thead><tr><th>มุม</th><th>EN</th><th>นับ</th><th>weight%</th><th>หมายเหตุ</th></tr></thead><tbody>`;
  for (const [ak, av] of Object.entries(q.aspects)) {
    if (ak.startsWith('_')) continue;
    h += `<tr><td><b>${av.name}</b></td><td>${av.name_en||'—'}</td>
      <td>${av.count||av.count_options?.join('/')||'—'}</td>
      <td><b>${av.weight_pct}%</b></td><td><small>${av.note||''}</small></td></tr>`;
  }
  h += '</tbody></table>';
  // Derivation rules
  h += '<br><b>กฎ Derive (ตรงข้าม = +6%12)</b><br>';
  h += `<table><thead><tr><th>Primary</th><th>Derived</th><th>หมายเหตุ</th></tr></thead><tbody>`;
  for (const dr of q.derivation_rules.pairs) {
    h += `<tr><td>${dr.primary}</td><td>${dr.derived}</td><td>${dr.note}</td></tr>`;
  }
  h += '</tbody></table>';
  // ch010
  h += '<br><b>ch010 — กฎเล็งกัน (ลบ-ลบ=บวก)</b><br>';
  h += `<table><thead><tr><th>Quality A เล็งกัน</th><th>กลายเป็น</th><th>Pattern</th></tr></thead><tbody>`;
  for (const r of q.ch010_rules.opposition_flip) {
    h += `<tr><td>${r.quality_a}</td><td>${r.flips_to}</td><td>${r.pattern}</td></tr>`;
  }
  h += `</tbody></table><br><small>ใช้กับ: ${q.ch010_rules.applicable_to.join(', ')} · ห้ามใช้กับ: ${q.ch010_rules.not_applicable.join(', ')}</small>`;

  // ลัคนา rules section
  const lr = q.lagna_rules;
  h += '<br><hr><b>กฎลัคนา / ตนุเศษ / ตนุลัคน์</b> <small>(ch013)</small><br><br>';
  h += `<table><thead><tr><th>กฎ</th><th>วิธีคำนวณ/หาค่า</th><th>หมายเหตุ</th></tr></thead><tbody>`;
  const ts = lr.tanusesh;
  h += `<tr><td><b>ตนุเศษ</b><br><small>${ts.description}</small></td>
    <td><code>${ts.formula}</code><br><small>${ts.formula_note}</small><br>ผล: ${ts.result_range}</td>
    <td>ใช้ไม่ได้กับ planet_id ${ts.not_applicable_planet_ids.join(',')} (มฤตยู/ราหู/เกตุ)<br>notation: ${ts.notation}<br><small>trait ดูได้ที่แท็บ ดาว → ตนุเศษ</small></td></tr>`;
  const tl = lr.tanulagn;
  h += `<tr><td><b>ตนุลัคน์</b><br><small>${tl.description}</small></td>
    <td>${tl.rule}<br><small>(ดู ราศีลัคนา → ruler ในแท็บ ราศี)</small></td>
    <td>${tl.expression_modifier}<br><small>${tl.not_applicable_note}</small></td></tr>`;
  h += `</tbody></table>`;
  const thr = lr.three_layer_identity;
  h += `<br><small><b>${thr.name}:</b> ` + thr.layers.map(l=>`[${l.layer}] ${l.name}=${l.aspect}`).join(' → ') + ` · ${thr.note}</small>`;

  // อนุเกษตร pairs section
  const ap = q.anukaset_pairs;
  h += `<br><hr><b>อนุเกษตร — คู่ดาวสลับเกษตร</b> <small>(${ap.count} combinations · ch010)</small><br>`;
  h += `<small>${ap._note}</small><br>`;
  h += `<button onclick="var el=document.getElementById('anukaset-tbl');el.style.display=el.style.display==='none'?'block':'none'" style="margin:6px 0;padding:4px 12px;background:#3949ab;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:0.78rem">▶ แสดง/ซ่อน 62 คู่</button>`;
  h += `<div id="anukaset-tbl" style="display:none;margin-top:8px">`;
  h += `<table><thead><tr><th>#</th><th>ดาว A</th><th>อยู่ราศี</th><th></th><th>ดาว B</th><th>อยู่ราศี</th></tr></thead><tbody>`;
  ap.pairs.forEach((p,i) => {
    h += `<tr><td><small>${i+1}</small></td><td>${p.a_name}</td><td><b>${p.a_at_name}</b></td><td>↔</td><td>${p.b_name}</td><td><b>${p.b_at_name}</b></td></tr>`;
  });
  h += `</tbody></table></div>`;

  document.getElementById('qualities-table').innerHTML = h;
}

function renderRelations() {
  const rel = data.tals_planet_relations;
  if (!rel) { document.getElementById('relations-table').innerHTML = '<p>ไม่มีข้อมูล</p>'; return; }
  let h = '';
  // Relation type legend
  h += '<b>ประเภทความสัมพันธ์</b><br>';
  h += `<table><thead><tr><th>ประเภท</th><th>ชื่อไทย</th><th>ผล</th><th>ระดับ</th></tr></thead><tbody>`;
  for (const [rt, rv] of Object.entries(rel.relation_types)) {
    h += `<tr><td><b>${rt}</b></td><td>${rv.name_th}</td><td><small>${rv.effect}</small></td><td>${rv.strength}</td></tr>`;
  }
  h += '</tbody></table><br>';
  // Pairs table
  h += '<b>คู่ดาว (source: ch008)</b><br>';
  h += `<table><thead><tr><th>ดาว A</th><th>ดาว B</th><th>ประเภท</th><th>ชื่อไทย</th><th>หมายเหตุ</th></tr></thead><tbody>`;
  for (const [key, p] of Object.entries(rel.pairs)) {
    if (key.startsWith('_')) continue;
    const rt = rel.relation_types[p.type];
    h += `<tr><td><b>${p.a_name}</b></td><td><b>${p.b_name}</b></td>
      <td>${p.type}</td><td>${rt?.name_th||'—'}</td><td><small>${p.element||p._note||''}</small></td></tr>`;
  }
  h += '</tbody></table><br>';
  // Element groups
  h += '<b>คู่ธาตุ (element groups)</b><br>';
  h += `<table><thead><tr><th>ธาตุ</th><th>ดาว</th></tr></thead><tbody>`;
  for (const [el, eg] of Object.entries(rel.element_groups)) {
    if (el.startsWith('_')) continue;
    h += `<tr><td><b>${el}</b></td><td>${eg.names.join(', ')}</td></tr>`;
  }
  h += '</tbody></table>';
  document.getElementById('relations-table').innerHTML = h;
}

function renderLagna() {
  const lg = data.tals_lagna;
  if (!lg) return;
  const planetNames = {1:'อาทิตย์',2:'จันทร์',3:'อังคาร',4:'พุธ',5:'พฤหัส',6:'ศุกร์',7:'เสาร์',8:'ราหู'};
  let h = '';

  // ตนุเศษ
  h += '<b>ตนุเศษ — นิสัย/อารมณ์พื้นฐาน</b> <small>(planets 1–7 only · source: ch013)</small><br>';
  h += `<table><thead><tr><th>ดาว</th><th>trait</th><th>src</th></tr></thead><tbody>`;
  for (const [pid, p] of Object.entries(lg.tanusesh_per_planet)) {
    if (pid.startsWith('_')) continue;
    h += `<tr><td><b>${p.planet_name}</b></td><td>${p.trait}</td><td><small>${p.src}·${p.ref}</small></td></tr>`;
  }
  h += '</tbody></table><br>';

  // ตนุลัคน์
  h += '<b>ตนุลัคน์ — ตัวตนภายในแท้ (เจ้าเรือนลัคนา)</b> <small>(source: ch013)</small><br>';
  h += `<table><thead><tr><th>ดาว</th><th>inner</th><th>src</th></tr></thead><tbody>`;
  for (const [pid, p] of Object.entries(lg.tanulagn_per_planet)) {
    if (pid.startsWith('_')) continue;
    h += `<tr><td><b>${p.planet_name}</b></td><td>${p.inner}</td><td><small>${p.src}·${p.ref}</small></td></tr>`;
  }
  h += '</tbody></table><br>';

  // ดาวกุมลัคนา (เกษตร)
  h += '<b>ดาวเกษตรกุมลัคนา — ความหมายของดาว (ยิ่งอายุมากยิ่งชัด)</b> <small>(source: ch023)</small><br>';
  h += `<small style="color:#666">General: ${lg.kum_lagna_kashet_per_planet._general.meaning}</small><br>`;
  h += `<table><thead><tr><th>ดาว</th><th>meaning</th><th>note</th></tr></thead><tbody>`;
  for (const [pid, p] of Object.entries(lg.kum_lagna_kashet_per_planet)) {
    if (pid.startsWith('_')) continue;
    h += `<tr><td><b>${p.planet_name}</b></td><td>${p.meaning}</td><td><small>${p._note||''}</small></td></tr>`;
  }
  h += '</tbody></table><br>';

  // Rules
  h += '<b>กฎ</b><br>';
  h += `<table><thead><tr><th>กฎ</th><th>เนื้อหา</th><th>src</th></tr></thead><tbody>`;
  for (const [key, r] of Object.entries(lg.rules)) {
    h += `<tr><td><code>${key}</code></td><td>${r.rule}</td><td><small>${r.src}·${r.ref}</small></td></tr>`;
  }
  h += '</tbody></table>';

  document.getElementById('lagna-table').innerHTML = h;
}

let _rulesFiltered = [];

function renderRules() {
  const rules = (data.rules_summary || []);
  _rulesFiltered = rules;
  _renderRulesTable(rules);
}

function filterRules(q) {
  const rules = (data.rules_summary || []);
  const typeF = document.getElementById('rules-type-filter').value;
  const stF = document.getElementById('rules-st-filter').value;
  const qLow = (q || '').toLowerCase();
  _rulesFiltered = rules.filter(r => {
    if (typeF && r.type !== typeF) return false;
    if (stF && r.source_type !== stF) return false;
    if (qLow) {
      const kwText = (r.keywords||[]).map(k=>k.k).join(' ');
      const hay = (r.id + ' ' + r.domain + ' ' + kwText + ' ' + r.meaning + ' ' + r.c).toLowerCase();
      if (!hay.includes(qLow)) return false;
    }
    return true;
  });
  _renderRulesTable(_rulesFiltered);
}

function _renderRulesTable(rules) {
  const scoreColor = s => s >= 0.9 ? '#2d6a2d' : s >= 0.7 ? '#7a5c00' : s > 0 ? '#555' : '#aaa';
  const typeColor = t => ({'NATAL_COMBINATION':'#1a4a8a','NATAL_ATOMIC':'#2d6a2d','TRANSIT_NATAL':'#7a2d7a','PRINCIPLE':'#8a4a00','REFERENCE':'#555','DEFINITION':'#555'})[t] || '#333';
  const stBadge = st => st === 'PRIMARY' ? '<span style="background:#2d6a2d;color:#fff;padding:1px 5px;border-radius:3px;font-size:10px">PRIMARY</span>' : '<span style="background:#ccc;color:#555;padding:1px 5px;border-radius:3px;font-size:10px">INFERRED</span>';
  let h = `<table><thead><tr>
    <th>id</th><th>type</th><th>tier</th><th>score</th><th>domain</th>
    <th>pol</th><th>source</th><th>ch</th><th>title</th><th>keywords</th>
  </tr></thead><tbody>`;
  for (const r of rules) {
    h += `<tr>
      <td><code style="font-size:11px">${r.id}</code></td>
      <td><span style="color:${typeColor(r.type)};font-size:11px;font-weight:bold">${r.type}</span></td>
      <td style="text-align:center">${r.tier||'-'}</td>
      <td style="text-align:center;color:${scoreColor(r.score)};font-weight:bold">${r.score.toFixed(1)}</td>
      <td><small>${r.domain||''}</small></td>
      <td style="text-align:center">${r.polarity||'~'}</td>
      <td>${stBadge(r.source_type)}</td>
      <td><small>${r.ch||''}</small></td>
      <td><small>${r.c||''}</small></td>
      <td title="${r.meaning.replace(/"/g,'&quot;')}">${pills(r.keywords||[])}</td>
    </tr>`;
  }
  h += '</tbody></table>';
  document.getElementById('rules-table').innerHTML = h;
  document.getElementById('rules-count').textContent = `${rules.length} rules`;
}

function renderAll() { renderPlanets(); renderSigns(); renderHouses(); renderQualities(); renderRelations(); renderLagna(); renderRules(); }

function copyTSV(containerId) {
  const table = document.getElementById(containerId).querySelector('table');
  if (!table) return;
  const rows = [...table.querySelectorAll('tr')].map(tr =>
    [...tr.querySelectorAll('th,td')].map(td => td.innerText.replace(/\n/g,' ')).join('\t')
  );
  navigator.clipboard.writeText(rows.join('\n')).then(() => {
    const btn = event.target; btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy TSV → Paste to Google Sheets', 2000);
  });
}

loadAll();
