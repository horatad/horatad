<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตารางโพสต์อัตโนมัติ — โหราทาส AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1f2d5e, #272b5b);
    min-height: 100vh;
    padding: 20px 14px 60px;
    color: #222;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  .back { display: inline-block; color: #ba8345; text-decoration: none; font-size: 13px; opacity: .85; margin-bottom: 8px; }
  h1 { font-size: 22px; color: #fff; margin-bottom: 4px; }
  .stats { font-size: 13px; color: #c9d2f0; margin-bottom: 14px; }
  .stats b { color: #ba8345; }

  /* info banner — อธิบายว่าระบบ auto */
  .auto-info {
    background: rgba(46,125,50,.14); border: 1px solid rgba(129,199,132,.4); border-left: 4px solid #66bb6a;
    border-radius: 0 10px 10px 0; padding: 12px 14px; margin-bottom: 18px;
    font-size: 13px; color: #c9efd0; line-height: 1.6;
  }
  .auto-info b { color: #a5e8b0; }

  .section-title { font-size: 14px; font-weight: 700; color: #fff; margin: 22px 0 10px; display: flex; align-items: center; gap: 8px; }
  .section-title .count { background: rgba(255,255,255,.15); color: #fff; font-size: 12px; padding: 1px 9px; border-radius: 10px; }

  /* queue card */
  .item {
    background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,.18);
  }
  .item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .sched-badge {
    font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 8px;
    background: #e3f2fd; color: #1565c0; white-space: nowrap;
  }
  .sched-badge.soon { background: #e8f5e9; color: #2e7d32; }
  .order { font-size: 12px; color: #aaa; font-weight: 700; }
  .chip { font-size: 11px; background: #f0f0f0; color: #666; padding: 2px 8px; border-radius: 6px; }
  .item-title { font-size: 15px; font-weight: 600; color: #1f2d5e; line-height: 1.45; cursor: pointer; }
  .item-title:hover { color: #ba8345; }

  .body-box {
    display: none; background: #f8f9fa; border: 1px solid #e8e8e8; border-radius: 8px;
    padding: 12px; font-size: 13.5px; line-height: 1.65; color: #333;
    white-space: pre-wrap; word-break: break-word; margin-top: 10px;
  }
  .body-box.show { display: block; }

  .empty { background: rgba(255,255,255,.08); border: 1px dashed rgba(255,255,255,.25); border-radius: 12px; padding: 26px 16px; text-align: center; color: #c9d2f0; font-size: 14px; line-height: 1.6; }
  .reload-btn { background: #ba8345; color: #fff; border: none; border-radius: 9px; padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }

  /* posted history */
  .posted-item {
    background: rgba(255,255,255,.07); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px; font-size: 13px; color: #dfe5f7;
  }
  .posted-item .pdate { font-size: 11px; color: #9fb0e0; white-space: nowrap; }
  .posted-item .ptitle { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  details.posted-wrap > summary { cursor: pointer; color: #c9d2f0; font-size: 14px; font-weight: 700; padding: 6px 0; list-style: none; }
  details.posted-wrap > summary::-webkit-details-marker { display: none; }
  details.posted-wrap > summary::before { content: '▸ '; }
  details.posted-wrap[open] > summary::before { content: '▾ '; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Tools</a>
  <h1>📅 ตารางโพสต์อัตโนมัติ</h1>
  <div class="stats" id="stats">กำลังโหลด…</div>

  <div class="auto-info">
    🤖 <b>ระบบโพสต์อัตโนมัติทุกวัน 08:30 น.</b> — ไม่ต้องโพสต์เอง<br>
    หน้านี้เป็น <b>รายงาน</b> แสดงว่าโพสต์ไหนจะขึ้นวันไหน · คิวเติมเองจาก Content Curator ทุกวัน
  </div>

  <!-- คิวรอโพสต์ -->
  <div class="section-title">⏳ รอโพสต์ <span class="count" id="queueCount">–</span></div>
  <div id="queue"></div>

  <!-- โพสต์แล้ว -->
  <details class="posted-wrap" id="postedWrap" style="margin-top:24px">
    <summary>✅ โพสต์แล้ว (<span id="postedCount">0</span>)</summary>
    <div id="posted" style="margin-top:10px"></div>
  </details>
</div>

<script>
const REPO   = 'horatad/horatad';
const BRANCH = 'main';
const SCHED_PATH  = 'content/scheduled';
const POSTED_PATH = 'content/posted';
const POST_HOUR = 8, POST_MIN = 30;   // cron fb_autopost: 08:30 ICT ทุกวัน

let queue  = [];   // [{filename, data}] รอโพสต์ เรียงเก่า→ใหม่ (ตาม scheduled_at = ลำดับคิว)
let posted = [];   // [{filename, data}] โพสต์แล้ว เรียงใหม่→เก่า

// --- GitHub fetch (read-only, ไม่ต้องใช้ token — public repo) ---
async function listDir(path) {
  const url = `https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}&t=${Date.now()}`;
  const res = await fetch(url, { headers: { Accept: 'application/vnd.github.v3+json' } });
  if (res.status === 403 || res.status === 429) {
    throw new Error('GitHub rate limit — รอสักครู่แล้วรีเฟรช (public repo จำกัด 60 ครั้ง/ชม.)');
  }
  if (!res.ok) throw new Error(`โหลดรายการไม่ได้ (HTTP ${res.status})`);
  const files = await res.json();
  return Array.isArray(files) ? files.filter(f => f.name.endsWith('.json') && !f.name.startsWith('.')) : [];
}
async function fetchJson(downloadUrl) {
  const res = await fetch(downloadUrl + '?t=' + Date.now());
  if (!res.ok) throw new Error(`โหลดไฟล์ไม่ได้ (HTTP ${res.status})`);
  return res.json();
}

// --- caption preview (body หรือ fallback ประกอบจาก title+link+tags) ---
function buildText(d) {
  if (d.body) return d.body.trim();
  const lines = [d.title || ''];
  if (d.meta?.youtube_url) lines.push('\n' + d.meta.youtube_url);
  const tags = (d.tags || []).map(t => '#' + t.replace(/\s+/g, '')).join(' ');
  if (tags) lines.push('\n' + tags);
  return lines.join('\n').trim();
}

// --- เวลาโพสต์จริง: cron ยิง 08:30 ICT ทุกวัน · order #0 = รอบ 08:30 ถัดไป ---
// (scheduled_at ในไฟล์เป็นแค่ลำดับคิว FIFO — เวลาจริงมาจาก cron ไม่ใช่ค่านั้น)
const TH_MONTH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function schedLabel(orderIdx) {
  const now = new Date();
  // หา 08:30 ถัดไป — ถ้าวันนี้เลย 08:30 แล้ว เริ่มพรุ่งนี้
  const base = new Date();
  base.setHours(POST_HOUR, POST_MIN, 0, 0);
  if (now >= base) base.setDate(base.getDate() + 1);
  base.setDate(base.getDate() + orderIdx);

  const dayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.round((new Date(base.getFullYear(), base.getMonth(), base.getDate()) - dayStart) / 86400000);
  const dateStr = `${base.getDate()} ${TH_MONTH[base.getMonth()]}`;
  const hhmm = `${String(POST_HOUR).padStart(2,'0')}:${String(POST_MIN).padStart(2,'0')}`;
  let prefix = '';
  if (diff === 0) prefix = 'วันนี้ ';
  else if (diff === 1) prefix = 'พรุ่งนี้ ';
  return { text: `${prefix}${dateStr} · ${hhmm}`, soon: diff <= 1 };
}

function esc(s) { return (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// --- render ---
function render() {
  const stats = document.getElementById('stats');
  const queueEl = document.getElementById('queue');
  const postedEl = document.getElementById('posted');

  const days = queue.length;
  stats.innerHTML = `<b>${queue.length}</b> รอโพสต์ (พอ <b>${days}</b> วัน) · <b>${posted.length}</b> โพสต์แล้ว`;
  document.getElementById('queueCount').textContent = queue.length;
  document.getElementById('postedCount').textContent = posted.length;

  // queue
  if (queue.length === 0) {
    queueEl.innerHTML = `<div class="empty">🎉 คิวว่าง<br>Content Curator จะเติมให้อัตโนมัติทุกวัน 08:00</div>`;
  } else {
    queueEl.innerHTML = queue.map((item, i) => {
      const d = item.data;
      const sl = schedLabel(i);
      const ytId = d.meta?.youtube_video_id;
      return `
        <div class="item" data-i="${i}">
          <div class="item-top">
            <span class="order">#${i + 1}</span>
            <span class="sched-badge ${sl.soon ? 'soon' : ''}">📅 ${sl.text}</span>
            ${d.category ? `<span class="chip">${esc(d.category)}</span>` : ''}
            ${d.source ? `<span class="chip">${esc(d.source)}</span>` : ''}
          </div>
          <div class="item-title" onclick="toggleBody(${i})">${esc(d.title)}</div>
          <div class="body-box" id="body-${i}">${esc(buildText(d))}${ytId ? `\n\n▶️ youtube.com/watch?v=${ytId}` : ''}</div>
        </div>`;
    }).join('');
  }

  // posted history
  postedEl.innerHTML = posted.length === 0
    ? `<div style="color:#9fb0e0;font-size:13px;padding:4px 2px">ยังไม่มีประวัติ</div>`
    : posted.map(p => `
        <div class="posted-item">
          <span class="pdate">${esc(p.data.date_posted || '–')}</span>
          <span class="ptitle">${esc(p.data.title)}</span>
        </div>`).join('');
}

function toggleBody(i) { document.getElementById('body-' + i)?.classList.toggle('show'); }

// --- load ---
async function loadData() {
  queue.length = 0; posted.length = 0;
  document.getElementById('queue').innerHTML = `<div class="empty">กำลังโหลด…</div>`;
  try {
    const schedFiles = await listDir(SCHED_PATH);
    for (const f of schedFiles) queue.push({ filename: f.name, data: await fetchJson(f.download_url) });
    // เรียงเก่า→ใหม่ ตาม scheduled_at (= ลำดับ FIFO ที่ cron จะหยิบ) · fallback date_added / ชื่อไฟล์
    queue.sort((a, b) => (a.data.scheduled_at || a.data.date_added || a.filename)
                         .localeCompare(b.data.scheduled_at || b.data.date_added || b.filename));

    const postedFiles = await listDir(POSTED_PATH);
    for (const f of postedFiles) posted.push({ filename: f.name, data: await fetchJson(f.download_url) });
    posted.sort((a, b) => (b.data.date_posted || '').localeCompare(a.data.date_posted || ''));

    render();
  } catch (e) {
    document.getElementById('queue').innerHTML =
      `<div class="empty" style="border:1px solid #c0392b;color:#e8b4b4">`
      + `⚠️ ${esc(e.message)}<br>`
      + `<button class="reload-btn" onclick="loadData()">↻ ลองใหม่</button></div>`;
  }
}

loadData();
</script>
</body>
</html>
