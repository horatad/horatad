<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JULIAN Status</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 20px; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .sub { color: #666; font-size: 0.85rem; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card h2 { font-size: 1rem; margin-bottom: 14px; color: #444; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat { flex: 1; min-width: 120px; background: #f8f8f8; border-radius: 8px; padding: 12px 16px; }
  .stat .n { font-size: 1.8rem; font-weight: 700; color: #1a73e8; }
  .stat .l { font-size: 0.78rem; color: #666; margin-top: 2px; }
  .bar-wrap { background: #eee; border-radius: 99px; height: 10px; margin: 8px 0 4px; }
  .bar { background: #1a73e8; border-radius: 99px; height: 10px; transition: width .6s; }
  .bar-label { font-size: 0.78rem; color: #666; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; padding: 6px 8px; background: #f0f0f0; color: #555; font-weight: 600; }
  td { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  .tag { display: inline-block; background: #e8f0fe; color: #1a73e8; border-radius: 4px; padding: 1px 6px; font-size: 0.75rem; }
  .conf { color: #888; font-size: 0.8rem; }
  .run-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; }
  .run-row:last-child { border-bottom: none; }
  .run-date { color: #888; font-size: 0.78rem; }
  .badge { background: #e8f0fe; color: #1a73e8; border-radius: 99px; padding: 2px 8px; font-size: 0.75rem; font-weight: 600; }
  .loading { color: #888; font-size: 0.85rem; padding: 8px 0; }
  .jd-note { color: #aaa; font-size: 0.72rem; }
  .gen-time { font-size: 0.75rem; color: #aaa; margin-top: 10px; }
</style>
</head>
<body>

<h1>🔭 JULIAN Status</h1>
<p class="sub">อัปเดตอัตโนมัติทุกคืน — ไม่ต้อง login</p>

<!-- ── Summary ── -->
<div class="card">
  <h2>📊 ภาพรวม</h2>
  <div class="row">
    <div class="stat"><div class="n" id="s-total">—</div><div class="l">records ใน D1</div></div>
    <div class="stat"><div class="n" id="s-target">500</div><div class="l">เป้าหมาย</div></div>
    <div class="stat"><div class="n" id="s-rate">—</div><div class="l">records / วัน</div></div>
    <div class="stat"><div class="n" id="s-eta">—</div><div class="l">วันที่คาดเสร็จ</div></div>
  </div>
  <div class="bar-wrap"><div class="bar" id="prog-bar" style="width:0%"></div></div>
  <div class="bar-label" id="prog-label">กำลังโหลด...</div>
</div>

<!-- ── Run history ── -->
<div class="card">
  <h2>📅 ประวัติ run</h2>
  <div id="runs-list"><div class="loading">กำลังโหลด...</div></div>
</div>

<!-- ── By category ── -->
<div class="card">
  <h2>🗂️ แบ่งตามหมวด</h2>
  <div id="cat-list"><div class="loading">กำลังโหลด...</div></div>
</div>

<!-- ── Recent records ── -->
<div class="card">
  <h2>👤 รายชื่อล่าสุด 100 คน</h2>
  <table>
    <thead><tr><th>ชื่อ</th><th>วันเกิด (CE)</th><th>หมวด</th><th>ประเทศ</th><th>ความน่าเชื่อถือ</th></tr></thead>
    <tbody id="names-table"><tr><td colspan="5" class="loading">กำลังโหลด...</td></tr></tbody>
  </table>
  <div class="gen-time" id="gen-time"></div>
</div>

<script>
const TARGET       = 500;
const PROGRESS_URL = 'https://raw.githubusercontent.com/horatad/horatad/main/workers/julian_progress.json';
const REPORT_URL   = 'https://raw.githubusercontent.com/horatad/horatad/main/workers/julian_report.json';
const JD_EPOCH     = 730428;
const JD_EPOCH_MS  = Date.UTC(2000, 0, 1);

function jdToDate(jd) {
  const ms = JD_EPOCH_MS + (jd - JD_EPOCH) * 86400000;
  const d  = new Date(ms);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}

async function loadProgress() {
  try {
    const r = await fetch(PROGRESS_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const p = await r.json();
    const total = p.total ?? 0;
    const pct   = Math.min(100, Math.round(total / TARGET * 100));
    document.getElementById('prog-bar').style.width = pct + '%';
    document.getElementById('prog-label').textContent = `${total.toLocaleString()} / ${TARGET} (${pct}%)`;

    const runs = p.runs ?? [];
    if (runs.length) {
      const days = new Set(runs.map(r => r.date)).size;
      const rate = Math.round(total / Math.max(1, days));
      const left = TARGET - total;
      const etaDays = left > 0 && rate > 0 ? Math.ceil(left / rate) : 0;
      const etaDate = total >= TARGET ? 'เสร็จแล้ว ✅'
        : etaDays > 0 ? new Date(Date.now() + etaDays*86400000).toISOString().slice(0,10)
        : '—';
      document.getElementById('s-total').textContent = total.toLocaleString();
      document.getElementById('s-rate').textContent  = rate.toLocaleString();
      document.getElementById('s-eta').textContent   = etaDate;
    }

    const runsEl = document.getElementById('runs-list');
    runsEl.innerHTML = runs.length
      ? [...runs].reverse().map(r =>
          `<div class="run-row">
            <span>${r.query} <span class="badge">+${r.count}</span></span>
            <span class="run-date">${r.date}</span>
          </div>`).join('')
      : '<span style="color:#888">ยังไม่มี run</span>';
  } catch (e) {
    document.getElementById('prog-label').textContent = 'โหลดไม่ได้: ' + e.message;
  }
}

async function loadReport() {
  try {
    const r = await fetch(REPORT_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('ยังไม่มี report.json — รอ workflow run ครั้งถัดไป');
    const rep = await r.json();

    // category
    const catEl = document.getElementById('cat-list');
    catEl.innerHTML = rep.by_category?.length
      ? rep.by_category.map(c =>
          `<div class="run-row">
            <span>${c.event_label ?? '(ไม่ระบุ)'} — ${c.country ?? 'ทั่วโลก'}</span>
            <span class="badge">${c.cnt}</span>
          </div>`).join('')
      : '<span style="color:#888">ไม่มีข้อมูล</span>';

    // recent names
    const tbody = document.getElementById('names-table');
    tbody.innerHTML = rep.recent?.length
      ? rep.recent.map(row =>
          `<tr>
            <td>${row.name ?? '—'}</td>
            <td>${jdToDate(row.jd)}</td>
            <td><span class="tag">${row.event_label ?? '—'}</span></td>
            <td>${row.country ?? '—'}</td>
            <td class="conf">${row.confidence != null ? (row.confidence*100).toFixed(0)+'%' : '—'}</td>
          </tr>`).join('')
      : '<tr><td colspan="5" style="color:#888;text-align:center">ไม่มีข้อมูล</td></tr>';

    if (rep.generated) {
      document.getElementById('gen-time').textContent =
        'อัปเดตล่าสุด: ' + new Date(rep.generated).toLocaleString('th-TH');
    }
  } catch (e) {
    document.getElementById('cat-list').innerHTML =
      `<span style="color:#888">${e.message}</span>`;
    document.getElementById('names-table').innerHTML =
      `<tr><td colspan="5" style="color:#888;text-align:center">${e.message}</td></tr>`;
  }
}

loadProgress();
loadReport();
</script>
</body>
</html>
