<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horatad — Dictionary Builder V3.0</title>
<style>
:root {
  --gold:    #b8860b;
  --gold-l:  #d4a017;
  --purple:  #5b3fa0;
  --purple-d:#3d2a70;
  --green:   #1a6b3c;
  --red:     #f85149;
  --blue:    #1a56db;
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #21262d;
  --bg4:     #2d333b;
  --border:  #30363d;
  --text:    #c9d1d9;
  --muted:   #8b949e;
  --TRUE_RULE:    #1a6b3c;
  --HOUSE_CONCEPT:#7d4e00;
  --CASE_STUDY:   #5b3fa0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 14px; }

/* HEADER */
header {
  background: linear-gradient(135deg, #0d1117 0%, #1a0f2e 100%);
  border-bottom: 1px solid var(--gold);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 18px; letter-spacing: 2px; }
header .sub { color: var(--muted); font-size: 12px; }
.stats-bar { display: flex; gap: 16px; }
.stat { text-align: center; }
.stat .n { font-size: 20px; font-weight: 700; color: var(--gold); }
.stat .l { font-size: 11px; color: var(--muted); }

/* TOOLBAR */
.toolbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  position: sticky; top: 57px; z-index: 99;
}
.toolbar select, .toolbar input[type=text] {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 5px 10px; border-radius: 6px; font-size: 13px; font-family: inherit;
}
.toolbar select:focus, .toolbar input:focus { outline: none; border-color: var(--gold); }
.btn {
  padding: 5px 14px; border-radius: 6px; border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600; transition: all .15s;
}
.btn-gold    { background: var(--gold); color: #000; }
.btn-gold:hover { background: var(--gold-l); }
.btn-purple  { background: var(--purple); color: #fff; }
.btn-purple:hover { background: var(--purple-d); }
.btn-green   { background: var(--green); color: #fff; }
.btn-green:hover { filter: brightness(1.2); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.progress { font-size: 12px; color: var(--muted); margin-left: auto; }

/* MAIN LAYOUT */
.main { display: flex; height: calc(100vh - 113px); }

/* RULE LIST */
.rule-list {
  width: 340px; min-width: 240px; overflow-y: auto;
  border-right: 1px solid var(--border); background: var(--bg2);
}
.rule-item {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s;
}
.rule-item:hover { background: var(--bg3); }
.rule-item.active { background: var(--bg4); border-left: 3px solid var(--gold); }
.rule-item.done   { opacity: .6; }
.rule-item .ri-id   { font-size: 11px; color: var(--muted); }
.rule-item .ri-cond { font-size: 12px; color: var(--text); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rule-item .ri-tag  { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-top: 4px; font-weight: 700; }
.tag-TRUE_RULE    { background: #0d2b1a; color: #3fb950; border: 1px solid var(--green); }
.tag-HOUSE_CONCEPT{ background: #2b1d06; color: #e3913c; border: 1px solid #7d4e00; }
.tag-CASE_STUDY   { background: #1a1033; color: #a78bfa; border: 1px solid var(--purple); }
.tag-multi        { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); margin-left: 4px; }

/* EDITOR PANEL */
.editor {
  flex: 1; overflow-y: auto; padding: 24px 28px;
  background: var(--bg);
}
.editor-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--muted); font-size: 14px;
}
.rule-header { margin-bottom: 20px; }
.rule-header .rh-id   { font-size: 12px; color: var(--muted); }
.rule-header .rh-ch   { font-size: 13px; color: var(--muted); margin-top: 2px; }
.rule-header .rh-cond { font-size: 16px; color: var(--text); margin-top: 6px; font-weight: 600; }
.rule-header .rh-pred { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.6; border-left: 3px solid var(--border); padding-left: 12px; }
.rule-header .rh-tags { font-size: 11px; color: var(--muted); margin-top: 6px; }

/* CONDITIONS */
.conds-section { margin-top: 20px; }
.conds-title   { font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 12px; letter-spacing: 1px; }
.cond-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; margin-bottom: 10px;
}
.cond-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.seq-badge {
  font-size: 12px; font-weight: 700; background: var(--gold); color: #000;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.del-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; padding: 0 4px; }
.del-btn:hover { color: #ff6b6b; }
.cond-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
}
.field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; letter-spacing: .5px; }
.field select, .field input[type=checkbox] {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); padding: 6px 8px; border-radius: 6px; font-size: 12px; font-family: inherit;
}
.field select:focus { outline: none; border-color: var(--gold); }
.required-row { margin-top: 10px; display: flex; align-items: center; gap: 8px; font-size: 12px; }
.required-row input { width: auto; }
.add-cond-btn {
  background: none; border: 1px dashed var(--border); color: var(--muted);
  width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-family: inherit;
  font-size: 13px; transition: all .15s;
}
.add-cond-btn:hover { border-color: var(--gold); color: var(--gold); }
.save-row { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
.saved-badge { font-size: 12px; color: var(--green); display: none; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75);
  z-index: 1000; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; }
.modal h2 { color: var(--gold); font-size: 16px; margin-bottom: 12px; }
.modal p  { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
.modal pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 11px; color: var(--text); overflow-x: auto; max-height: 200px; overflow-y: auto; }
.modal-close { background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<header>

<div class="toolbar">

  <button class="btn btn-purple" onclick="exportKBContext()">⬇ kb_context.json</button>
  <button class="btn btn-outline" onclick="saveState()">💾 Save state</button>
  <button class="btn btn-outline" onclick="loadState()">📂 Load state</button>
  <button class="btn btn-outline" onclick="importAIConditions()" title="Import conditions จาก extract_conditions.html output">📥 Import AI</button>
  <button class="btn btn-gold" onclick="exportKBJson()">⬇ kb.json</button>
</div>

<div class="main">
  <div class="rule-list" id="rule-list"></div>
  <div class="editor" id="editor">
    <div class="editor-empty">← เลือก rule จากรายการเพื่อเริ่ม populate conditions</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
    <pre id="modal-pre"></pre>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-gold" id="modal-action">Download</button>
      <button class="modal-close" onclick="closeModal()">ปิด</button>
    </div>
  </div>
</div>

      <div class="ri-id">#${r.id} ${r.chapter}</div>
      <div class="ri-cond">${r.condition || '(ไม่มี condition)'}</div>
      <span class="ri-tag tag-${r.rule_type}">${r.rule_type.replace('_',' ')}</span>
      ${r.is_multi ? '<span class="ri-tag tag-multi">MULTI</span>' : ''}
      ${done ? '<span class="ri-tag tag-TRUE_RULE" style="margin-left:4px">✓</span>' : ''}
    `;
    el.appendChild(div);
  });
  document.getElementById('filter-count').textContent = `${filtered.length} rules`;
}

// ============================================================
// SELECT RULE
// ============================================================
function selectRule(id) {
  activeId = id;
  renderList();
  renderEditor();
}

// ============================================================
// RENDER EDITOR
// ============================================================
function renderEditor() {
  const r = rules.find(x => x.id === activeId);
  const el = document.getElementById('editor');
  if (!r) { el.innerHTML = '<div class="editor-empty">← เลือก rule จากรายการ</div>'; return; }

  const typeColors = {TRUE_RULE:'#3fb950', HOUSE_CONCEPT:'#e3913c', CASE_STUDY:'#a78bfa'};
  const tcolor = typeColors[r.rule_type] || '#888';

  el.innerHTML = `
    <div class="rule-header">
      <div class="rh-id">#${r.id} · <span style="color:${tcolor};font-weight:700">${r.rule_type}</span> ${r.is_multi ? '· <span style="color:var(--muted)">MULTI-CONDITION</span>' : ''}</div>
      <div class="rh-ch">${r.chapter} — ${r.chapter_title}</div>
      <div class="rh-cond">${r.condition || '(ไม่มี condition_text)'}</div>
      <div class="rh-pred">${r.predict}</div>
      <div class="rh-tags">🏷 ${r.tags}</div>
    </div>
    <div class="conds-section">
      <div class="conds-title">CONDITIONS (tb_prediction_conditions)</div>
      <div id="conds-container"></div>
      <button class="add-cond-btn" onclick="addCondition(${r.id})">+ เพิ่ม condition</button>
      <div class="save-row">
        <button class="btn btn-gold" onclick="saveRule(${r.id})">บันทึก rule นี้</button>
        <button class="btn btn-outline" onclick="nextRule()">ข้ามไป rule ถัดไป →</button>
        <span class="saved-badge" id="saved-badge">✓ บันทึกแล้ว</span>
      </div>
    </div>
  `;
  renderConditions(r);
}

function renderConditions(r) {
  const container = document.getElementById('conds-container');
  if (!container) return;
  container.innerHTML = '';
  const seqs = ['A','B','C','D'];
  r.conditions.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'cond-card';
    card.innerHTML = `
      <div class="cond-card-header">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="seq-badge">${seqs[i] || i+1}</div>
          <span style="font-size:12px;color:var(--muted)">Condition ${seqs[i] || i+1}</span>
        </div>
        <button class="del-btn" onclick="deleteCondition(${r.id}, ${i})">✕</button>
      </div>
      <div class="cond-grid">
        <div class="field">
          <label>planet_id</label>
          <select onchange="updateCondition(${r.id}, ${i}, 'planet_id', this.value)">
            <option value="">— (nullable)</option>
            ${PLANETS.map(p => `<option value="${p.code}" ${c.planet_id===p.code?'selected':''}>${p.code} ${p.name}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>quality_required</label>
          <select onchange="updateCondition(${r.id}, ${i}, 'quality_required', this.value)">
            ${QUALITIES.map(q => `<option value="${q}" ${c.quality_required===q?'selected':''}>${q}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>lagna_aspect_req</label>
          <select onchange="updateCondition(${r.id}, ${i}, 'lagna_aspect_req', this.value)">
            ${ASPECTS.map(a => `<option value="${a}" ${c.lagna_aspect_req===a?'selected':''}>${a}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>house_id</label>
          <select onchange="updateCondition(${r.id}, ${i}, 'house_id', this.value)">
            <option value="">— (nullable)</option>
            ${HOUSES.map(h => `<option value="${h.code}" ${c.house_id===h.code?'selected':''}>${h.name}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>anchor_id</label>
          <select onchange="updateCondition(${r.id}, ${i}, 'anchor_id', this.value)">
            <option value="">— (nullable)</option>
            ${ANCHORS.map(a => `<option value="${a.id}" ${String(c.anchor_id)===String(a.id)?'selected':''}>${a.name}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>required</label>
          <select onchange="updateCondition(${r.id}, ${i}, 'required', this.value==='true')">
            <option value="true"  ${c.required===true?'selected':''}>TRUE (บังคับ)</option>
            <option value="false" ${c.required===false?'selected':''}>FALSE (optional)</option>
          </select>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

// ============================================================
// CONDITION CRUD
// ============================================================
function addCondition(rid) {
  const r = rules.find(x => x.id === rid);
  if (!r || r.conditions.length >= 4) return;
  r.conditions.push({
    planet_id: '', quality_required: 'ANY', lagna_aspect_req: 'ANY',
    house_id: '', anchor_id: '', required: true
  });
  renderConditions(r);
}

function deleteCondition(rid, idx) {
  const r = rules.find(x => x.id === rid);
  if (!r) return;
  r.conditions.splice(idx, 1);
  renderConditions(r);
}

function updateCondition(rid, idx, field, value) {
  const r = rules.find(x => x.id === rid);
  if (!r || !r.conditions[idx]) return;
  r.conditions[idx][field] = value;
}

// ============================================================
// SAVE / NEXT
// ============================================================
function saveRule(rid) {
  updateStats();
  renderList();
  const badge = document.getElementById('saved-badge');
  if (badge) { badge.style.display = 'inline'; setTimeout(() => badge.style.display = 'none', 2000); }
  // Auto-save to localStorage
  localStorage.setItem('horatad_builder_v3', JSON.stringify(rules.map(r => ({id:r.id, conditions:r.conditions}))));
}

function nextRule() {
  saveRule(activeId);
  const idx = filtered.findIndex(r => r.id === activeId);
  if (idx >= 0 && idx < filtered.length - 1) {
    selectRule(filtered[idx + 1].id);
  }
}

// ============================================================
// FILTERS
// ============================================================
function applyFilters() {
  const fType   = document.getElementById('filter-type').value;
  const fDone   = document.getElementById('filter-done').value;
  const fMulti  = document.getElementById('filter-multi').value;
  const fSearch = document.getElementById('filter-search').value.toLowerCase();
  filtered = rules.filter(r => {
    if (fType   && r.rule_type !== fType) return false;
    if (fDone === 'yes' && r.conditions.length === 0) return false;
    if (fDone === 'no'  && r.conditions.length  > 0) return false;
    if (fMulti === 'single' && r.is_multi) return false;
    if (fMulti === 'multi'  && !r.is_multi) return false;
    if (fSearch && !r.condition.toLowerCase().includes(fSearch) && !r.predict.toLowerCase().includes(fSearch)) return false;
    return true;
  });
  renderList();
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  const total = rules.length;
  const done  = rules.filter(r => r.conditions.length > 0).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-done').textContent  = done;
  document.getElementById('st-pct').textContent   = pct + '%';
}

// ============================================================
// EXPORT
// ============================================================
function exportEngineCSV() {
  const rows = [];
  rows.push(['predict_id','seq','planet_id','quality_required','lagna_aspect_req','house_id','anchor_id','required','condition_text','predict_text','rule_type'].join(','));
  const seqs = ['A','B','C','D'];
  rules.forEach(r => {
    if (r.conditions.length === 0) {
      // unpopulated row
      rows.push([r.id,'','','','','','','',csvQ(r.condition),csvQ(r.predict),r.rule_type].join(','));
    } else {
      r.conditions.forEach((c, i) => {
        rows.push([r.id, seqs[i]||i+1, c.planet_id||'', c.quality_required||'', c.lagna_aspect_req||'',
          c.house_id||'', c.anchor_id||'', c.required?'TRUE':'FALSE',
          csvQ(r.condition), csvQ(r.predict), r.rule_type].join(','));
      });
    }
  });
  const blob = new Blob(['\uFEFF' + rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  dlBlob(blob, 'engine_rules.csv');
}

function exportKBContext() {
  const ctx = DEFINITIONS_RAW.map(d => ({
    predict_id: d.id, chapter: d.chapter, chapter_title: d.chapter_title,
    context: d.predict, condition: d.condition, tags: d.tags
  }));
  const blob = new Blob([JSON.stringify(ctx, null, 2)], {type:'application/json'});
  dlBlob(blob, 'kb_context.json');
}

function csvQ(s) { return '"' + (s||'').replace(/"/g,'""') + '"'; }
function dlBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

// ============================================================
// SAVE / LOAD STATE
// ============================================================
function saveState() {
  const data = JSON.stringify(rules.map(r => ({id:r.id, conditions:r.conditions})));
  const blob = new Blob([data], {type:'application/json'});
  dlBlob(blob, 'horatad_builder_state.json');
}

function loadState() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const saved = JSON.parse(ev.target.result);
        saved.forEach(s => {
          const r = rules.find(x => x.id === s.id);
          if (r) r.conditions = s.conditions || [];
        });
        updateStats(); applyFilters();
        alert('โหลด state สำเร็จ — ' + saved.filter(s=>s.conditions.length>0).length + ' rules ที่ populate แล้ว');
      } catch(e) { alert('ไฟล์ไม่ถูกต้อง'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============================================================
// IMPORT AI CONDITIONS (จาก extract_conditions.html output)
// ============================================================
function importAIConditions() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        // รองรับ 2 format: {results:[...]} หรือ [...] ตรงๆ
        const aiResults = Array.isArray(data) ? data : (data.results || []);
        if (!aiResults.length) { alert('ไม่พบ results ใน JSON'); return; }

        let imported = 0, skipped = 0;
        aiResults.forEach(item => {
          const r = rules.find(x => x.id === item.predict_id);
          if (!r) { skipped++; return; }
          if (!Array.isArray(item.conditions) || item.conditions.length === 0) { skipped++; return; }
          // map extract format → builder format
          r.conditions = item.conditions.map(c => ({
            planet_id:        c.planet    || c.planet_id    || '',
            quality_required: c.quality   || c.quality_required || 'ANY',
            lagna_aspect_req: c.aspect    || c.lagna_aspect_req  || 'ANY',
            required:         c.required !== undefined ? c.required : true,
          }));
          imported++;
        });
        // save to localStorage
        localStorage.setItem('horatad_builder_v3', JSON.stringify(rules.map(r => ({id:r.id, conditions:r.conditions}))));
        updateStats(); applyFilters();
        alert(`Import สำเร็จ\nนำเข้า: ${imported} rules\nข้าม: ${skipped} rules\n\nตรวจสอบแล้วกด Save state หรือ Export`);
      } catch(err) { alert('ไฟล์ไม่ถูกต้อง: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============================================================
// EXPORT kb.json (format ที่ app ใช้จริง)
// ============================================================
function exportKBJson() {
  const allRules = [...ENGINE_RULES_RAW, ...DEFINITIONS_RAW];
  const kb = allRules.map(raw => {
    const r = rules.find(x => x.id === raw.id) || raw;
    const tags = (raw.tags || '').split(',').map(t => t.trim()).filter(Boolean);
    const obj = {
      c:  raw.condition,
      p:  raw.predict,
      t:  tags,
      ch: raw.chapter,
      pr: raw.rule_type === 'TRUE_RULE' ? 1 : raw.rule_type === 'DEFINITION' ? 1 : 2,
    };
    if (r.conditions && r.conditions.length > 0) obj.conditions = r.conditions;
    if (raw.rule_type) obj.rule_type = raw.rule_type;
    if (raw.category) obj.category = raw.category;
    return obj;
  });
  const blob = new Blob([JSON.stringify(kb, null, 2)], {type:'application/json'});
  dlBlob(blob, 'kb.json');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ============================================================
// INIT
// ============================================================
function init() {
  // Load from localStorage if available
  const saved = localStorage.getItem('horatad_builder_v3');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      s.forEach(sv => {
        const r = rules.find(x => x.id === sv.id);
        if (r) r.conditions = sv.conditions || [];
      });
    } catch(e) {}
  }
  updateStats();
  applyFilters();
}

init();
</script>
