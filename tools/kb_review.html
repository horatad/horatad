<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB Review — Horatad BIBLE</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d2e; --border:#2d3154;
    --text:#e8eaf6; --muted:#7986cb; --accent:#5c6bc0;
    --pos:#4caf50; --neg:#f44336; --neu:#ff9800; --warn:#ffc107;
    --autoverified:#4caf50; --conflict:#f44336; --intdup:#ff9800; --unique:#5c6bc0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:14px;line-height:1.5;padding-bottom:80px}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:10}
  h1{font-size:16px;font-weight:600;margin-bottom:6px}
  h1 small{color:var(--muted);font-weight:400}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:8px}
  .btn{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;background:var(--accent);color:#fff}
  .btn:hover{opacity:0.85}
  .btn-sm{padding:3px 8px;font-size:12px}
  .btn-out{background:transparent;border:1px solid var(--border);color:var(--text)}
  .btn-pos{background:var(--pos)}
  .btn-neg{background:var(--neg)}
  .btn-neu{background:var(--neu);color:#000}

  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .chip{padding:4px 10px;border-radius:14px;font-size:12px;border:1px solid var(--border);cursor:pointer;user-select:none;background:transparent;color:var(--muted)}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chip-count{margin-left:6px;font-weight:600}

  .stats{padding:8px 16px;background:rgba(92,107,192,0.05);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap}
  .stats span b{color:var(--text)}

  main{padding:16px;max-width:920px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
  .badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff}
  .badge.AUTO_VERIFIED{background:var(--autoverified)}
  .badge.CONFLICT{background:var(--conflict)}
  .badge.INTERNAL_DUPE{background:var(--intdup)}
  .badge.UNIQUE{background:var(--unique)}
  .merged-id{font-family:monospace;color:var(--muted);font-size:12px}
  .fp{font-family:monospace;font-size:11px;color:var(--muted);word-break:break-all;background:rgba(0,0,0,0.2);padding:4px 6px;border-radius:4px;margin:6px 0}
  .meta-row{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0;font-size:12px}
  .meta-row .pill{background:rgba(92,107,192,0.15);color:var(--muted);padding:2px 8px;border-radius:10px}
  .condition-list{margin:8px 0;padding:8px;background:rgba(0,0,0,0.15);border-radius:6px;border-left:3px solid var(--muted)}
  .condition-list h4{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
  .condition-list ul{list-style:none;margin:0;padding:0}
  .condition-list li{padding:3px 0;color:var(--text);font-size:13px}
  .condition-list li:before{content:"• ";color:var(--accent)}
  .wording-list{margin:8px 0;padding:8px;background:rgba(76,175,80,0.05);border-radius:6px;border-left:3px solid var(--pos)}
  .wording-list h4{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
  .wording-entry{padding:6px 0;border-bottom:1px dashed rgba(255,255,255,0.05)}
  .wording-entry:last-child{border-bottom:none}
  .wording-entry .src-tag{font-size:10px;color:var(--muted);font-family:monospace}
  .actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .decision-badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-left:8px}
  .decision-badge.merge{background:var(--pos);color:#fff}
  .decision-badge.separate{background:var(--warn);color:#000}
  .decision-badge.skip{background:var(--muted);color:#fff}
  .decision-badge.accepted{background:var(--accent);color:#fff}
  .conflict-warn{background:rgba(244,67,54,0.1);padding:8px;border-radius:6px;border-left:3px solid var(--neg);margin:8px 0;font-size:12px}

  footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10;flex-wrap:wrap;gap:8px}
  .progress-info{font-size:12px;color:var(--muted)}
  .status-text{padding:6px 12px;font-size:12px;color:var(--muted)}
  .status-text.ok{color:var(--pos)}
  .status-text.err{color:var(--neg)}

  details summary{cursor:pointer;padding:4px 0;color:var(--muted);font-size:12px}
  details[open] summary{color:var(--text)}

  @media (max-width:600px){
    .toolbar{font-size:12px}
    .stats{font-size:11px;gap:8px}
    .meta-row{font-size:11px}
  }
</style>
</head>
<body>
<header>
  <h1>📚 KB Review <small id="hsub">— triangulation review for v3/kb_merged.json</small></h1>
  <div class="toolbar">
    <button class="btn btn-sm" onclick="loadKB()">🔄 Reload from GitHub</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="loadFromFile(event)">
    <button class="btn btn-sm btn-out" onclick="document.getElementById('fileInput').click()">📁 Load local file</button>
    <button class="btn btn-sm btn-out" onclick="exportDecisions()">📥 Export decisions</button>
    <span class="status-text" id="status">รอโหลด...</span>
  </div>
  <div class="filters" id="filters"></div>
</header>

<div class="stats" id="stats"></div>

<main id="cards">
  <div class="card"><p style="color:var(--muted);text-align:center;padding:20px">กด 🔄 หรือ 📁 เพื่อเริ่ม</p></div>
</main>

<footer>
  <span class="progress-info" id="progressInfo">decisions: 0</span>
  <span class="progress-info">localStorage = auto-save</span>
  <button class="btn btn-sm btn-out" onclick="clearDecisions()">🗑 Clear all decisions</button>
</footer>

<script>
const KB_URL = 'https://raw.githubusercontent.com/horatad/horatad/main/v3/kb_merged.json';
const STORAGE_KEY = 'kb_review_decisions_v1';
let kbData = null;
let decisions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let activeFilter = null;

function $(s) { return document.querySelector(s); }
function setStatus(msg, kind) {
  const el = $('#status'); el.textContent = msg;
  el.className = 'status-text' + (kind ? ' ' + kind : '');
}

async function loadKB() {
  setStatus('โหลด...');
  try {
    const r = await fetch(KB_URL + '?v=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    kbData = await r.json();
    setStatus('✓ โหลด ' + kbData.rules.length + ' merged rules', 'ok');
    renderAll();
  } catch(e) {
    setStatus('❌ ' + e.message, 'err');
  }
}

function loadFromFile(evt) {
  const f = evt.target.files[0];
  if (!f) return;
  setStatus('อ่านไฟล์...');
  const reader = new FileReader();
  reader.onload = () => {
    try {
      kbData = JSON.parse(reader.result);
      setStatus('✓ โหลด ' + kbData.rules.length + ' merged rules (local)', 'ok');
      renderAll();
    } catch(e) { setStatus('❌ JSON invalid: ' + e.message, 'err'); }
  };
  reader.readAsText(f);
}

function renderAll() {
  renderStats();
  renderFilters();
  renderCards();
}

function countByStatus() {
  const c = { AUTO_VERIFIED:0, CONFLICT:0, INTERNAL_DUPE:0, UNIQUE:0 };
  kbData.rules.forEach(r => { c[r.verification_status] = (c[r.verification_status]||0) + 1; });
  return c;
}

function renderStats() {
  const meta = kbData._meta || {};
  const c = countByStatus();
  const sources = (meta.sources || []).map(s => s.name).join(', ') || 'unknown';
  $('#stats').innerHTML = `
    <span>📂 sources: <b>${sources}</b></span>
    <span>📊 merged rules: <b>${kbData.rules.length}</b></span>
    <span>🟢 AUTO: <b>${c.AUTO_VERIFIED}</b></span>
    <span>🔴 CONFLICT: <b>${c.CONFLICT}</b></span>
    <span>🟠 INT_DUPE: <b>${c.INTERNAL_DUPE}</b></span>
    <span>🔵 UNIQUE: <b>${c.UNIQUE}</b></span>
    <span>📝 decisions: <b>${Object.keys(decisions).length}</b></span>
  `;
  $('#progressInfo').textContent = `decisions: ${Object.keys(decisions).length} / ${kbData.rules.length}`;
}

function renderFilters() {
  const c = countByStatus();
  const filters = [
    { key: null, label: 'All' },
    { key: 'CONFLICT', label: '🔴 CONFLICT', count: c.CONFLICT },
    { key: 'INTERNAL_DUPE', label: '🟠 INT_DUPE', count: c.INTERNAL_DUPE },
    { key: 'AUTO_VERIFIED', label: '🟢 AUTO', count: c.AUTO_VERIFIED },
    { key: 'UNIQUE', label: '🔵 UNIQUE', count: c.UNIQUE },
    { key: '_needs_action', label: '⚠ needs action (no decision)', count: undecidedCount() }
  ];
  $('#filters').innerHTML = filters.map(f => `
    <span class="chip ${activeFilter === f.key ? 'active' : ''}" onclick="setFilter(${JSON.stringify(f.key)})">${f.label}${f.count != null ? `<span class="chip-count">${f.count}</span>` : ''}</span>
  `).join('');
}

function undecidedCount() {
  if (!kbData) return 0;
  return kbData.rules.filter(r =>
    (r.verification_status === 'CONFLICT' || r.verification_status === 'INTERNAL_DUPE') &&
    !decisions[r.rule_id]
  ).length;
}

function setFilter(k) {
  activeFilter = k;
  renderFilters();
  renderCards();
}

function getFiltered() {
  if (!kbData) return [];
  let rules = kbData.rules;
  if (activeFilter === '_needs_action') {
    rules = rules.filter(r =>
      (r.verification_status === 'CONFLICT' || r.verification_status === 'INTERNAL_DUPE') &&
      !decisions[r.rule_id]
    );
  } else if (activeFilter) {
    rules = rules.filter(r => r.verification_status === activeFilter);
  }
  // Sort by priority: CONFLICT first, then INTERNAL_DUPE, then UNIQUE, then AUTO
  const priority = { CONFLICT:0, INTERNAL_DUPE:1, UNIQUE:2, AUTO_VERIFIED:3 };
  rules = [...rules].sort((a,b) => (priority[a.verification_status]||9) - (priority[b.verification_status]||9));
  return rules;
}

function renderCards() {
  const rules = getFiltered();
  if (rules.length === 0) {
    $('#cards').innerHTML = '<div class="card"><p style="color:var(--muted);text-align:center;padding:20px">ไม่มี rules ใน filter นี้</p></div>';
    return;
  }
  const showLimit = 200;
  const limited = rules.slice(0, showLimit);
  const cards = limited.map(r => renderCard(r)).join('');
  const more = rules.length > showLimit ? `<p style="color:var(--muted);text-align:center;padding:10px">แสดง ${showLimit} จาก ${rules.length} (filter เพื่อดูเพิ่ม)</p>` : '';
  $('#cards').innerHTML = cards + more;
}

function renderCard(r) {
  const decision = decisions[r.rule_id];
  const decisionBadge = decision ? `<span class="decision-badge ${decision}">${decision.toUpperCase()}</span>` : '';
  const status = r.verification_status;
  const conflictWarn = status === 'CONFLICT' ?
    `<div class="conflict-warn">⚠ polarity ต่างกัน: ${JSON.stringify(r.polarity_breakdown)} — เลือก separate ถ้าเป็นคนละ rule, merge+ปรับ polarity ถ้าเหมือนกัน</div>` : '';

  const wordings = (r.wordings || []).map(w => `
    <div class="wording-entry">
      <div class="src-tag">${w.source_type || '?'} · ${w.source || '?'} · by ${w.extracted_by || '?'}</div>
      <div>${escapeHtml(w.text)}</div>
    </div>
  `).join('');

  const conditions = (r.condition_texts || []).map(c => `<li>${escapeHtml(c)}</li>`).join('');

  return `
    <div class="card" data-rule-id="${r.rule_id}">
      <div class="card-head">
        <div>
          <span class="badge ${status}">${status}</span>
          <span class="merged-id">${r.rule_id}</span>
          ${decisionBadge}
        </div>
        <div style="text-align:right;font-size:11px;color:var(--muted)">
          ${r.verification_sources} src · ${(r.wordings||[]).length} wordings
        </div>
      </div>
      ${conflictWarn}
      <div class="meta-row">
        <span class="pill">polarity: ${r.polarity}</span>
        <span class="pill">domain: ${r.domain || '-'}</span>
        <span class="pill">use: ${r.rule_use || '-'}</span>
        <span class="pill">tier: ${r.tier || '-'}</span>
      </div>
      <details><summary>fingerprint + source IDs</summary>
        <div class="fp">${escapeHtml(r.elements?.fingerprint || '')}</div>
        <div style="font-size:11px;color:var(--muted);font-family:monospace">sources: ${(r.source_rule_ids||[]).join(', ')}</div>
      </details>
      <div class="condition-list">
        <h4>condition_text${(r.condition_texts||[]).length>1?'s ('+(r.condition_texts||[]).length+')':''}:</h4>
        <ul>${conditions}</ul>
      </div>
      <div class="wording-list">
        <h4>wordings:</h4>
        ${wordings}
      </div>
      <div class="actions">
        <button class="btn btn-sm btn-pos" onclick="setDecision('${r.rule_id}','merge')">✓ merge (same rule)</button>
        <button class="btn btn-sm btn-neu" onclick="setDecision('${r.rule_id}','separate')">↔ separate (different rules)</button>
        <button class="btn btn-sm btn-out" onclick="setDecision('${r.rule_id}','skip')">⏭ skip</button>
        ${decision ? `<button class="btn btn-sm btn-out" onclick="setDecision('${r.rule_id}',null)">✗ clear</button>` : ''}
      </div>
    </div>
  `;
}

function escapeHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setDecision(ruleId, val) {
  if (val === null) delete decisions[ruleId];
  else decisions[ruleId] = val;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions));
  renderStats();
  renderFilters();
  renderCards();
}

function exportDecisions() {
  const out = {
    _meta: {
      tool_version: '1.0',
      reviewed_at: new Date().toISOString(),
      reviewer: 'user',
      memory_ref: 'LOG 2026-05-25 v2',
      kb_source: kbData?._meta || null,
      total_decisions: Object.keys(decisions).length
    },
    decisions
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: 'kb_review_decisions_' + new Date().toISOString().slice(0,10) + '.json'
  });
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearDecisions() {
  if (!confirm('ลบ decisions ทั้งหมด?')) return;
  decisions = {};
  localStorage.removeItem(STORAGE_KEY);
  renderStats();
  renderFilters();
  renderCards();
}

// Auto-load on first open
loadKB();
</script>
</body>
</html>
