name: YouTube Sync — ดึง video ใหม่ → inbox

on:
  schedule:
    - cron: '0 2 * * *'   # ทุกวัน 09:00 ICT (02:00 UTC)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync YouTube playlist → inbox
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
        run: node workers/youtube_sync.mjs

      - name: Commit new drafts
        run: |
          git config user.name  "horatad-bot"
          git config user.email "contact@horatad.com"
          git add content/
          git diff --staged --quiet || git commit -m "youtube: sync new videos $(date +%Y-%m-%d)"
          git push
