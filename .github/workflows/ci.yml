name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: JS syntax check
        run: |
          set -e
          for f in script.js sw.js v3/engine.js v3/interpretation.js v3/typhoon.js v3/v3tab.js; do
            echo "  → $f"
            node --check "$f"
          done

      - name: Version sync check
        run: node scripts/check-version-sync.mjs

      - name: Install dev dependencies
        run: npm ci --no-audit --no-fund

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check
        continue-on-error: true

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE not required for OSS public repos
