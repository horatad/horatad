name: JULIAN Data Sync

# รันทุกคืน 02:00 UTC — อิสระ ไม่ต้องพึ่ง Claude หรือ session ใด
# หยุดอัตโนมัติเมื่อถึง TARGET_RECORDS ใน julian_config.mjs
# D1 import ข้ามถ้า CF_API_TOKEN ยังไม่ได้ตั้ง (JSONL เก็บใน repo รอ import ทีหลัง)

on:
  schedule:
    - cron: '0 2 * * *'      # 02:00 UTC ทุกคืน — scrape Wikidata
    - cron: '0 3 * * 0'      # 03:00 UTC ทุกอาทิตย์ — empirical validation
  workflow_dispatch:           # กด Run manually ได้จาก GitHub UI
    inputs:
      rate:
        description: 'ลด rate ถ้าต้องการ (0.25/0.5/0.75/1.0) — ขยายเกิน 1.0 ไม่ได้'
        required: false
        default: '1.0'
        type: choice
        options: ['1.0', '0.75', '0.5', '0.25']

permissions:
  contents: write              # สำหรับ commit progress
  actions: write               # สำหรับ disable workflow เมื่อ target ถึง

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CF_API_TOKEN:          ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

    steps:
      # ─── Checkout ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── Setup Node ───────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ─── Apply manual rate override (workflow_dispatch เท่านั้น) ────
      - name: Apply rate override
        if: github.event_name == 'workflow_dispatch' && inputs.rate != '1.0'
        run: |
          node -e "
            const fs = require('fs');
            const f  = 'workers/julian_override.json';
            const ov = JSON.parse(fs.readFileSync(f, 'utf8'));
            ov.rate_multiplier = Math.min(1.0, parseFloat('${{ inputs.rate }}'));
            fs.writeFileSync(f, JSON.stringify(ov, null, 2));
            console.log('Rate set to', ov.rate_multiplier);
          "

      # ─── Scrape Wikidata ──────────────────────────────────────
      - name: Scrape Wikidata
        id: scrape
        run: node workers/julian_scraper.mjs

      # ─── Import to CF D1 (ข้ามถ้ายังไม่มี secret) ────────────
      - name: Import to CF D1
        if: |
          steps.scrape.outputs.status == 'ok' &&
          steps.scrape.outputs.out_file != '' &&
          env.CF_API_TOKEN != ''
        run: |
          npm install -g wrangler@latest --silent
          node workers/julian_import.mjs "${{ steps.scrape.outputs.out_file }}" > /tmp/import.sql
          echo "SQL preview (first 3 lines):"
          head -3 /tmp/import.sql
          wrangler d1 execute julian \
            --config workers/julian_wrangler.toml \
            --file=/tmp/import.sql \
            --remote \
            --yes
          echo "D1 import done: ${{ steps.scrape.outputs.record_count }} records"
        env:
          CF_API_TOKEN:          ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ─── Commit progress + JSONL (สำหรับ manual import ถ้า D1 ยังไม่พร้อม) ──
      - name: Commit progress
        if: steps.scrape.outputs.status == 'ok'
        run: |
          git config user.name  "JULIAN Bot"
          git config user.email "julian-bot@horatad.com"
          git add workers/julian_progress.json
          # เก็บ JSONL เฉพาะถ้า D1 ยังไม่ได้ import (ไว้ import ทีหลัง)
          if [ "${{ env.CF_API_TOKEN }}" == "" ]; then
            git add workers/julian_scraped_*.jsonl || true
          fi
          git commit -m "JULIAN sync: +${{ steps.scrape.outputs.record_count }} records (total ${{ steps.scrape.outputs.total }})" || echo "Nothing to commit"
          git push origin HEAD:main
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      # ─── Disable workflow เมื่อ target ถึง ─────────────────────
      - name: Disable when target reached
        if: steps.scrape.outputs.status == 'target_reached'
        run: |
          echo "Target reached — disabling workflow"
          gh workflow disable julian_sync.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Weekly: Empirical Validation → auto-update kb.json ────
      - name: Empirical validation (weekly)
        if: github.event.schedule == '0 3 * * 0' && env.CF_API_TOKEN != ''
        run: |
          node workers/julian_empirical.mjs
          git config user.name  "JULIAN Bot"
          git config user.email "julian-bot@horatad.com"
          git add v3/kb.json || true
          git commit -m "JULIAN empirical: auto-update kb.json empirical_p" || echo "No changes"
          git push || true
        env:
          CF_API_TOKEN:          ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ─── Summary ─────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## JULIAN Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.scrape.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Records this run: ${{ steps.scrape.outputs.record_count || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "- Total: ${{ steps.scrape.outputs.total || '?' }}/500" >> $GITHUB_STEP_SUMMARY
          echo "- D1 import: ${{ env.CF_API_TOKEN != '' && 'yes' || 'skipped (no CF_API_TOKEN)' }}" >> $GITHUB_STEP_SUMMARY
