name: JULIAN Data Sync

# รันทุกคืน 02:00 UTC — อิสระ ไม่ต้องพึ่ง Claude หรือ session ใด
# หยุดอัตโนมัติเมื่อถึง TARGET_RECORDS ใน julian_config.mjs
# D1 import ข้ามถ้า CF_API_TOKEN ยังไม่ได้ตั้ง (JSONL เก็บใน repo รอ import ทีหลัง)

on:
  schedule:
    - cron: '0 */6 * * *'    # ทุก 6 ชั่วโมง (00/06/12/18 UTC) — scrape Wikidata
    - cron: '0 3 * * 0'      # 03:00 UTC ทุกอาทิตย์ — empirical validation
  workflow_dispatch:           # กด Run manually ได้จาก GitHub UI
    inputs:
      rate:
        description: 'ลด rate ถ้าต้องการ (0.25/0.5/0.75/1.0) — ขยายเกิน 1.0 ไม่ได้'
        required: false
        default: '1.0'
        type: choice
        options: ['1.0', '0.75', '0.5', '0.25']

permissions:
  contents: write              # สำหรับ commit progress
  actions: write               # สำหรับ disable workflow เมื่อ target ถึง

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      CLOUDFLARE_API_TOKEN:            ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID:           ${{ secrets.CF_ACCOUNT_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ─── Checkout ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── Setup Node ───────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ─── Apply manual rate override (workflow_dispatch เท่านั้น) ────
      - name: Apply rate override
        if: github.event_name == 'workflow_dispatch' && inputs.rate != '1.0'
        run: |
          node -e "
            const fs = require('fs');
            const f  = 'workers/julian_override.json';
            const ov = JSON.parse(fs.readFileSync(f, 'utf8'));
            ov.rate_multiplier = Math.min(1.0, parseFloat('${{ inputs.rate }}'));
            fs.writeFileSync(f, JSON.stringify(ov, null, 2));
            console.log('Rate set to', ov.rate_multiplier);
          "

      # ─── Scrape Wikidata ──────────────────────────────────────
      - name: Scrape Wikidata
        id: scrape
        run: node workers/julian_scraper.mjs

      # ─── Import to CF D1 (ข้ามถ้ายังไม่มี secret) ────────────
      - name: Import to CF D1
        if: |
          steps.scrape.outputs.status == 'ok' &&
          steps.scrape.outputs.out_file != '' &&
          env.CLOUDFLARE_API_TOKEN != ''
        run: |
          npm install -g wrangler@4 --silent
          echo "wrangler version: $(wrangler --version)"
          echo "── Token verify ──"
          curl -sf "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -o /tmp/tok.json && \
            node -e "const d=JSON.parse(require('fs').readFileSync('/tmp/tok.json','utf8')); console.log('token status:', d.result?.status, '| success:', d.success)" \
            || echo "token verify curl failed"
          node workers/julian_import.mjs "${{ steps.scrape.outputs.out_file }}" > /tmp/import.sql
          echo "SQL preview (first 3 lines):"
          head -3 /tmp/import.sql
          wrangler d1 execute julian \
            --config workers/julian_wrangler.toml \
            --file=/tmp/import.sql \
            --remote \
            --yes
          echo "D1 import done: ${{ steps.scrape.outputs.record_count }} records"

          echo "── Generate report ──"
          wrangler d1 execute julian \
            --config workers/julian_wrangler.toml \
            --command="SELECT event_label, country, COUNT(*) as cnt FROM internet GROUP BY event_label, country ORDER BY cnt DESC" \
            --remote --json > /tmp/report_cats.json || echo "[]" > /tmp/report_cats.json
          wrangler d1 execute julian \
            --config workers/julian_wrangler.toml \
            --command="SELECT name, jd, event_label, country, confidence FROM internet ORDER BY id DESC LIMIT 100" \
            --remote --json > /tmp/report_recent.json || echo "[]" > /tmp/report_recent.json
          wrangler d1 execute julian \
            --config workers/julian_wrangler.toml \
            --command="SELECT COUNT(*) as total FROM internet" \
            --remote --json > /tmp/report_total.json || echo "[]" > /tmp/report_total.json
          node -e "
            const cats   = JSON.parse(require('fs').readFileSync('/tmp/report_cats.json','utf8'));
            const recent = JSON.parse(require('fs').readFileSync('/tmp/report_recent.json','utf8'));
            const total  = JSON.parse(require('fs').readFileSync('/tmp/report_total.json','utf8'));
            const out = {
              generated: new Date().toISOString(),
              total: total[0]?.results?.[0]?.total ?? 0,
              by_category: cats[0]?.results ?? [],
              recent: recent[0]?.results ?? []
            };
            require('fs').writeFileSync('workers/julian_report.json', JSON.stringify(out, null, 2));
            console.log('Report: total=' + out.total + ' cats=' + out.by_category.length + ' recent=' + out.recent.length);
          "
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ─── Astrotheme enrichment (เพิ่ม time_utc + lat/lng) ────────────────
      - name: Astrotheme enrichment
        if: |
          steps.scrape.outputs.status == 'ok' &&
          env.CLOUDFLARE_API_TOKEN != ''
        run: |
          echo "── Query records without time_utc ──"
          wrangler d1 execute julian \
            --config workers/julian_wrangler.toml \
            --command="SELECT jd,name,event_label,type,country,tier,relate_id,source FROM internet WHERE time_utc IS NULL ORDER BY confidence DESC LIMIT 200" \
            --remote --json > /tmp/no_time.json
          node -e "
            const raw = JSON.parse(require('fs').readFileSync('/tmp/no_time.json','utf8'));
            const rows = raw[0]?.results ?? [];
            require('fs').writeFileSync('/tmp/no_time.jsonl', rows.map(r => JSON.stringify(r)).join('\n'));
            console.log('Records without time_utc:', rows.length);
          "
          if [ -s /tmp/no_time.jsonl ]; then
            node workers/julian_astrotheme.mjs /tmp/no_time.jsonl > /tmp/enriched.jsonl 2>&1 || true
            ENRICHED=$(wc -l < /tmp/enriched.jsonl || echo 0)
            echo "Enriched: ${ENRICHED} records"
            if [ "$ENRICHED" -gt "0" ]; then
              node workers/julian_import.mjs /tmp/enriched.jsonl > /tmp/enrich.sql
              wrangler d1 execute julian \
                --config workers/julian_wrangler.toml \
                --file=/tmp/enrich.sql \
                --remote --yes
              echo "Astrotheme enrichment imported: ${ENRICHED} records"
            fi
          else
            echo "All records already have time_utc — skip enrichment"
          fi
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ─── Export D1 → GitHub Release (HORATAD ดาวน์โหลดจากที่นี่) ────────
      - name: Export to GitHub Release
        if: |
          steps.scrape.outputs.status == 'ok' &&
          env.CLOUDFLARE_API_TOKEN != ''
        run: |
          echo "── Export internet table from D1 ──"
          wrangler d1 execute julian \
            --config workers/julian_wrangler.toml \
            --command="SELECT id,jd,name,event_label,type,country,tier,lat,lng,time_utc,lagna_sign,relate_id,source,source_type,validated_count,confidence,notes FROM internet ORDER BY id LIMIT 100000" \
            --remote --json > /tmp/internet_export.json
          node -e "
            const raw     = JSON.parse(require('fs').readFileSync('/tmp/internet_export.json','utf8'));
            const records = raw[0]?.results ?? [];
            require('fs').writeFileSync('/tmp/julian_all.json', JSON.stringify(records));
            console.log('Export: ' + records.length + ' records');
          "
          echo "── Upload to GitHub Release (overwrite) ──"
          gh release create julian-data \
            --title 'JULIAN Database' \
            --notes 'Auto-updated every 6 hours by julian_sync workflow' \
            --latest 2>/dev/null || true
          gh release upload julian-data /tmp/julian_all.json --clobber
          echo "── Commit to repo (for CORS-friendly access via raw.githubusercontent.com) ──"
          mkdir -p data
          cp /tmp/julian_all.json data/julian_all.json
          git config user.name  "JULIAN Bot"
          git config user.email "julian-bot@horatad.com"
          git add data/julian_all.json
          git commit -m "JULIAN data: ${{ steps.scrape.outputs.total }} records [skip ci]" || echo "No data change"
          git push origin HEAD:main
          echo "Release updated: julian-data/julian_all.json (${{ steps.scrape.outputs.total }} total records)"
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Commit progress + data/julian_all.json (รันเสมอ ไม่ต้องมี CF token) ──
      - name: Commit progress
        if: steps.scrape.outputs.status == 'ok'
        run: |
          git config user.name  "JULIAN Bot"
          git config user.email "julian-bot@horatad.com"
          git add workers/julian_progress.json workers/julian_report.json || true
          # merge JSONL เข้า data/julian_all.json เสมอ (ไม่ต้องรอ CF token)
          if [ -n "${{ steps.scrape.outputs.out_file }}" ]; then
            JULIAN_OUT_FILE="${{ steps.scrape.outputs.out_file }}" node -e "
              const fs = require('fs');
              const outFile = process.env.JULIAN_OUT_FILE;
              const dataFile = 'data/julian_all.json';
              let existing = [];
              try { existing = JSON.parse(fs.readFileSync(dataFile, 'utf8')); } catch(e) {}
              if (!Array.isArray(existing)) existing = [];
              let newRecs = [];
              try {
                const lines = fs.readFileSync(outFile, 'utf8').split('\n').filter(Boolean);
                newRecs = lines.map(l => { try { return JSON.parse(l); } catch(e) { return null; } }).filter(Boolean);
              } catch(e) { console.error('JSONL read error:', e.message); }
              const map = new Map();
              for (const r of existing) if (r.jd && r.name) map.set(r.jd+'|'+r.name, r);
              for (const r of newRecs)  if (r.jd && r.name) map.set(r.jd+'|'+r.name, r);
              const merged = [...map.values()].sort((a,b) => (b.jd||0)-(a.jd||0));
              fs.mkdirSync('data', {recursive:true});
              fs.writeFileSync(dataFile, JSON.stringify(merged));
              console.log('data/julian_all.json: total=' + merged.length + ' (+' + newRecs.length + ' batch)');
            "
            git add data/julian_all.json || true
          fi
          git commit -m "JULIAN sync: +${{ steps.scrape.outputs.record_count }} records (total ${{ steps.scrape.outputs.total }})" || echo "Nothing to commit"
          git push origin HEAD:main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      # ─── Disable workflow เมื่อ target ถึง หรือ queries หมด ────
      - name: Disable when done
        if: |
          steps.scrape.outputs.status == 'target_reached' ||
          steps.scrape.outputs.status == 'queries_exhausted'
        run: |
          echo "Done (${{ steps.scrape.outputs.status }}) — disabling workflow"
          gh workflow disable julian_sync.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Weekly: Empirical Validation → auto-update kb.json ────
      - name: Empirical validation (weekly)
        if: github.event.schedule == '0 3 * * 0' && env.CLOUDFLARE_API_TOKEN != ''
        run: |
          node workers/julian_empirical.mjs
          git config user.name  "JULIAN Bot"
          git config user.email "julian-bot@horatad.com"
          git add v3/kb.json || true
          git commit -m "JULIAN empirical: auto-update kb.json empirical_p" || echo "No changes"
          git push || true
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ─── Summary ─────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## JULIAN Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.scrape.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Records this run: ${{ steps.scrape.outputs.record_count || 0 }}" >> $GITHUB_STEP_SUMMARY
          echo "- Total: ${{ steps.scrape.outputs.total || '?' }}/500" >> $GITHUB_STEP_SUMMARY
          echo "- D1 import: ${{ env.CLOUDFLARE_API_TOKEN != '' && 'yes' || 'skipped (no token)' }}" >> $GITHUB_STEP_SUMMARY
