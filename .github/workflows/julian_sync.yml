name: JULIAN Data Sync

# รันทุก 6 ชั่วโมง — อิสระ ไม่ต้องพึ่ง Claude หรือ session ใด
# หยุดอัตโนมัติเมื่อถึง TARGET_RECORDS ใน julian_config.mjs
# Storage: data/julian_all.json (repo, CORS-free) + GitHub Release julian-data

on:
  schedule:
    - cron: '0 */6 * * *'    # ทุก 6 ชั่วโมง (00/06/12/18 UTC)
    - cron: '0 3 * * 0'      # 03:00 UTC ทุกอาทิตย์ — empirical validation
  workflow_dispatch:
    inputs:
      rate:
        description: 'ลด rate ถ้าต้องการ (0.25/0.5/0.75/1.0)'
        required: false
        default: '1.0'
        type: choice
        options: ['1.0', '0.75', '0.5', '0.25']

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      # ─── Checkout ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: horatad/julian-data
          path: data
          token: ${{ secrets.JULIAN_DATA_PAT }}

      # ─── Setup Node ───────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # ─── Apply manual rate override (workflow_dispatch เท่านั้น) ────
      - name: Apply rate override
        if: github.event_name == 'workflow_dispatch' && inputs.rate != '1.0'
        run: |
          node -e "
            const fs = require('fs');
            const f  = 'workers/julian_override.json';
            const ov = JSON.parse(fs.readFileSync(f, 'utf8'));
            ov.rate_multiplier = Math.min(1.0, parseFloat('${{ inputs.rate }}'));
            fs.writeFileSync(f, JSON.stringify(ov, null, 2));
            console.log('Rate set to', ov.rate_multiplier);
          "

      # ─── Scrape Wikidata ──────────────────────────────────────
      - name: Scrape Wikidata
        id: scrape
        run: node workers/julian_scraper.mjs

      # ─── Commit progress + merge JSONL → data/julian_all.json ─
      - name: Commit progress
        if: steps.scrape.outputs.status == 'ok'
        run: |
          git config user.name  "JULIAN Bot"
          git config user.email "julian-bot@horatad.com"
          git add workers/julian_progress.json workers/julian_report.json || true
          if [ -n "${{ steps.scrape.outputs.out_file }}" ]; then
            JULIAN_OUT_FILE="${{ steps.scrape.outputs.out_file }}" node -e "
              const fs = require('fs');
              const outFile = process.env.JULIAN_OUT_FILE;
              const dataFile = 'data/julian_all.json';
              let existing = [];
              try { existing = JSON.parse(fs.readFileSync(dataFile, 'utf8')); } catch(e) {}
              if (!Array.isArray(existing)) existing = [];
              let newRecs = [];
              try {
                const lines = fs.readFileSync(outFile, 'utf8').split('\n').filter(Boolean);
                newRecs = lines.map(l => { try { return JSON.parse(l); } catch(e) { return null; } }).filter(Boolean);
              } catch(e) { console.error('JSONL read error:', e.message); }
              const map = new Map();
              for (const r of existing) if (r.jd && r.name) map.set(r.jd+'|'+r.name, r);
              for (const r of newRecs)  if (r.jd && r.name) map.set(r.jd+'|'+r.name, r);
              const merged = [...map.values()].sort((a,b) => (b.jd||0)-(a.jd||0));
              fs.mkdirSync('data', {recursive:true});
              fs.writeFileSync(dataFile, JSON.stringify(merged));
              console.log('data/julian_all.json: total=' + merged.length + ' (+' + newRecs.length + ' batch)');
            "
            # push merged data → data repo
            (cd data && git config user.name 'JULIAN Bot' && git config user.email 'julian-bot@horatad.com' \
              && git add julian_all.json \
              && (git diff --cached --quiet || git commit -m "JULIAN sync: +${{ steps.scrape.outputs.record_count }} records (total ${{ steps.scrape.outputs.total }})") \
              && git push) || echo "Data repo: nothing to push"
          fi
          # push progress files → main repo
          git commit -m "JULIAN sync: progress files updated" || echo "Nothing to commit"
          git stash --include-untracked || true
          git pull --rebase origin main
          git push origin HEAD:main
          git stash pop || true

      # ─── Astrotheme enrichment — อ่าน data ที่ commit แล้ว ──────────────────
      # รันหลัง Commit progress → ได้ enrich records จาก batch นี้ทันที
      - name: Astrotheme enrichment
        if: steps.scrape.outputs.status == 'ok'
        run: |
          echo "── Filter records without time_utc ──"
          node -e "
            const fs = require('fs');
            let data = [];
            try { data = JSON.parse(fs.readFileSync('data/julian_all.json', 'utf8')); } catch(e) {}
            const noTime = data.filter(r => r && r.jd && r.name && !r.time_utc).slice(0, 200);
            fs.writeFileSync('/tmp/no_time.jsonl', noTime.map(r => JSON.stringify(r)).join('\n'));
            console.log('Records to enrich:', noTime.length);
          "
          if [ ! -s /tmp/no_time.jsonl ]; then
            echo "All records have time_utc — skip"
            exit 0
          fi
          node workers/julian_astrotheme.mjs /tmp/no_time.jsonl > /tmp/enriched.jsonl || true
          echo "── Merge enrichment back into data/julian_all.json ──"
          ENRICHED_COUNT=$(node -e "
            const fs = require('fs');
            const dataFile = 'data/julian_all.json';
            let data = [];
            try { data = JSON.parse(fs.readFileSync(dataFile, 'utf8')); } catch(e) {}
            const lines = fs.readFileSync('/tmp/enriched.jsonl', 'utf8').split('\n').filter(Boolean);
            const enrichMap = new Map();
            for (const l of lines) {
              try { const r = JSON.parse(l); if (r.jd && r.name) enrichMap.set(r.jd+'|'+r.name, r); } catch(e) {}
            }
            let count = 0;
            for (const r of data) {
              const e = enrichMap.get(r.jd+'|'+r.name);
              if (!e) continue;
              if (!r.time_utc && e.time_utc) r.time_utc = e.time_utc;
              if (!r.lat && e.lat) r.lat = e.lat;
              if (!r.lng && e.lng) r.lng = e.lng;
              if (e.confidence) r.confidence = Math.max(r.confidence || 0, e.confidence);
              count++;
            }
            fs.writeFileSync(dataFile, JSON.stringify(data));
            console.log(count);
          ")
          echo "Applied enrichment to ${ENRICHED_COUNT} records"
          if [ "${ENRICHED_COUNT}" != "0" ]; then
            git config user.name  "JULIAN Bot"
            git config user.email "julian-bot@horatad.com"
            # push to data repo
            (cd data && git config user.name 'JULIAN Bot' && git config user.email 'julian-bot@horatad.com' \
              && git add julian_all.json \
              && (git diff --cached --quiet || git commit -m "JULIAN enrich: +${ENRICHED_COUNT} time_utc from Astrotheme") \
              && git push) || echo "Data repo: nothing to push"
          fi

      # ─── Wikipedia TH enrichment — โฟกัส tier 1 + country=TH ─────────────
      # รันหลัง Astrotheme — Astrotheme ไม่ครอบคลุมคนไทย, wiki TH ตรงกว่า
      - name: Wikipedia TH enrichment
        if: steps.scrape.outputs.status == 'ok'
        run: |
          echo "── Filter tier 1 Thai records without time_utc ──"
          node -e "
            const fs = require('fs');
            let data = [];
            try { data = JSON.parse(fs.readFileSync('data/julian_all.json', 'utf8')); } catch(e) {}
            const target = data.filter(r => r && r.jd && r.name && !r.time_utc
              && r.tier === 1 && r.country === 'TH'
              && r.source?.startsWith('wikidata:')).slice(0, 200);
            fs.writeFileSync('/tmp/wiki_th_input.jsonl', target.map(r => JSON.stringify(r)).join('\n'));
            console.log('Records to enrich:', target.length);
          "
          if [ ! -s /tmp/wiki_th_input.jsonl ]; then
            echo "No tier 1 Thai records to enrich — skip"
            exit 0
          fi
          node workers/julian_wiki_th.mjs /tmp/wiki_th_input.jsonl > /tmp/wiki_th_enriched.jsonl || true
          echo "── Merge enrichment ──"
          ENRICHED_COUNT=$(node -e "
            const fs = require('fs');
            const dataFile = 'data/julian_all.json';
            let data = [];
            try { data = JSON.parse(fs.readFileSync(dataFile, 'utf8')); } catch(e) {}
            const lines = fs.readFileSync('/tmp/wiki_th_enriched.jsonl', 'utf8').split('\n').filter(Boolean);
            const enrichMap = new Map();
            for (const l of lines) {
              try { const r = JSON.parse(l); if (r.jd && r.name) enrichMap.set(r.jd+'|'+r.name, r); } catch(e) {}
            }
            let count = 0;
            for (const r of data) {
              const e = enrichMap.get(r.jd+'|'+r.name);
              if (!e) continue;
              if (!r.time_utc && e.time_utc) { r.time_utc = e.time_utc; count++; }
              if (e.accuracy && (!r.accuracy || r.accuracy === 'D' || r.accuracy === 'F')) r.accuracy = e.accuracy;
              if (e.notes && !r.notes) r.notes = e.notes;
              if (e.source && !r.source.includes('wikipedia_th:')) r.source = e.source;
            }
            fs.writeFileSync(dataFile, JSON.stringify(data));
            console.log(count);
          ")
          echo "Applied wiki_th enrichment to ${ENRICHED_COUNT} records"
          if [ "${ENRICHED_COUNT}" != "0" ]; then
            git config user.name  "JULIAN Bot"
            git config user.email "julian-bot@horatad.com"
            # push to data repo
            (cd data && git config user.name 'JULIAN Bot' && git config user.email 'julian-bot@horatad.com' \
              && git add julian_all.json \
              && (git diff --cached --quiet || git commit -m "JULIAN enrich: +${ENRICHED_COUNT} time_utc from Wikipedia TH") \
              && git push) || echo "Data repo: nothing to push"
          fi

      # ─── Wikidata Coord enrichment — เติม lat/lng จาก P19+P625 ─────────────
      # รันหลัง wiki_th — ใช้ Wikidata birthplace coordinates แทน Astrotheme lat/lng
      # (Astrotheme lat/lng parser broken — returns 0,0 สำหรับ 599 C-grade records)
      - name: Wikidata coord enrichment
        if: steps.scrape.outputs.status == 'ok'
        run: |
          echo "── Filter records without lat/lng ──"
          node -e "
            const fs = require('fs');
            let data = [];
            try { data = JSON.parse(fs.readFileSync('data/julian_all.json', 'utf8')); } catch(e) {}
            const noCoord = data.filter(r => r && r.jd && r.name
              && r.source?.startsWith('wikidata:')
              && (!r.lat || r.lat === 0)).slice(0, 300);
            fs.writeFileSync('/tmp/no_coord.jsonl', noCoord.map(r => JSON.stringify(r)).join('\n'));
            console.log('Records to enrich:', noCoord.length);
          "
          if [ ! -s /tmp/no_coord.jsonl ]; then
            echo "All wikidata records have lat/lng — skip"
            exit 0
          fi
          node workers/julian_wikidata_coord.mjs /tmp/no_coord.jsonl > /tmp/coord_enriched.jsonl || true
          ENRICHED_COUNT=$(node -e "
            const fs = require('fs');
            const dataFile = 'data/julian_all.json';
            let data = [];
            try { data = JSON.parse(fs.readFileSync(dataFile, 'utf8')); } catch(e) {}
            const lines = fs.readFileSync('/tmp/coord_enriched.jsonl', 'utf8').split('\n').filter(Boolean);
            const enrichMap = new Map();
            for (const l of lines) {
              try { const r = JSON.parse(l); if (r.jd && r.name) enrichMap.set(r.jd+'|'+r.name, r); } catch(e) {}
            }
            let count = 0;
            for (const r of data) {
              const e = enrichMap.get(r.jd+'|'+r.name);
              if (!e) continue;
              if (e.lat && e.lat !== 0 && (!r.lat || r.lat === 0)) { r.lat = e.lat; r.lng = e.lng; count++; }
              if (e.notes && !r.notes) r.notes = e.notes;
            }
            fs.writeFileSync(dataFile, JSON.stringify(data));
            console.log(count);
          ")
          echo "Applied coord enrichment to ${ENRICHED_COUNT} records"
          if [ "${ENRICHED_COUNT}" != "0" ]; then
            git config user.name  "JULIAN Bot"
            git config user.email "julian-bot@horatad.com"
            # push to data repo
            (cd data && git config user.name 'JULIAN Bot' && git config user.email 'julian-bot@horatad.com' \
              && git add julian_all.json \
              && (git diff --cached --quiet || git commit -m "JULIAN enrich: +${ENRICHED_COUNT} lat/lng from Wikidata P19+P625") \
              && git push) || echo "Data repo: nothing to push"
          fi

      # ─── Regrade accuracy (evidence-based) ──────────────────────────────────
      # รันหลัง enrichment ทุกแหล่ง — re-compute accuracy จาก julian_evidence.mjs
      # ป้องกัน human error: accuracy ไม่สามารถตั้งค่ามือได้ ต้อง derive จาก evidence
      - name: Regrade accuracy
        if: steps.scrape.outputs.status == 'ok'
        run: |
          BEFORE=$(node -e "const d=require('./data/julian_all.json'); const a={A:0,B:0,C:0,D:0,F:0}; d.forEach(r=>a[r.accuracy]=(a[r.accuracy]||0)+1); console.log(JSON.stringify(a))")
          node workers/julian_regrade.mjs
          AFTER=$(node -e "const d=require('./data/julian_all.json'); const a={A:0,B:0,C:0,D:0,F:0}; d.forEach(r=>a[r.accuracy]=(a[r.accuracy]||0)+1); console.log(JSON.stringify(a))")
          echo "Before: $BEFORE"
          echo "After:  $AFTER"
          if ! git diff --quiet data/julian_all.json; then
            git config user.name  "JULIAN Bot"
            git config user.email "julian-bot@horatad.com"
            # push to data repo
            (cd data && git config user.name 'JULIAN Bot' && git config user.email 'julian-bot@horatad.com' \
              && git add julian_all.json \
              && (git diff --cached --quiet || git commit -m "JULIAN regrade: accuracy updated from evidence rules") \
              && git push) || echo "Data repo: nothing to push"
          fi

      # ─── Manual seed merge — รวม data/julian_thai_seed.json → julian_all.json ──
      # รันหลัง enrichment ทุกแหล่ง — manual seed > scraped (accuracy A/B/C overrides D)
      - name: Manual seed merge
        if: steps.scrape.outputs.status == 'ok'
        run: |
          node workers/julian_seed_merge.mjs || true
          if git diff --quiet data/julian_all.json; then
            echo "Seed merge: no changes"
          else
            git config user.name  "JULIAN Bot"
            git config user.email "julian-bot@horatad.com"
            # push to data repo
            (cd data && git config user.name 'JULIAN Bot' && git config user.email 'julian-bot@horatad.com' \
              && git add julian_all.json \
              && (git diff --cached --quiet || git commit -m "JULIAN seed: merge manual records") \
              && git push) || echo "Data repo: nothing to push"
          fi

      # ─── Upload to GitHub Release ─────────────────────────────
      - name: Upload to GitHub Release
        if: steps.scrape.outputs.status == 'ok'
        run: |
          gh release create julian-data \
            --title 'JULIAN Database' \
            --notes 'Auto-updated every 6 hours by julian_sync workflow' \
            --latest 2>/dev/null || true
          gh release upload julian-data data/julian_all.json --clobber
          TOTAL=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('data/julian_all.json','utf8'));console.log(d.length)}catch(e){console.log(0)}")
          echo "Release updated: ${TOTAL} records | tag: julian-data"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Disable workflow เมื่อ target ถึง หรือ queries หมด ────
      - name: Disable when done
        if: |
          steps.scrape.outputs.status == 'target_reached' ||
          steps.scrape.outputs.status == 'queries_exhausted'
        run: |
          echo "Done (${{ steps.scrape.outputs.status }}) — disabling workflow"
          gh workflow disable julian_sync.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Weekly: Empirical Validation ────────────────────────
      - name: Empirical validation (weekly)
        if: github.event.schedule == '0 3 * * 0'
        run: |
          node workers/julian_empirical.mjs
          git config user.name  "JULIAN Bot"
          git config user.email "julian-bot@horatad.com"
          git add v3/kb.json || true
          git commit -m "JULIAN empirical: auto-update kb.json empirical_p" || echo "No changes"
          git stash --include-untracked || true
          git pull --rebase origin main
          git push || true
          git stash pop || true
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ─── Generate stats snapshot → commit ไป main repo ─────────
      - name: Generate stats
        if: always()
        run: |
          if [ -f data/julian_all.json ]; then
            node workers/julian_stats.mjs
            git config user.name  'JULIAN Bot'
            git config user.email 'julian-bot@horatad.com'
            git add workers/julian_stats.json
            if ! git diff --cached --quiet; then
              git commit -m "JULIAN stats: $(node -e "const s=JSON.parse(require('fs').readFileSync('workers/julian_stats.json','utf8')); console.log(s.total.toLocaleString()+' records ('+s.pct+'%)')")"
              git stash --include-untracked || true
              git pull --rebase origin main
              git push origin HEAD:main
              git stash pop || true
            fi
          else
            echo "data/julian_all.json not found — skipping stats"
          fi

      # ─── Summary ─────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## JULIAN Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.scrape.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Records this run: ${{ steps.scrape.outputs.record_count || 0 }}" >> $GITHUB_STEP_SUMMARY
          if [ -f workers/julian_stats.json ]; then
            node -e "
              const s = JSON.parse(require('fs').readFileSync('workers/julian_stats.json','utf8'));
              console.log('- Total: ' + s.total.toLocaleString() + ' / ' + s.target.toLocaleString() + ' (' + s.pct + '%)');
              const src = s.by_source;
              const parts = Object.entries(src).filter(([,v])=>v>0).map(([k,v])=>k+': '+v.toLocaleString()).join(' | ');
              console.log('- By source: ' + parts);
              if (s.delta_today !== null) console.log('- Delta today: +' + s.delta_today.toLocaleString());
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "- Total: ${{ steps.scrape.outputs.total || '?' }}" >> $GITHUB_STEP_SUMMARY
          fi
