name: Quarterly Secret Rotation Reminder
# GUARD P1-F — สร้าง GH issue ทุกต้นเดือน Mar/Jun/Sep/Dec
# ตรวจ docs/SECRETS.md § 5 → list keys ที่ frequency=quarterly → ใส่ใน issue
# Manual workflow_dispatch ใช้ทดสอบหรือ rotate นอกรอบ

on:
  schedule:
    - cron: '0 0 1 3,6,9,12 *'  # 00:00 UTC on day 1 of Mar/Jun/Sep/Dec
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create rotation issue
        uses: actions/github-script@v8
        with:
          script: |
            const now = new Date();
            const quarter = Math.floor(now.getUTCMonth() / 3) + 1;
            const year = now.getUTCFullYear();
            const title = `GUARD: secret rotation Q${quarter} ${year}`;

            // ป้องกัน duplicate ภายในไตรมาสเดียวกัน
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'guard,rotation',
              state: 'open',
            });
            if (existing.data.find(i => i.title === title)) {
              core.info(`Issue already exists: ${title}`);
              return;
            }

            const body = [
              '> Auto-generated by `.github/workflows/rotate_secrets_reminder.yml`',
              `> Quarter Q${quarter} ${year} | Created ${now.toISOString().slice(0,10)}`,
              '',
              '## ทำตาม SOP-05 (`docs/GUARD_MISSION.md` § 5)',
              '',
              'ตรวจสอบและ rotate ทุก key ใน `docs/SECRETS.md` ที่ frequency=quarterly:',
              '',
              '- [ ] **CF_API_TOKEN** (GitHub Secret)',
              '  1. CF dashboard → My Profile → API Tokens → Roll',
              '  2. Update GitHub Secret `CF_API_TOKEN`',
              '  3. Trigger `julian_sync.yml` Empirical step → confirm pass',
              '  4. Revoke old token',
              '',
              '- [ ] **GROQ_API_KEY** (GitHub Secret)',
              '  1. Groq console → New key',
              '  2. Update GitHub Secret `GROQ_API_KEY`',
              '  3. Run `kb_extract_test.yml` → confirm Groq 200 OK',
              '  4. Revoke old key',
              '',
              '- [ ] **TYPHOON_SERVER_KEY** (CF Worker `horatad-ai` env)',
              '  1. Typhoon console → New key',
              '  2. CF dashboard → Workers → horatad-ai → Settings → Variables → update',
              '  3. Manual call: open horatad.com → V3 → Predict → confirm wording returned',
              '  4. Revoke old key',
              '',
              '## หลัง rotate ทุก key:',
              '- [ ] อัปเดต `docs/SECRETS.md` `last_rotated` fields ใน commit เดียวกัน',
              '- [ ] ปิด issue นี้',
              '',
              '## ถ้า key หาย / drift:',
              '- ตรวจ § 7 incident log + R-18 (sprawl) action',
              '- เพิ่ม key ใหม่ลง § 2 inventory ทันที',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['guard', 'rotation'],
            });
            core.info(`Created issue #${issue.data.number}: ${title}`);
