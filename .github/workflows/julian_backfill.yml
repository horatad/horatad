name: JULIAN Accuracy Backfill

# ใช้สำหรับ:
#   1. P3447 backfill — update source → "astrotheme:{id}" สำหรับ records ที่ Wikidata เชื่อมไว้
#      (แก้ bug seen_qids ทำให้ ASTROTHEME_SERIES ไม่ได้บันทึก astroId)
#   2. Regrade — re-compute accuracy จาก evidence rules (julian_evidence.mjs)
#
# Flow:
#   P3447 backfill → Regrade → commit
#
# ตั้งค่า inputs:
#   p3447_limit : จำนวน records ที่จะ query P3447 (0 = ข้าม step นี้)
#   regrade_only: รันแค่ regrade ไม่ query Wikidata (ถ้าต้องการ regrade เพียงอย่างเดียว)

on:
  workflow_dispatch:
    inputs:
      p3447_limit:
        description: 'P3447 backfill: query กี่ records (0 = ข้าม, blank = ทั้งหมด)'
        type: string
        default: '500'
      regrade_only:
        description: 'regrade อย่างเดียว (ไม่ query Wikidata P3447)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Step 1: P3447 backfill (update source → astrotheme:{id}) ────────────
      - name: P3447 backfill
        if: inputs.regrade_only != 'true' && inputs.regrade_only != true && inputs.p3447_limit != '0'
        run: |
          ARGS="--dry-run"
          if [ -n "${{ inputs.p3447_limit }}" ] && [ "${{ inputs.p3447_limit }}" != "0" ]; then
            ARGS="$ARGS --limit ${{ inputs.p3447_limit }}"
          fi
          echo "Dry-run first:"
          node workers/julian_p3447_backfill.mjs $ARGS
          echo ""
          echo "Applying:"
          APPLY_ARGS="${ARGS/--dry-run/}"
          node workers/julian_p3447_backfill.mjs $APPLY_ARGS

      # ── Step 2: Regrade (compute accuracy from evidence rules) ──────────────
      - name: Regrade accuracy
        run: |
          node workers/julian_regrade.mjs --verbose
          echo "Regrade complete"

      # ── Step 3: Commit ───────────────────────────────────────────────────────
      - name: Commit changes
        run: |
          git config user.name  'JULIAN Bot'
          git config user.email 'julian-bot@horatad.com'
          git add data/julian_all.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "JULIAN: P3447 backfill + accuracy regrade"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
