name: JULIAN MusicBrainz Scraper

# ดึงนักดนตรีจาก MusicBrainz (CC-BY 4.0) → เพิ่มใน julian_all.json
# ไม่ใช้ Wikidata — ไม่กระทบ Wikidata rate limit
# Rate limit: 1 req/sec — time-budget 1500s = ~1350 artists ต่อ run

on:
  schedule:
    - cron: '0 6 * * 1'   # ทุกวันจันทร์ 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  musicbrainz:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: horatad/julian-data
          path: data
          token: ${{ secrets.JULIAN_DATA_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Scrape MusicBrainz
        id: scrape
        run: |
          OUTPUT=$(node workers/julian_musicbrainz.mjs --time-budget 1500 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "STATUS=partial"; then
            echo "status=partial" >> $GITHUB_OUTPUT
          else
            echo "status=complete" >> $GITHUB_OUTPUT
          fi

      - name: Commit
        run: |
          STATUS="${{ steps.scrape.outputs.status }}"
          TOTAL=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('data/julian_all.json','utf8'));console.log(d.length)}catch(e){console.log('?')}" 2>/dev/null || echo "?")
          # ── push data → data repo (pull first to handle concurrent pushes) ──
          (cd data \
            && git config user.name 'JULIAN Bot' \
            && git config user.email 'julian-bot@horatad.com' \
            && git add julian_all.json \
            && (git diff --cached --quiet || git commit -m "JULIAN MusicBrainz: ${STATUS} — ${TOTAL} total") \
            && (git pull --rebase origin main || git rebase --abort || true) \
            && git push \
          ) || echo "Data repo: nothing to push"
          # ── push checkpoint → main repo ───────────────────────
          # fetch+reset: ไม่ rebase → ไม่มี add/add conflict (latest checkpoint wins)
          CHECKPOINT="workers/julian_mb_checkpoint.json"
          if [ -f "$CHECKPOINT" ]; then
            git config user.name  'JULIAN Bot'
            git config user.email 'julian-bot@horatad.com'
            cp "$CHECKPOINT" /tmp/mb_cp_bak.json
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/mb_cp_bak.json "$CHECKPOINT"
            git add "$CHECKPOINT"
            if ! git diff --cached --quiet; then
              git commit -m "JULIAN MusicBrainz: checkpoint (${STATUS})"
              git push origin HEAD:main
            fi
          fi

      - name: Summary
        if: always()
        run: |
          echo "## MusicBrainz Scraper" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.scrape.outputs.status || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          if [ -f data/julian_all.json ]; then
            node -e "
              const d = JSON.parse(require('fs').readFileSync('data/julian_all.json','utf8'));
              const mb = d.filter(r => r.notes?.startsWith('musicbrainz:'));
              console.log('- MusicBrainz records: ' + mb.length);
              console.log('- Total records: ' + d.length);
            " >> $GITHUB_STEP_SUMMARY || true
          fi
          if [ -f workers/julian_mb_checkpoint.json ]; then
            node -e "
              const cp = JSON.parse(require('fs').readFileSync('workers/julian_mb_checkpoint.json','utf8'));
              console.log('- Checkpoint offset: ' + cp.offset);
            " >> $GITHUB_STEP_SUMMARY || true
          fi
