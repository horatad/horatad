name: Main Sync Check
# ตรวจ nightly ว่า feature branches `claude/*` ที่ active recently sync กับ main หรือไม่
# ถ้า branch มี commit ใหม่กว่า main แต่ไม่ใช่ ancestor ของ main → flag

on:
  schedule:
    - cron: '0 18 * * *'  # 01:00 ICT รายวัน
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Find unsynced feature branches
        id: scan
        run: |
          set +e
          git fetch origin --prune
          MAIN_HEAD=$(git rev-parse origin/main)
          NOW_TS=$(date +%s)
          SEVEN_DAYS_AGO=$((NOW_TS - 7 * 86400))
          UNSYNCED=""

          for B in $(git branch -r | grep 'origin/claude/' | grep -v ' -> '); do
            BRANCH="${B#origin/}"
            BRANCH_HEAD=$(git rev-parse "$B")
            BRANCH_TS=$(git log -1 --format=%ct "$B")

            # skip ถ้า branch เก่ากว่า 7 วัน
            [ "$BRANCH_TS" -lt "$SEVEN_DAYS_AGO" ] && continue

            # ถ้า branch HEAD = main HEAD → synced
            [ "$BRANCH_HEAD" = "$MAIN_HEAD" ] && continue

            # ถ้า branch is ancestor of main → already merged, skip
            git merge-base --is-ancestor "$B" origin/main && continue

            # ถ้า main is ancestor of branch → branch ahead = unsynced ✓
            if git merge-base --is-ancestor origin/main "$B"; then
              AHEAD=$(git log origin/main.."$B" --oneline | wc -l)
              LAST=$(git log -1 --format='%cr' "$B")
              UNSYNCED="${UNSYNCED}\n- \`$BRANCH\` ($AHEAD commits ahead, last $LAST)"
            fi
          done

          if [ -n "$UNSYNCED" ]; then
            echo "unsynced=true" >> "$GITHUB_OUTPUT"
            {
              echo 'list<<EOF'
              echo -e "$UNSYNCED"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "unsynced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update tracking issue
        if: steps.scan.outputs.unsynced == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const list = `${{ steps.scan.outputs.list }}`;
            const title = 'BIG admin: feature branches ไม่ ff main';
            const body = [
              '> Auto-generated by `.github/workflows/main_sync_check.yml`',
              '',
              'พบ feature branches ที่มี commit ใหม่กว่า main แต่ยังไม่ ff main:',
              '',
              list,
              '',
              '**Action:** BIG session ตรวจ + ff main ตามกฎ standing rule',
              '`git push origin <branch>:main`',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'big-admin',
              state: 'open',
            });
            const found = existing.data.find(i => i.title === title);
            if (found) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: found.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['big-admin'],
              });
            }
