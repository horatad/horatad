name: FB Auto-post — โพสต์คิวขึ้น Facebook Page

on:
  schedule:
    - cron: '30 1 * * *'   # รอบหลัก 08:30 ICT (01:30 UTC) — หลัง content_curator (08:00)
    - cron: '30 4 * * *'   # รอบสำรอง 11:30 ICT (04:30 UTC) — กัน cron หลัก drop ทั้งวัน
                           # รัน --catch-up: โพสต์เฉพาะวันที่รอบหลักยังไม่ได้โพสต์ (worker กันซ้ำ)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ทดสอบ ไม่ยิงจริง (true/false)'
        required: false
        default: 'false'

jobs:
  autopost:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write     # ต้องมี ไม่งั้น "Notify on failure" + token-missing alert จะ 403 เงียบ

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # ถ้ายังไม่ได้ตั้ง secret (FB_PAGE_TOKEN) → ข้ามเงียบๆ ไม่ fail
      - name: Check secrets
        id: gate
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$FB_PAGE_TOKEN" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⏭  ยังไม่ได้ตั้ง FB_PAGE_TOKEN secret — ข้าม auto-post (รัน fb_token_exchange.mjs ก่อน)"
            # กัน "token หาย/หมดอายุ" เงียบทั้งวัน (root cause class 2026-05-30): ถ้าคิวมีของ → แจ้ง issue
            QUEUED=$(ls content/scheduled/*.json 2>/dev/null | wc -l)
            if [ "${{ github.event_name }}" = "schedule" ] && [ "$QUEUED" -gt 0 ]; then
              BODY="FB_PAGE_TOKEN ไม่ถูกตั้ง/หมดอายุ แต่คิวมี $QUEUED โพสต์รออยู่ — auto-post ถูกข้ามเงียบ
              แก้: รัน fb_token_exchange.mjs ขอ Page token ใหม่ → ใส่ GitHub Secrets (FB_PAGE_TOKEN)
              Actions log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              gh issue create --title "⚠️ fb_autopost: token หาย คิวค้าง $(date +%Y-%m-%d)" --body "$BODY" --label "alert" 2>/dev/null \
                || gh issue create --title "⚠️ fb_autopost: token หาย คิวค้าง $(date +%Y-%m-%d)" --body "$BODY"
            fi
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v5
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version: '22'

      - name: Auto-post next in queue
        if: steps.gate.outputs.ready == 'true'
        env:
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          DRY_RUN:       ${{ github.event.inputs.dry_run }}   # ว่างเมื่อ cron → โพสต์จริง
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            node workers/fb_autopost.mjs --dry-run
          elif [ "${{ github.event.schedule }}" = "30 4 * * *" ]; then
            node workers/fb_autopost.mjs --catch-up   # รอบสำรอง: โพสต์เฉพาะวันที่รอบหลักยังไม่ได้โพสต์
          else
            node workers/fb_autopost.mjs
          fi

      - name: Commit moved post
        if: steps.gate.outputs.ready == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "horatad-bot"
          git config user.email "contact@horatad.com"
          git add content/
          if git diff --staged --quiet; then
            echo "ไม่มีการเปลี่ยนแปลง (คิวว่าง/ติด gate/ถึงเพดาน) — ไม่ commit"
            exit 0
          fi
          git commit -m "autopost: เผยแพร่คิวถัดไป $(date +%Y-%m-%d)"
          # push พร้อม rebase+retry — กัน DUPLICATE POST: ถ้า main ขยับแล้ว push เปล่าๆ
          # ไฟล์ที่โพสต์แล้วจะไม่ถูกย้ายใน repo → cron รอบหน้าโพสต์ซ้ำ
          for i in 1 2 3 4 5; do
            if git push; then
              echo "✅ push สำเร็จ (ครั้งที่ $i)"
              exit 0
            fi
            echo "⚠ push ครั้งที่ $i ล้มเหลว — pull --rebase แล้วลองใหม่"
            git pull --rebase origin main || { echo "❌ rebase conflict — หยุด (ตรวจ scheduled/ ด้วยมือ)"; exit 1; }
            sleep $((i * 3))
          done
          echo "❌ push ล้มเหลวหลัง retry 5 ครั้ง — ⚠️ โพสต์ขึ้น FB แล้วแต่ ledger ไม่อัปเดต เสี่ยง repost รอบหน้า"
          exit 1

      # วางท้ายสุด — จับ failure ของ "ทุก" step ก่อนหน้า รวม Commit/push (ledger fail = เสี่ยง repost)
      # ถ้าอยู่ก่อน Commit จะจับ push-fail ไม่ได้ (failure() เห็นเฉพาะ step ที่รันไปแล้ว)
      - name: Notify on failure
        if: failure() && steps.gate.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="Auto-post workflow ล้มเหลว — ตรวจ Actions log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ⚠️ ถ้า fail ที่ step Commit/push: โพสต์อาจขึ้น FB แล้วแต่ ledger (scheduled/→posted/) ไม่อัปเดต → cron รอบหน้าเสี่ยงโพสต์ซ้ำ
          ตรวจ Page feed + content/scheduled/ ด้วยมือก่อนรอบถัดไป"
          gh issue create \
            --title "⚠️ fb_autopost failed $(date +%Y-%m-%d)" \
            --body "$BODY" \
            --label "alert" 2>/dev/null || \
          gh issue create \
            --title "⚠️ fb_autopost failed $(date +%Y-%m-%d)" \
            --body "$BODY"

