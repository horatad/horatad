name: JULIAN Index Builder

# รัน auto หลัง JULIAN Data Sync สำเร็จ
# หรือ manual trigger เพื่อ rebuild index โดยไม่ต้อง sync
on:
  workflow_run:
    workflows: ['JULIAN Accuracy Backfill']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # workflow_run trigger: รันเฉพาะเมื่อ sync สำเร็จ
    # workflow_dispatch: รันเสมอ
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      # ─── Checkout code repo (engine + worker) ─────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          repository: horatad/horatad
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── Checkout data repo → path: data ──────────────────────────────────
      - name: Checkout data repo
        uses: actions/checkout@v5
        with:
          repository: horatad/julian-data
          path: data
          token: ${{ secrets.JULIAN_DATA_PAT }}

      # ─── Setup Node.js 24 ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # ─── Build index ───────────────────────────────────────────────────────
      - name: Build JULIAN index
        run: node workers/julian_index_builder.mjs

      # ─── Commit + push index to data repo only ────────────────────────────
      - name: Commit index to data repo
        run: |
          cd data
          git config user.name  'JULIAN Bot'
          git config user.email 'julian-bot@horatad.com'
          git add index/
          RECORD_COUNT=$(node -e "try { \
            const m = JSON.parse(require('fs').readFileSync('index/meta.json','utf8')); \
            console.log(m.total + ' records'); \
          } catch(e) { console.log('?'); }")
          git diff --cached --quiet || git commit -m "JULIAN index: rebuild $(date -u +%Y-%m-%d) — ${RECORD_COUNT}"
          git push

      # ─── Summary ──────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## JULIAN Index Builder Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f data/index/meta.json ]; then
            node -e "
              const m = JSON.parse(require('fs').readFileSync('data/index/meta.json', 'utf8'));
              console.log('- Generated : ' + m.generated);
              console.log('- Records   : ' + m.total.toLocaleString() + ' (skipped: ' + (m.skipped || 0) + ')');
              console.log('- Year range: ' + m.year_range.min + ' – ' + m.year_range.max);
              console.log('- Planets   : ' + m.planets.join(', '));
              console.log('- Top-N/bucket: ' + m.planet_sign_top_n);
              const splits = m.split_log || [];
              if (splits.length > 0) {
                console.log('- Split files: ' + splits.map(s => s.key + ' (' + s.records + ')').join(', '));
              }
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "- meta.json parse error" >> $GITHUB_STEP_SUMMARY
          else
            echo "- data/index/meta.json ไม่พบ — index อาจ build ไม่สำเร็จ" >> $GITHUB_STEP_SUMMARY
          fi
