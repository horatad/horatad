<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#0f1117;color:#e0e0e0;font-size:14px;line-height:1.5}
h1{padding:12px 20px;background:#1a1d27;border-bottom:1px solid #2a2d3a;font-size:16px;color:#fff;display:flex;align-items:center;gap:12px}

.keys input{background:#1e2130;border:1px solid #2e3249;color:#ddd;padding:5px 8px;border-radius:4px;width:280px;font-size:12px;font-family:monospace}
.tag{font-size:10px;color:#4caf87;margin-left:4px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;padding:16px 20px}

.card{background:#1a1d27;border:1px solid #2a2d3a;border-radius:8px;overflow:hidden;transition:border-color .2s}

.dot-ok{background:#4caf87}
.dot-err{background:#e05555}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.card-body{padding:12px 14px}

/* Decomposition bar */
.dbar-wrap{margin-bottom:10px}
.dbar-label{font-size:10px;color:#555;margin-bottom:4px;display:flex;justify-content:space-between}
.dbar{height:16px;background:#0f1117;border-radius:4px;overflow:hidden;display:flex;position:relative}
.dbar-seg{height:100%;transition:width .4s;position:relative;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,.7);overflow:hidden;white-space:nowrap}
.seg-sys{background:#3a3f55}
.seg-pre{background:#2d3f8a}
.seg-dec{background:#1e5c3a}

/* Metrics grid */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;margin-bottom:8px}
.m-row{display:flex;justify-content:space-between;font-size:11px}
.m-key{color:#555}

/* Mode B strip */

.modeb .v{font-weight:700;color:#e0b04f}

/* Add LLM */
.add-panel{padding:0 20px 24px}

.add-row{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.add-row input,.add-row select{background:#1e2130;border:1px solid #2e3249;color:#ddd;padding:5px 8px;border-radius:4px;font-size:12px}

/* Buttons */

<body>

<h1>
  ⚡ LLM Latency Decomposition

<div class="keys">
  <div>

</div>

<div class="grid" id="grid"></div>

<div class="add-panel">
  <h3>+ เพิ่ม LLM (OpenAI-compatible)</h3>
  <div class="add-row">
    <input style="width:130px" id="addName" placeholder="ชื่อ">
    <input style="width:260px" id="addUrl" placeholder="Endpoint URL">
    <input style="width:180px" id="addModel" placeholder="model name">
    <select id="addAuth">
      <option value="bearer">Authorization: Bearer</option>
      <option value="apikey">apikey: (iApp style)</option>
      <option value="none">ไม่ต้อง key</option>
    </select>
    <input style="width:240px" id="addKey" placeholder="API Key (ถ้ามี)" type="password">
    <button class="btn-sm" onclick="addLLM()" style="background:#1e3a2a;color:#4caf87">+ Add</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Config

const SYSTEM = 'คุณคือผู้เชี่ยวชาญโหราศาสตร์ไทย ตอบสั้นที่สุด';
const MAX_TOKENS_FULL = 80;
const MAX_TOKENS_PREFILL = 1; // Mode B: isolate prefill

// ─────────────────────────────────────────────────────────────────────────────
// Built-in LLMs

const BUILTIN = [
  {
    id:'gemini-20-flash', name:'Gemini 2.0 Flash', model:'gemini-2.0-flash',
    color:'#4285f4', type:'gemini', keyRef:'g',
    baseUrl:'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash',
  },
  {
    id:'gemini-15-flash', name:'Gemini 1.5 Flash', model:'gemini-1.5-flash',
    color:'#34a853', type:'gemini', keyRef:'g',
    baseUrl:'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash',
  },
  {
    id:'groq-llama33', name:'Groq LLaMA 3.3 70B', model:'llama-3.3-70b-versatile',
    color:'#9b59b6', type:'openai', keyRef:'r',
    baseUrl:'https://api.groq.com/openai/v1/chat/completions',
  },
  {
    id:'groq-llama31-8b', name:'Groq LLaMA 3.1 8B', model:'llama-3.1-8b-instant',
    color:'#8e44ad', type:'openai', keyRef:'r',
    baseUrl:'https://api.groq.com/openai/v1/chat/completions',
  },
  {
    id:'groq-gemma2', name:'Groq Gemma2 9B', model:'gemma2-9b-it',
    color:'#6c3483', type:'openai', keyRef:'r',
    baseUrl:'https://api.groq.com/openai/v1/chat/completions',
  },
  {
    id:'typhoon-cf', name:'Typhoon v2.5 30B', model:'typhoon-v2.5-30b-a3b-instruct',
    color:'#e74c3c', type:'openai', keyRef:null,
    baseUrl:'https://horatad-ai.uchujaro5.workers.dev',
  },
];

let customLLMs = [];
function getLLMs(){ return [...BUILTIN, ...customLLMs]; }
function getKey(ref){ return ref==='g'?document.getElementById('keyGemini').value.trim():ref==='r'?document.getElementById('keyGroq').value.trim():''; }

// ─────────────────────────────────────────────────────────────────────────────
// Body builders

function buildHeaders(llm){
  const h={'Content-Type':'application/json'};
  const authType = llm.authType||'bearer';
  const key = llm._key || getKey(llm.keyRef);
  if(authType==='bearer' && key) h['Authorization']='Bearer '+key;
  if(authType==='apikey' && key) h['apikey']=key;
  return h;
}

function buildOpenAIBody(llm, question, maxTokens, stream){
  return JSON.stringify({
    model: llm.model,
    messages:[{role:'system',content:SYSTEM},{role:'user',content:question}],
    max_tokens: maxTokens,
    temperature: 0,
    stream,
  });
}

function buildGeminiBody(question, maxTokens){
  return JSON.stringify({
    system_instruction:{parts:[{text:SYSTEM}]},
    contents:[{role:'user',parts:[{text:question}]}],
    generationConfig:{maxOutputTokens:maxTokens, temperature:0},
  });
}

function buildGeminiStreamBody(question, maxTokens){
  return buildGeminiBody(question, maxTokens);
}

function getUrl(llm, stream){
  if(llm.type==='gemini'){
    const key = llm._key || getKey(llm.keyRef);
    const action = stream ? 'streamGenerateContent' : 'generateContent';
    const sse = stream ? '&alt=sse' : '';
    return `${llm.baseUrl}:${action}?key=${encodeURIComponent(key||'')}${sse}`;
  }
  return llm.baseUrl;
}

// ─────────────────────────────────────────────────────────────────────────────
// Mode B: max_tokens=1  → prefill + network, no decode

async function runModeB(llm, question, timeout){
  const t0 = Date.now();
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeout);
  try{
    const url = getUrl(llm, false);
    const body = llm.type==='gemini'
      ? buildGeminiBody(question, MAX_TOKENS_PREFILL)
      : buildOpenAIBody(llm, question, MAX_TOKENS_PREFILL, false);
    const r = await fetch(url,{method:'POST',headers:buildHeaders(llm),body,signal:ctrl.signal});
    clearTimeout(timer);
    const ms = Date.now()-t0;
    if(!r.ok) return {ms, err:`HTTP ${r.status}`};
    return {ms};
  }catch(e){
    clearTimeout(timer);
    return {ms:Date.now()-t0, err:e.name==='AbortError'?'TIMEOUT':e.message};
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Mode C: streaming → TTFB (first token) + tokens/sec + decode time

async function runModeC(llm, question, timeout){
  const t0 = Date.now();
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeout);

  try{
    const url = getUrl(llm, true);
    const body = llm.type==='gemini'
      ? buildGeminiStreamBody(question, MAX_TOKENS_FULL)
      : buildOpenAIBody(llm, question, MAX_TOKENS_FULL, true);

    const r = await fetch(url,{method:'POST',headers:buildHeaders(llm),body,signal:ctrl.signal});
    clearTimeout(timer);
    if(!r.ok){
      const txt = await r.text().catch(()=>'');
      return {err:`HTTP ${r.status}: ${txt.slice(0,100)}`};
    }

    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let firstTokenMs = null;
    let fullText = '';
    let buf = '';

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});

      // Parse SSE lines
      const lines = buf.split('\n');
      buf = lines.pop(); // keep incomplete line

      for(const line of lines){
        const trimmed = line.trim();
        if(!trimmed || trimmed==='data: [DONE]') continue;
        if(!trimmed.startsWith('data: ')) continue;
        try{
          const json = JSON.parse(trimmed.slice(6));
          // OpenAI format
          const delta = json.choices?.[0]?.delta?.content;
          // Gemini SSE format
          const geminiText = json.candidates?.[0]?.content?.parts?.[0]?.text;
          const tok = delta ?? geminiText ?? '';
          if(tok){
            if(firstTokenMs===null) firstTokenMs = Date.now()-t0;
            fullText += tok;
          }
        }catch{}
      }
    }

    const totalMs = Date.now()-t0;
    firstTokenMs = firstTokenMs ?? totalMs;
    const decodeMs = Math.max(0, totalMs - firstTokenMs);
    // rough token estimate: Thai chars ≈ 1.5 per token, ASCII ≈ 3-4 chars per token
    const estTokens = Math.max(1, Math.round(fullText.length / 3));
    const tokPerSec = decodeMs > 50 ? Math.round(estTokens / (decodeMs/1000)) : 0;

    return {firstTokenMs, decodeMs, totalMs, fullText, estTokens, tokPerSec};

  }catch(e){
    clearTimeout(timer);
    return {err:e.name==='AbortError'?`TIMEOUT >${timeout}ms`:e.message};
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Render

function renderGrid(){
  const g = document.getElementById('grid');
  g.innerHTML = '';
  for(const llm of getLLMs()){
    const c = document.createElement('div');
    c.className='card'; c.id='card-'+llm.id;
    const delBtn = llm._custom ? `<button class="btn-del" onclick="removeLLM('${llm.id}')">✕</button>` : '';
    c.innerHTML=`
<div class="card-head">
  <div>
    <div class="card-name" style="color:${llm.color}">${llm.name} ${delBtn}</div>
    <div class="card-model">${llm.model}</div>
  </div>
  <span class="status-dot dot-idle" id="dot-${llm.id}"></span>
</div>
<div class="card-body">
  <div class="dbar-wrap">
    <div class="dbar-label">
      <span>Latency breakdown</span>
      <span id="bar-total-${llm.id}" style="color:#555">—</span>
    </div>
    <div class="dbar" id="bar-${llm.id}">
      <div class="dbar-seg seg-unk" style="width:100%" id="bar-unk-${llm.id}">รอ…</div>
      <div class="dbar-seg seg-sys" style="width:0" id="bar-sys-${llm.id}"></div>
      <div class="dbar-seg seg-pre" style="width:0" id="bar-pre-${llm.id}"></div>
      <div class="dbar-seg seg-dec" style="width:0" id="bar-dec-${llm.id}"></div>
    </div>
  </div>
  <div class="metrics">
    <div class="m-row"><span class="m-key">🔵 TTFB (1st token)</span><span class="m-val v-dim" id="m-ttfb-${llm.id}">—</span></div>
    <div class="m-row"><span class="m-key">🟢 Decode time</span><span class="m-val v-dim" id="m-dec-${llm.id}">—</span></div>
    <div class="m-row"><span class="m-key">⏱ Total</span><span class="m-val v-dim" id="m-total-${llm.id}">—</span></div>
    <div class="m-row"><span class="m-key">🚀 Speed</span><span class="m-val v-dim" id="m-spd-${llm.id}">—</span></div>
    <div class="m-row"><span class="m-key">📝 Chars/~Tokens</span><span class="m-val v-dim" id="m-chars-${llm.id}">—</span></div>
    <div class="m-row"><span class="m-key">Status</span><span class="m-val v-dim" id="m-st-${llm.id}">—</span></div>
  </div>
  <div class="modeb">
    <span class="k">🟡 Mode B (max_tokens=1): network+prefill only</span>
    <span class="v" id="modeb-${llm.id}">—</span>
  </div>
  <div class="divider"></div>
  <div class="preview" id="prev-${llm.id}">กด ⚡ Run เพื่อทดสอบ</div>
</div>`;
    g.appendChild(c);
  }
}

function setDot(id,cls){ const e=document.getElementById('dot-'+id); if(e) e.className='status-dot '+cls; }
function setCard(id,cls){ const e=document.getElementById('card-'+id); if(e) e.className='card '+cls; }
function $m(id,field,val,cls){ const e=document.getElementById('m-'+field+'-'+id); if(e){e.textContent=val; if(cls) e.className='m-val '+cls;} }
function $prev(id,txt){ const e=document.getElementById('prev-'+id); if(e) e.textContent=txt.slice(0,200); }
function $modeb(id,txt,cls){ const e=document.getElementById('modeb-'+id); if(e){e.textContent=txt; if(cls) e.className='v '+cls;} }

function renderBar(id, ttfbMs, decodeMs, modeBms, totalMs){
  // Estimate: systematic ≈ Mode B minus prefill estimate
  // prefill estimate ≈ (TTFB - modeBms) if TTFB > modeB, else min value
  // We approximate: systematic ≈ min(ttfbMs * 0.2, modeBms * 0.3) — network portion
  // prefill ≈ ttfbMs - systematic
  // decode ≈ decodeMs

  const total = totalMs || (ttfbMs + decodeMs);
  if(!total){ return; }

  // Best estimate for systematic (network): assume ~15% of TTFB for same-region, or use Mode B delta
  const sysEst   = Math.round(Math.min(ttfbMs * 0.15, 80)); // rough: ≤80ms
  const preEst   = ttfbMs - sysEst;
  const decEst   = decodeMs;

  const pSys = (sysEst / total * 100).toFixed(1);
  const pPre = (preEst / total * 100).toFixed(1);
  const pDec = (decEst / total * 100).toFixed(1);

  document.getElementById('bar-unk-'+id).style.width='0';
  const bs = document.getElementById('bar-sys-'+id);
  const bp = document.getElementById('bar-pre-'+id);
  const bd = document.getElementById('bar-dec-'+id);
  if(bs) bs.style.width=pSys+'%';
  if(bp){ bp.style.width=pPre+'%'; bp.textContent=pPre>8?`${preEst}ms`:''; }
  if(bd){ bd.style.width=pDec+'%'; bd.textContent=pDec>8?`${decEst}ms`:''; }

  const bTotal = document.getElementById('bar-total-'+id);
  if(bTotal) bTotal.textContent=`${total}ms total`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Main ping

async function pingOne(llm){
  const q = document.getElementById('pingQ').value.trim();
  const timeout = parseInt(document.getElementById('timeoutMs').value)||20000;

  setCard(llm.id,'running'); setDot(llm.id,'dot-run');
  $m(llm.id,'st','กำลังทดสอบ…','v-dim');
  $prev(llm.id,'กำลังส่ง stream…');
  document.getElementById('bar-unk-'+llm.id).style.width='100%';
  document.getElementById('bar-unk-'+llm.id).textContent='รอ…';
  ['bar-sys-','bar-pre-','bar-dec-'].forEach(p=>{ const e=document.getElementById(p+llm.id); if(e){e.style.width='0';e.textContent='';} });

  // Run Mode B and Mode C in parallel
  const [b, c] = await Promise.all([
    runModeB(llm, q, timeout),
    runModeC(llm, q, timeout),
  ]);

  // Mode B result
  if(b.err) $modeb(llm.id, b.err, 'v-err');
  else      $modeb(llm.id, b.ms+'ms', 'v-warn');

  // Mode C result
  if(c.err){
    setCard(llm.id,'err'); setDot(llm.id,'dot-err');
    $m(llm.id,'st', c.err, 'v-err');
    $prev(llm.id, c.err);
    document.getElementById('bar-unk-'+llm.id).textContent='ERROR';
    return;
  }

  setCard(llm.id,'ok'); setDot(llm.id,'dot-ok');
  $m(llm.id,'st',  '200 OK',                    'v-ok');
  $m(llm.id,'ttfb',c.firstTokenMs+'ms',          'v-blue');
  $m(llm.id,'dec', c.decodeMs+'ms',              'v-ok');
  $m(llm.id,'total',c.totalMs+'ms',              'v-ok');
  $m(llm.id,'spd', c.tokPerSec ? c.tokPerSec+' tok/s' : 'N/A');
  $m(llm.id,'chars',`${c.fullText.length} / ~${c.estTokens} tok`);

  renderBar(llm.id, c.firstTokenMs, c.decodeMs, b.ms, c.totalMs);
  $prev(llm.id, c.fullText || '(ไม่มี text)');
}

async function pingAll(){
  const btn=document.getElementById('btnPing');
  btn.disabled=true;
  await Promise.all(getLLMs().map(pingOne));
  btn.disabled=false;
}

// ─────────────────────────────────────────────────────────────────────────────
// Custom LLM management

function addLLM(){
  const name=document.getElementById('addName').value.trim();
  const url=document.getElementById('addUrl').value.trim();
  const model=document.getElementById('addModel').value.trim();
  const auth=document.getElementById('addAuth').value;
  const key=document.getElementById('addKey').value.trim();
  if(!name||!url){alert('ต้องมีชื่อ + URL');return;}
  const id='custom-'+Date.now();
  customLLMs.push({
    id, name, model:model||'custom', color:'#e67e22',
    type: url.includes('generativelanguage')?'gemini':'openai',
    keyRef:null, _key:key, _custom:true, authType:auth,
    baseUrl:url,
  });
  saveCustom(); renderGrid();
  ['addName','addUrl','addModel','addKey'].forEach(i=>document.getElementById(i).value='');
}

function removeLLM(id){
  customLLMs=customLLMs.filter(l=>l.id!==id);
  saveCustom(); renderGrid();
}

function saveCustom(){ localStorage.setItem('m0_custom_llms',JSON.stringify(customLLMs)); }
function loadCustom(){ try{customLLMs=JSON.parse(localStorage.getItem('m0_custom_llms')||'[]');}catch{customLLMs=[];} }

// ─────────────────────────────────────────────────────────────────────────────
// Keys

function saveKeys(){
  const g=document.getElementById('keyGemini').value;
  const r=document.getElementById('keyGroq').value;
  if(g) localStorage.setItem('m0_key_g',g); else localStorage.removeItem('m0_key_g');
  if(r) localStorage.setItem('m0_key_r',r); else localStorage.removeItem('m0_key_r');
  updateKeyTags();
}
function loadKeys(){
  document.getElementById('keyGemini').value=localStorage.getItem('m0_key_g')||'';
  document.getElementById('keyGroq').value=localStorage.getItem('m0_key_r')||'';
  updateKeyTags();
}
function updateKeyTags(){
  document.getElementById('tag-g').textContent=localStorage.getItem('m0_key_g')?'✓ saved':'';
  document.getElementById('tag-r').textContent=localStorage.getItem('m0_key_r')?'✓ saved':'';
}
function forgetKeys(){
  ['m0_key_g','m0_key_r'].forEach(k=>localStorage.removeItem(k));
  ['keyGemini','keyGroq'].forEach(id=>document.getElementById(id).value='');
  updateKeyTags();
}

window.addEventListener('DOMContentLoaded',()=>{ loadKeys(); loadCustom(); renderGrid(); });
</script>
</body>
</html>
